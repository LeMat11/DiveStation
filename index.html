<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dive Station · Robotics Interview Prep</title>
<style>
:root{
  --ink:#0b1117; --panel:#131b24; --panel2:#1a2531; --line:#28374a;

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--ink);color:var(--text);font-family:-apple-system,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.55}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:.87em;color:var(--sonar);white-space:nowrap}
pre{background:#0d141c;border:1px solid var(--line);border-radius:8px;padding:12px 14px;overflow-x:auto;font-size:13px;line-height:1.5;margin:10px 0}
pre code{background:none;border:none;padding:0;color:var(--text);font-size:inherit;white-space:pre}
header{position:sticky;top:0;z-index:30;background:rgba(11,17,23,.95);backdrop-filter:blur(6px);padding:10px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
header h1{font-size:14px;font-weight:700;letter-spacing:.14em;white-space:nowrap}
header h1 .tick{color:var(--sonar)}
#menuBtn{display:none;font-size:18px;padding:2px 8px;border:1px solid var(--line);border-radius:6px;color:var(--dim)}
#depth{flex:1;min-width:80px;height:6px;background:var(--panel2);border-radius:3px;overflow:hidden}
#depthFill{height:100%;width:0%;background:linear-gradient(90deg,var(--sonardim),var(--sonar));transition:width .5s}

.chip{font-size:11px;color:var(--faint);border:1px solid var(--line);border-radius:20px;padding:2px 9px;white-space:nowrap}
.chip.ok{color:var(--sonar);border-color:var(--sonardim)}
.tbtn{font-size:12px;color:var(--dim);border:1px solid var(--line);border-radius:6px;padding:3px 10px}
.tbtn:hover{color:var(--text);border-color:var(--faint)}
.wrap{display:flex;min-height:calc(100vh - 50px)}
nav{width:262px;flex-shrink:0;border-right:1px solid var(--line);padding:10px 0 40px;overflow-y:auto;height:calc(100vh - 50px);position:sticky;top:50px}
.zone{padding:14px 16px 5px;color:var(--faint);font-size:10.5px;letter-spacing:.13em;font-weight:600}
.zone .m{color:var(--sonardim);letter-spacing:0}
.zone.deckzone{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.zone .zonequiz{margin-left:auto;letter-spacing:0;text-transform:none}
.subzone{padding:9px 16px 3px;color:var(--dim);font-size:11.5px;letter-spacing:.06em}

.btnrow{display:flex;gap:9px;margin:10px 0;flex-wrap:wrap;align-items:center}

#out{margin-top:6px}
.trow{border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin:7px 0;font-size:13px}

.trow .mono2{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:var(--dim);margin-top:4px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.bigok{border:1px solid var(--sonardim);color:var(--sonar);border-radius:8px;padding:10px 14px;margin:8px 0;font-weight:600}
.statusline{color:var(--faint);font-size:12.5px;margin:6px 0}
.pnav{display:flex;justify-content:space-between;margin-top:28px;gap:10px}
.pnav .ghost{max-width:48%;white-space:normal;text-align:left}
.pnav .ghost:last-child{text-align:right}
.solvesline{border-left:3px solid var(--sonar);padding-left:10px;margin:12px 0 3px;color:var(--dim)}

.revbody p code,.recallq code,.quizquestion code{white-space:normal;overflow-wrap:anywhere}
.quizmeta{color:var(--faint);font-size:12px;margin-bottom:10px}
.quizquestion{font-size:19px;line-height:1.5;margin:16px 0;padding:16px;border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;background:var(--panel)}
.homegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin:16px 0}
.hcard{border:1px solid var(--line);border-radius:10px;padding:14px;background:var(--panel)}

@media(max-width:900px){

  #scrim.show{display:block}
  main{padding:16px 14px 90px}
  .quizquestion{font-size:17px;padding:13px}
}
</style>

<body>
<header>
  <button id="menuBtn">&#9776;</button>

  <span id="statLabel"></span>

  <button id="langBtn" class="tbtn">EN / 中文</button>
  <button id="exportBtn" class="tbtn">Export</button>

</header>
<div class="wrap">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<div id="scrim"></div>
<script>
/* ============ Field Manual: Python Handbook ============ */
const MANUAL = [
{id:"py-flow",grp:"py",t:"Control flow & loop skeletons",body:`
<p>The skeletons you should be able to write with your eyes closed. Interview bugs cluster in loop bounds, not algorithms.</p>
<pre><code># branching
if x > 0:
    ...
elif x == 0:
    ...
else:
    ...

# counted loops
for i in range(n):            # 0 .. n-1
for i in range(1, n):         # 1 .. n-1
for i in range(n-1, -1, -1):  # n-1 .. 0  (reverse)

# over items / with index
for x in nums:
for i, x in enumerate(nums):

# condition loop
while lo <= hi:
    ...

# early exits
break      # leave the loop
continue   # skip to next iteration
return     # leave the function entirely</code></pre>
<p>Habit: before writing a loop body, whisper the <em>first and last</em> value the index will take. <code>range</code> excludes its end; reverse ranges need that <code>-1, -1</code> pair.</p>`},

{id:"py-list",grp:"py",t:"Lists",body:`
<pre><code>a = [0] * n                    # fixed-size init
g = [[0] * cols for _ in range(rows)]  # 2D grid -- NEVER [[0]*cols]*rows
a.append(x);  a.pop()          # stack push / pop, O(1)
a.pop(0)                       # O(n)! use deque for queues
a[-1]                          # last element
a[i:j]                         # slice COPY, j excluded
a[::-1]                        # reversed copy
a.reverse()                    # in place, returns None
a.sort()                       # in place, returns None
b = sorted(a)                  # new list
a.sort(key=lambda x: x[1])     # sort by a field
x in a                         # O(n) membership -- use a set if hot
len(a), sum(a), max(a), min(a)</code></pre>
<p>Two traps: <code>b = a</code> copies the <em>reference</em>, not the list (use <code>a[:]</code> or <code>list(a)</code>); and <code>a.sort()</code> returns <code>None</code>, so <code>x = a.sort()</code> silently destroys your data.</p>`},

{id:"py-dict",grp:"py",t:"Dicts",body:`
<pre><code>d = {}
d[k] = v
d.get(k, default)              # lookup with fallback, no KeyError
cnt[x] = cnt.get(x, 0) + 1     # THE counting idiom
k in d                         # O(1) membership
d.setdefault(k, []).append(v)  # create-or-append buckets
for k in d:                    # keys
for k, v in d.items():         # pairs
d.values();  d.keys()
sorted(d, key=lambda k: -d[k]) # keys ranked by value, descending
d.pop(k, None)                 # delete without KeyError</code></pre>
<p>Keys must be hashable: strings, numbers, tuples yes; lists no. A dict solves five interview jobs: counting, seen-before, value&rarr;index, grouping, memoization. If you are scanning a list twice, ask whether a dict kills the second scan.</p>`},

{id:"py-set",grp:"py",t:"Sets & tuples",body:`
<pre><code>s = set();  s.add(x);  s.discard(x)
x in s                         # O(1)
set(a)                         # dedupe a list
len(set(a)) < len(a)           # "has duplicates" one-liner
a & b;  a | b;  a - b          # intersection / union / difference

t = (r, c)                     # tuple: immutable, hashable
seen.add((r, c))               # grid visited-set pattern
x, y = point                   # unpacking
a, b = b, a                    # swap without a temp</code></pre>
<p>Rule of thumb: need fast membership &rarr; set; need it as a dict key or inside a set &rarr; tuple.</p>`},

{id:"py-str",grp:"py",t:"Strings",body:`
<pre><code>s[i];  s[i:j];  len(s)         # index / slice / length (immutable!)
s.lower();  s.upper()
s.split();  s.split(",")
"-".join(parts)                # join is called on the SEPARATOR
s.strip()
c.isalnum();  c.isdigit();  c.isalpha()
s == s[::-1]                   # palindrome check
"".join(sorted(s))             # canonical anagram key
ord("a");  chr(97)             # char <-> code</code></pre>
<p>Strings are immutable: building with <code>s += ch</code> in a loop is O(n&sup2;). Collect pieces in a list and <code>"".join</code> once at the end.</p>`},

{id:"py-func",grp:"py",t:"Functions & scope",body:`
<pre><code>def f(a, b=0):                 # defaults evaluated ONCE, at def time
    return a + b

def bad(x, acc=[]):            # BUG: one shared list across calls
    acc.append(x)
    return acc

def good(x, acc=None):
    if acc is None:
        acc = []
    ...

def stats(a):
    return min(a), max(a)      # multiple return = tuple
lo, hi = stats(nums)

key = lambda p: p[0]*p[0] + p[1]*p[1]   # lambdas: mostly sort keys</code></pre>
<p>In nested helpers (DFS closures): <em>reading</em> outer variables is free; <em>mutating</em> an outer list/dict is free; <em>rebinding</em> an outer int (a counter) needs <code>nonlocal count</code> &mdash; a very common stumble when counting inside a nested DFS.</p>`},

{id:"py-builtin",grp:"py",t:"Built-ins you must know",body:`
<pre><code>enumerate(a)                   # (i, x) pairs
zip(a, b)                      # pairs; stops at the shorter
list(zip(*matrix))             # transpose trick
min(a);  max(a);  sum(a)
max(a, key=len)                # extremes by a key
any(x > 0 for x in a)
all(v == 0 for v in cnt.values())
abs(x);  divmod(a, b)

[f(x) for x in a if cond]      # list comprehension
{x % 3 for x in a}             # set comprehension
{k: v for k, v in pairs}       # dict comprehension</code></pre>
<p>Comprehensions read as: OUTPUT <b>for</b> ITEM <b>in</b> SOURCE <b>if</b> FILTER. If the logic needs two lines, use a plain loop &mdash; interview code gets read aloud.</p>`},

{id:"py-mod",grp:"py",t:"Modules: math / deque / heapq / bisect",body:`
<pre><code>import math
math.atan2(dy, dx)             # y FIRST; full 4-quadrant angle
math.hypot(dx, dy)             # sqrt(dx*dx + dy*dy)
math.pi;  math.inf;  math.sqrt(x)
math.cos(t);  math.sin(t)      # RADIANS
math.radians(d);  math.degrees(r)
math.floor(x);  math.ceil(x)

from collections import deque
q = deque([start])
q.append(x);  q.popleft()      # O(1) both ends -> BFS queue

import heapq                   # a MIN-heap, always
heapq.heappush(h, (dist, node))
d, u = heapq.heappop(h)
h[0]                           # peek smallest
heapq.heappush(h, -x)          # max-heap: negate in, negate out

import bisect
bisect.bisect_left(a, x)       # first i with a[i] >= x
bisect.bisect_right(a, x)      # first i with a[i] >  x</code></pre>
<p>These four modules cover ~90% of interview needs. heapq compares tuples element-by-element &mdash; put the priority first in the tuple.</p>`},

{id:"py-pit",grp:"py",t:"Hand-writing pitfalls (the greatest hits)",body:`
<ul>
<li><code>b = a</code> aliases the same list. Copy with <code>a[:]</code>, <code>list(a)</code>, or <code>copy.deepcopy</code> for nested structures.</li>
<li><code>[[0]*n]*m</code> creates m references to ONE row. Always <code>[[0]*n for _ in range(m)]</code>. Same trap as <code>[[]]*n</code> for adjacency lists.</li>
<li><code>/</code> returns a float even for 8/2. Index math uses <code>//</code>. Also <code>int(-1.5)</code> truncates to -1, while <code>-3 // 2</code> floors to -2 &mdash; different for negatives.</li>
<li>Floats: never <code>==</code>. Compare with tolerance: <code>abs(a - b) < 1e-9</code>. You have sensor intuition for this &mdash; use it.</li>
<li><code>a.sort()</code>, <code>a.reverse()</code> return <code>None</code>. <code>sorted(a)</code>, <code>a[::-1]</code> return new lists.</li>
<li>Mutable default arguments (<code>def f(x, acc=[])</code>) persist across calls.</li>
<li>Modifying a list while iterating it skips elements. Iterate a copy or build a new list.</li>
<li><code>range(i, j)</code> and <code>a[i:j]</code> exclude j. Say the bounds out loud.</li>
<li><code>"1"</code> and <code>1</code> are different dict keys and different grid cell values. Read the problem's data types.</li>
<li>Python ints never overflow &mdash; worth saying in a C++-flavored interview; it deletes a whole class of edge cases.</li>
</ul>`},
/* ============ Field Manual: Robotics Algorithms ============ */
{id:"rb-map",grp:"rb",t:"Signal-word &rarr; pattern map",body:`
<p>The reflex table. When you read a problem, the left column should trigger the right two columns automatically. Scan this for 10 minutes before any interview.</p>
<table>
<tr><th>Signal in the problem</th><th>Pattern</th><th>First line you write</th></tr>
<tr><td>pair summing to a target, unsorted</td><td>hash map</td><td><code>seen = {}</code></td></tr>
<tr><td>sorted array + find / threshold</td><td>binary search</td><td><code>lo, hi = 0, n-1</code></td></tr>
<tr><td>minimum k such that feasible(k)</td><td>binary search on the answer</td><td><code>while lo < hi:</code></td></tr>
<tr><td>longest substring/window with property</td><td>sliding window (grow r, jump l)</td><td><code>l = 0</code></td></tr>
<tr><td>smallest window meeting a &ge; target</td><td>sliding window (shrink while valid)</td><td><code>total = 0</code></td></tr>
<tr><td>next greater / days until warmer</td><td>monotonic stack</td><td><code>stack = []</code></td></tr>
<tr><td>nested / matched pairs</td><td>stack</td><td><code>stack = []</code></td></tr>
<tr><td>connected regions in a grid</td><td>flood fill (DFS/BFS)</td><td>seed loop over cells</td></tr>
<tr><td>shortest path, unweighted</td><td>BFS</td><td><code>q = deque([start])</code></td></tr>
<tr><td>spreads from many sources / nearest X for every cell</td><td>multi-source BFS</td><td>seed ALL sources at 0</td></tr>
<tr><td>shortest path, weighted</td><td>Dijkstra</td><td><code>h = [(0, src)]</code></td></tr>
<tr><td>ordering with dependencies</td><td>topological sort (Kahn)</td><td><code>indeg = [0] * n</code></td></tr>
<tr><td>k largest / closest / most frequent</td><td>heap of size k, or sort by key</td><td><code>import heapq</code></td></tr>
<tr><td>overlapping intervals</td><td>sort by start, one sweep</td><td><code>iv.sort(key=lambda x: x[0])</code></td></tr>
<tr><td>max set of non-overlapping</td><td>greedy by END time</td><td><code>iv.sort(key=lambda x: x[1])</code></td></tr>
<tr><td>count ways / min cost to reach a state</td><td>DP table</td><td><code>dp = [...]</code></td></tr>
<tr><td>maximum, can't pick adjacent</td><td>take / skip DP</td><td><code>take, skip = 0, 0</code></td></tr>
<tr><td>angle of a vector</td><td>atan2</td><td><code>math.atan2(dy, dx)</code></td></tr>
<tr><td>frame A &rarr; frame B</td><td>SE(2) transform</td><td><code>c, s = cos(t), sin(t)</code></td></tr>
</table>`},

{id:"rb-search",grp:"rb",t:"The search family: BFS &rarr; Dijkstra &rarr; A*",body:`
<p>One family, three members, one upgrade path &mdash; the single most useful mental model for robotics interviews.</p>
<p><b>BFS</b> explores in rings of equal step count. Optimal when every move costs the same (uniform occupancy grid). Data structure: a FIFO <code>deque</code>.</p>
<p><b>Dijkstra</b> is BFS where moves cost different amounts: swap the queue for a min-heap keyed by accumulated cost g; the rings become iso-cost contours. Optimal for non-negative weights.</p>
<p><b>A*</b> is Dijkstra with a compass: pop order uses f = g + h, where h is an <em>admissible</em> heuristic (never overestimates), e.g. Euclidean distance to goal. Same code, one added term; with h = 0 it IS Dijkstra.</p>
<pre><code># the whole family shares one skeleton
pop the best node      # popleft() | heappop by g | heappop by g+h
if node is goal: done
for each neighbor:
    if this route is better than any known:
        record it, push it</code></pre>
<p>Interview sound bite: <em>"BFS when unweighted, Dijkstra when weighted, A* when I also know where the goal is."</em> Then add that your grid planners are benchmarked against exactly these baselines.</p>`},

{id:"rb-grid",grp:"rb",t:"Occupancy grids & connectivity",body:`
<p>A 2D list of free/occupied cells is both the LeetCode grid and the robotics costmap. Nearly every grid problem is a mapping operation in disguise:</p>
<ul>
<li>Flood Fill = free-space segmentation from a seed</li>
<li>Number of Islands = obstacle clustering</li>
<li>Rotting Oranges = wavefront / time-to-contact propagation</li>
<li>Distance transform = clearance field / costmap inflation</li>
<li>Shortest Path in Binary Matrix = the planner baseline itself</li>
</ul>
<pre><code>rows, cols = len(g), len(g[0])
DIRS4 = ((1,0), (-1,0), (0,1), (0,-1))
for dr, dc in DIRS4:
    nr, nc = r + dr, c + dc
    if 0 <= nr < rows and 0 <= nc < cols and g[nr][nc] == FREE:
        ...</code></pre>
<p>Habits that read as senior: bounds-check <em>before</em> dereferencing; mark visited at <em>enqueue</em> time; mutate the grid itself as a free visited-set; build grids with a comprehension, never <code>[[0]*c]*r</code>; keep (row, col) indexing and never let x/y sneak in halfway.</p>`},

{id:"rb-frames",grp:"rb",t:"Coordinate frames, SE(2), atan2, angle wrap",body:`
<p>A pose (x, y, &theta;) defines a frame. Points move between frames with a rotation + translation:</p>
<pre><code># body -> world, robot at (x, y, th)
wx = x + px*cos(th) - py*sin(th)
wy = y + px*sin(th) + py*cos(th)

# world -> body: translate FIRST, then rotate by -th
dx, dy = wx - x, wy - y
px =  dx*cos(th) + dy*sin(th)
py = -dx*sin(th) + dy*cos(th)</code></pre>
<p>Bearings come from <code>atan2(dy, dx)</code> &mdash; y first, all four quadrants, no divide-by-zero. Heading errors must be wrapped into [-&pi;, &pi;) before entering any controller, or the robot takes the 350&deg; scenic route:</p>
<pre><code>err = (target - heading + pi) % (2*pi) - pi</code></pre>
<p>These two lines &mdash; atan2 argument order and the angle wrap &mdash; are the highest bug-density lines in all of robotics. For 3D, name-drop: rotations compose as matrices or quaternions, SE(3) = rotation + translation, and a ROS 2 tf tree is exactly a chain of SE(3) transforms.</p>`},

{id:"rb-path",grp:"rb",t:"Path parameterization & pure pursuit",body:`
<p>A path is a function of arc length s, not a bag of points. Precompute cumulative segment lengths once (prefix sums), then any "point at distance s" query is a binary search plus a lerp:</p>
<pre><code>cum = [0]
for i in range(len(w) - 1):
    cum.append(cum[-1] + hypot(w[i+1][0]-w[i][0], w[i+1][1]-w[i][1]))
# query s: i = bisect_right(cum, s) - 1, then lerp inside segment i
# build O(n) once, each query O(log n)</code></pre>
<p><b>Pure pursuit</b> = "steer toward the point a lookahead distance L further along the path than my current projection." Two arc-length queries and one steering law. The trade-off sentence interviewers love: small L tracks tightly but oscillates; large L is smooth but cuts corners. L often scales with speed.</p>`},

{id:"rb-filter",grp:"rb",t:"Filtering sensor streams",body:`
<p>Three filters cover most "clean this signal" conversations:</p>
<table>
<tr><th>Filter</th><th>Kills</th><th>Costs</th><th>Core line</th></tr>
<tr><td>Moving average</td><td>broadband noise</td><td>lag; O(1) with a running sum</td><td>sliding-window sum / k</td></tr>
<tr><td>EMA</td><td>broadband noise</td><td>lag; infinite memory tail</td><td><code>y = a*x + (1-a)*y</code></td></tr>
<tr><td>Median</td><td>spikes / outliers</td><td>sorting the window</td><td><code>sorted(w)[k//2]</code></td></tr>
</table>
<p>Order matters: median first (kill spikes), then EMA (smooth). An EMA hit by a 9999 glitch remembers it for roughly 1/&alpha; samples; a median never even sees it. Your own stack is the perfect example: MS5837 pressure spikes &rarr; median; control-rate smoothing on the Pi inside SharedState &rarr; EMA, because it is one multiply-add and O(1) memory.</p>
<p>The name-drop ladder when asked "what's next": moving average &rarr; EMA &rarr; complementary filter (fuse two sensors) &rarr; Kalman filter (optimal fusion with a motion model).</p>`},

{id:"rb-heap",grp:"rb",t:"Priority queues in robotics",body:`
<p>Anywhere you repeatedly need "the most urgent thing", a heap turns O(n) scans into O(log n) pops:</p>
<ul>
<li>Dijkstra / A* open set &mdash; cheapest node next</li>
<li>Event and command schedulers &mdash; earliest deadline first</li>
<li>k nearest obstacles / neighbors &mdash; heap of size k</li>
<li>Merging k timestamped sensor streams = merging k sorted lists</li>
</ul>
<pre><code>h = []
heapq.heappush(h, (priority, payload))
prio, item = heapq.heappop(h)</code></pre>
<p>Python details worth saying out loud: heapq is a <em>min</em>-heap; there is no decrease-key, so push duplicates and skip stale entries on pop (<code>if u in done: continue</code>); tuples compare left-to-right, so the priority goes first.</p>`},

{id:"rb-pid",grp:"rb",t:"PID in 10 lines",body:`
<pre><code>class PID:
    def __init__(self, kp, ki, kd):
        self.kp, self.ki, self.kd = kp, ki, kd
        self.i = 0.0
        self.prev = None
    def step(self, err, dt):
        self.i += err * dt
        d = 0.0 if self.prev is None else (err - self.prev) / dt
        self.prev = err
        return self.kp*err + self.ki*self.i + self.kd*d</code></pre>
<p>The talking points matter more than the code: (1) heading error must be angle-wrapped <em>before</em> entering the loop; (2) the integral needs clamping &mdash; anti-windup &mdash; or actuator saturation wrecks recovery; (3) the D term on a noisy sensor needs low-passing, or take the derivative of the <em>measurement</em> instead of the error to avoid setpoint kicks. Each one is a war story you can tell from mantabot hardware.</p>`},

{id:"rb-cx",grp:"rb",t:"Complexity cheat sheet",body:`
<table>
<tr><th>Input size n</th><th>Target complexity</th></tr>
<tr><td>~10&#8309; &ndash; 10&#8310;</td><td>O(n) or O(n log n)</td></tr>
<tr><td>~10&sup3; &ndash; 10&#8308;</td><td>O(n&sup2;) acceptable</td></tr>
<tr><td>&le; ~20</td><td>exponential / bitmask territory</td></tr>
</table>
<table>
<tr><th>Operation</th><th>Cost</th></tr>
<tr><td>dict / set lookup, insert</td><td>O(1) average</td></tr>
<tr><td><code>x in list</code></td><td>O(n)</td></tr>
<tr><td>sort</td><td>O(n log n)</td></tr>
<tr><td>heap push / pop</td><td>O(log n)</td></tr>
<tr><td>BFS / DFS</td><td>O(V + E)</td></tr>
<tr><td>Dijkstra (heap)</td><td>O(E log V)</td></tr>
<tr><td>slice a[i:j]</td><td>O(j - i), and it copies</td></tr>
</table>
<p>Interview move: state complexity <em>before</em> coding &mdash; "one pass with a dict, O(n) time, O(n) space." It buys goodwill and catches a wrong plan while it is still cheap.</p>`}
,
{id:"iv-behavioral",grp:"iv",t:"Behavioral question bank (mapped to your stories)",body:`
<p>Interviews spend as much time on "tell me about a time..." as on code. The fix is not memorizing answers &mdash; it is having 6&ndash;8 concrete stories ready, each in <b>STAR</b> shape (Situation, Task, Action, Result), and knowing which one to reach for. Below: 15 common prompts, each mapped to a real incident from your four projects so you never freeze. Prep the starred ones first &mdash; they cover ~80% of what gets asked.</p>

<div class="robobox"><b>YOUR STORY BANK &mdash; the raw material</b>
<ul>
<li><b>Triple-cause board kill (VCA bot)</b> &mdash; GPIO-high-on-boot + back-EMF + USB 5V backfeeding through the buck body diode together destroyed a regulator. Fixed with a three-part protection chain (PTC + TVS + Schottky). The definitive "hard bug" and "failures compound" story.</li>
<li><b>CHANNEL_INVERT layering (VCA bot)</b> &mdash; a reversed-wired actuator first patched ad hoc in several places, then consolidated to one constant at the lowest layer. Your "I fixed it wrong first, then structurally" story.</li>
<li><b>Bang-bang realization (VCA bot)</b> &mdash; built a PWM&rarr;angle calibration curve before realizing the plant had no stable intermediate positions. "Identify the regime before optimizing" &mdash; a story about a wrong assumption caught.</li>
<li><b>Cross-attention rank bottleneck (Flow sensing)</b> &mdash; vorticity SSIM capped at ~0.13 no matter the hyperparameters; the real cause was rank &le; 5 from only 5 sensor tokens. Fixed with learnable tokens. "The metric was stuck and tuning could never fix it."</li>
<li><b>Phase-angle leakage (Flow sensing)</b> &mdash; the model leaned on upstream foil phase that a real AUV cannot observe at inference; replaced it with onboard sensor history. "I caught my own eval was dishonest."</li>
<li><b>LLM early-frame bias (Badminton coach)</b> &mdash; the model kept confusing "arm raised" with "moment of contact"; a feedback loop asking it to self-correct just confirmed its own wrong answer. Replaced with a computational motion-peak constraint. "The clever approach failed; the simple signal won."</li>
<li><b>Dead code that looked like features (Badminton coach)</b> &mdash; three functions defined but never called; the real runtime was much simpler. "Trace the call chain, don't trust definitions." A code-review lesson.</li>
<li><b>Phase accumulator drift (Mantabot)</b> &mdash; differential turning drove two motor accumulators apart; independent idle resets made it worse; fixed with coordinated re-sync. A subtle concurrency/state story.</li>
<li><b>Pi 5 has no H.264 encoder (Mantabot)</b> &mdash; assumed drone-style hardware encoding existed; had to redesign around CPU MJPEG within a thermal budget. "My assumption was wrong and I re-architected."</li>
<li><b>SharedState concurrency framework (Mantabot)</b> &mdash; you designed a multi-rate threaded architecture (50Hz control, 200Hz CAN, 15fps camera) sharing state cleanly. Your "system design from scratch" story.</li>
<li><b>Image-based phase recovery (VCA bot)</b> &mdash; chose offline post-hoc phase over fighting an unreliable hardware trigger on a jittery wireless link. "I picked the pragmatic path over the 'correct' one."</li>
</ul>
</div>

<h3>The 15 questions</h3>
<table>
<tr><th>Prompt</th><th>Reach for</th></tr>
<tr><td>&#9733; Tell me about the hardest bug you've debugged.</td><td>Triple-cause board kill &mdash; three independent failures compounding is a rare, memorable answer. Walk the diagnosis, not just the fix.</td></tr>
<tr><td>&#9733; Describe a time you were wrong about something technical.</td><td>Bang-bang realization, or Pi 5 H.264 assumption. Both are "I assumed X, evidence said not-X, I changed course."</td></tr>
<tr><td>&#9733; Tell me about a system you designed from scratch.</td><td>SharedState multi-rate architecture. Emphasize the rate-decoupling decision and why threads over one loop.</td></tr>
<tr><td>&#9733; A time you improved something that already worked.</td><td>CHANNEL_INVERT consolidation &mdash; it worked after the ad-hoc patches, but you refactored to one boundary constant. Talk about maintainability.</td></tr>
<tr><td>&#9733; When did you catch a mistake others (or you) missed?</td><td>Phase-angle leakage, or dead-code call-chain. Both show rigor and honesty about your own work.</td></tr>
<tr><td>Tell me about a technical disagreement.</td><td>The VLA-framing discussion with your advisor: naive end-to-end vs. flow-conditioned. You argued from physics for the harder-but-right framing. (Keep it collegial.)</td></tr>
<tr><td>A time you had to learn something fast.</td><td>ESP-NOW / LEDC PWM v2&rarr;v3 API break, or picking up cross-attention for the decoder. Show the ramp-up method.</td></tr>
<tr><td>When you hit a wall and had to change approach.</td><td>Cross-attention rank bottleneck &mdash; no hyperparameter could move the metric; you diagnosed the structural cause and switched to learnable tokens.</td></tr>
<tr><td>A time you made a pragmatic trade-off under constraints.</td><td>Image-based phase recovery over hardware sync; MJPEG over H.264 within thermal budget. "Right answer given real limits."</td></tr>
<tr><td>Describe a failure and what you learned.</td><td>Board kill (if not used above) framed as "I under-protected the power path" &mdash; the lesson became a design principle: protect every path.</td></tr>
<tr><td>How do you approach testing / validation?</td><td>Case-level leave-K-out splits in flow sensing; audio-motion cross-validation in the coach. You design tests to expose leakage, not flatter the model.</td></tr>
<tr><td>A time attention to detail mattered.</td><td>AS5600L at 0x40 not 0x36; the atan2 argument order; sizing the IPROPI resistor to the ADC ceiling. Small detail, whole-system consequence.</td></tr>
<tr><td>Tell me about working with ambiguity / no clear spec.</td><td>Defining a lock-in criterion for Karman gait entrainment (phase-stationarity) &mdash; you turned an emergent, fuzzy phenomenon into a quantitative test.</td></tr>
<tr><td>How do you prioritize when everything is urgent?</td><td>The command scheduler: STOP always highest priority, 50ms serial budget. A concrete, systems-level answer about explicit priority.</td></tr>
<tr><td>Why this company / why robotics? (motivation)</td><td>Your through-line: research &rarr; build &rarr; validate on real hardware. The full closed loop is rare; lead with that, not a generic passion statement.</td></tr>
</table>

<h3>Delivery notes</h3>
<ul>
<li><b>60&ndash;90 seconds each.</b> Situation and Task in two sentences; spend your time on Action (what YOU did, decisions you made) and a concrete Result.</li>
<li><b>Quantify the result</b> even loosely: "reduced sensing input dimension", "recovered SSIM from 0.13 to a usable field", "zero board failures after the protection chain". Numbers stick.</li>
<li><b>"I" not "we."</b> These are your incidents &mdash; own the specific decision, even on a solo project where it feels obvious.</li>
<li><b>End on the lesson.</b> Every strong answer closes with the principle you now carry: "failures compound, so I protect every path," "identify the regime before optimizing," "design tests to expose leakage."</li>
<li>Practice these <b>out loud in English</b> &mdash; the vocabulary (bring-up, root-cause, regression, trade-off, corner case) is exactly the JD terminology you want to sound fluent in at IROS.</li>
</ul>`}
];

  {"id":"mb-finite-state-machine-cruise-control","proj":"mantabot","cat":"algo","term":"Finite state machine (cruise control)","detail":"In the MantaBot underwater robot, I used Finite state machine (cruise control), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — stick input, LB toggle, and auto-ramp all competing for motor command authority without race conditions. In practice, I implemented it this way: DISENGAGED / LOCKED / RAMPING_DOWN with explicit transition table. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"stick input, LB toggle, and auto-ramp all competing for motor command authority without race conditions","recall":"You have multiple input sources commanding one actuator. How would you arbitrate authority cleanly and avoid race conditions?","recall_zh":"多个输入源都能控制同一个执行器。你会怎样清晰地仲裁控制权并避免 race condition？","detail_zh":"在 MantaBot 水下机器人中，我采用了 Finite state machine (cruise control)，把状态、决策或数据流显式化。它解决的是这个具体问题：在摇杆、LB toggle 和自动 ramp 争夺电机控制权时避免 race condition。具体实现上，带有显式转换表的 DISENGAGED / LOCKED / RAMPING_DOWN。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"在摇杆、LB toggle 和自动 ramp 争夺电机控制权时避免 race condition"},

  {"id":"mb-hysteresis-thresholds","proj":"mantabot","cat":"algo","term":"Hysteresis thresholds","detail":"In the MantaBot underwater robot, I used Hysteresis thresholds, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — rapid on/off chattering when a signal hovers near a single threshold. In practice, I implemented it this way: cruise override activates at 1.5× deadzone (0.12), deactivates at 1× (0.08); same pattern for thermal recovery (E-Stop at 80°C, recover at 75°C) and proximity warning. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"rapid on/off chattering when a signal hovers near a single threshold","recall":"A sensor value hovers near a trigger threshold and makes the output chatter. How would you stabilize it?","recall_zh":"传感器值徘徊在触发阈值附近并导致输出抖动。你会如何稳定它？","detail_zh":"在 MantaBot 水下机器人中，我采用了 Hysteresis thresholds，把状态、决策或数据流显式化。它解决的是这个具体问题：当信号悬停在单个阈值附近时快速开/关颤动。具体实现上，巡航超驰在 1.5× deadzone (0.12) 处激活，在 1× (0.08) 处停用；热恢复模式相同（在 80°C 时急停，在 75°C 时恢复）和接近警告。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"当信号悬停在单个阈值附近时快速开/关颤动"},
  {"id":"mb-linear-interpolation-ramp-for-discontinuity-smoothing","proj":"mantabot","cat":"algo","term":"Linear interpolation ramp for discontinuity smoothing","detail":"In the MantaBot underwater robot, I used Linear interpolation ramp for discontinuity smoothing, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — the physical jerk when output snaps between two command sources. In practice, I implemented it this way: 300ms lerp from last override commands to locked snapshot. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"the physical jerk when output snaps between two command sources","recall":"Two command sources produce different actuator setpoints. How would you switch between them without causing a physical jerk?","recall_zh":"两个命令源给出不同的执行器 setpoint。你会怎样平滑切换，避免机械冲击？","detail_zh":"在 MantaBot 水下机器人中，我采用了 Linear interpolation ramp for discontinuity smoothing，把状态、决策或数据流显式化。它解决的是这个具体问题：输出在两个命令源之间瞬间切换时造成的机械冲击。具体实现上，300ms lerp从最后一个覆盖命令到锁定的快照。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"输出在两个命令源之间瞬间切换时造成的机械冲击"},
  {"id":"mb-phase-accumulator-for-sine-wave-generation","proj":"mantabot","cat":"algo","term":"Phase accumulator for sine wave generation","detail":"In the MantaBot underwater robot, I used Phase accumulator for sine wave generation, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — frequency changes mid-stroke without position jumps (vs. computing `sin(2πft)` directly, which jumps when f changes). In practice, I implemented it this way: `pos = sign*(amp*sin(phase) + offset) + neutral` at 200Hz. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"frequency changes mid-stroke without position jumps (vs. computing `sin(2πft)` directly, which jumps when f changes)","recall":"You're generating a sine trajectory and must change frequency during motion without an output jump. How would you do it?","recall_zh":"你正在生成正弦轨迹，并且必须在运动过程中改变频率而不产生输出跳跃。你会怎么做？","detail_zh":"在 MantaBot 水下机器人中，我采用了 Phase accumulator for sine wave generation，把状态、决策或数据流显式化。它解决的是这个具体问题：频率在行程中变化，没有位置跳跃（相对于直接计算 `sin(2πft)`，当 f 变化时跳跃）。具体实现上，`pos = sign*(amp*sin(phase) + offset) + neutral` at 200Hz。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"频率在行程中变化，没有位置跳跃（相对于直接计算 `sin(2πft)`，当 f 变化时跳跃）"},
  {"id":"mb-unified-additive-offset-no-mode-branching","proj":"mantabot","cat":"algo","term":"Unified additive offset (no mode branching)","detail":"In the MantaBot underwater robot, I used Unified additive offset (no mode branching), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — \"hold angle vs. bias\" as one equation instead of a mode switch. In practice, I implemented it this way: trigger offset is a DC bias when oscillating and naturally degenerates to a static hold when amp=0. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"\"hold angle vs. bias\" as one equation instead of a mode switch","recall":"How would you represent both a static actuator hold and a bias on an oscillating trajectory without separate control modes?","recall_zh":"如果没有单独的控制模式，如何表示静态执行器保持和振荡轨迹上的偏置？","detail_zh":"在 MantaBot 水下机器人中，我采用了 Unified additive offset (no mode branching)，把状态、决策或数据流显式化。它解决的是这个具体问题：“保持角度与偏置”作为一个方程而不是模式开关。具体实现上，触发偏移是振荡时的 DC 偏差，当 amp=0 时自然退化为静态保持。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"“保持角度与偏置”作为一个方程而不是模式开关"},
  {"id":"mb-snapshot-and-restore-automotive-cruise-model","proj":"mantabot","cat":"algo","term":"Snapshot-and-restore (automotive cruise model)","detail":"In the MantaBot underwater robot, I used Snapshot-and-restore (automotive cruise model), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — seamless pilot takeover semantics. In practice, I implemented it this way: locked commands are a snapshot; stick override is temporary and releases back to the snapshot. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"seamless pilot takeover semantics","recall":"How would you let an operator temporarily override an automatic command, then return smoothly to the previous setpoint?","recall_zh":"如何让操作员暂时覆盖自动命令，然后顺利返回到之前的设定点？","detail_zh":"在 MantaBot 水下机器人中，我采用了 Snapshot-and-restore (automotive cruise model)，把状态、决策或数据流显式化。它解决的是这个具体问题：无缝试点接管语义。具体实现上，锁定的命令是一个快照；棒覆盖是暂时的，会释放回快照。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"无缝试点接管语义"},
  {"id":"mb-ring-buffer","proj":"mantabot","cat":"algo","term":"Ring buffer","detail":"In the MantaBot underwater robot, I used Ring buffer, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — unbounded memory growth for streaming logs. In practice, I implemented it this way: web log viewer holds recent INFO+ entries. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"unbounded memory growth for streaming logs","recall":"A live log viewer runs indefinitely. Which data structure keeps recent entries available without unbounded memory growth?","recall_zh":"实时日志查看器无限期运行。哪种数据结构可以在不无限内存增长的情况下保持最近的条目可用？","detail_zh":"在 MantaBot 水下机器人中，我采用了 Ring buffer，把状态、决策或数据流显式化。它解决的是这个具体问题：流日志的无限内存增长。具体实现上，网络日志查看器保存最近的 INFO+ 条目。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"流日志的无限内存增长"},
  {"id":"mb-mixer-pattern","proj":"mantabot","cat":"algo","term":"Mixer pattern","detail":"In the MantaBot underwater robot, I used Mixer pattern, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — decoupling pilot intent (speed/turn/pitch/roll) from actuator commands. In practice, I implemented it this way: maps 4 stick axes → per-motor freq/amp + per-servo angles (sum for common mode, difference for differential). I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"decoupling pilot intent (speed/turn/pitch/roll) from actuator commands","recall":"How would you translate intuitive operator inputs into coordinated actuator commands while keeping control intent separate from hardware details?","recall_zh":"如何将直观的操作员输入转换为协调的执行器命令，同时将控制意图与硬件细节分开？","detail_zh":"在 MantaBot 水下机器人中，我采用了 Mixer pattern，把状态、决策或数据流显式化。它解决的是这个具体问题：将飞行员意图（速度/转弯/俯仰/滚转）与执行器命令解耦。具体实现上，映射 4 棒轴 → 每个电机频率/放大器 + 每个伺服角度（共模的总和，差动的差值）。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"将飞行员意图（速度/转弯/俯仰/滚转）与执行器命令解耦"},
  {"id":"mb-cascaded-pid-architecture-planned-depth-hold","proj":"mantabot","cat":"algo","term":"Cascaded PID architecture (planned depth hold)","detail":"In the MantaBot underwater robot, I used Cascaded PID architecture (planned depth hold), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — slow-plant depth control with fast disturbance rejection, borrowed from DJI altitude control. In practice, I implemented it this way: outer depth loop → inner vertical-velocity loop. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"slow-plant depth control with fast disturbance rejection, borrowed from DJI altitude control","recall":"When would you use cascaded control loops instead of one PID for a slow plant with fast disturbances?","recall_zh":"对于具有快速扰动的慢速设备，何时会使用级联控制环路而不是 PID？","detail_zh":"在 MantaBot 水下机器人中，我采用了 Cascaded PID architecture (planned depth hold)，把状态、决策或数据流显式化。它解决的是这个具体问题：具有快速干扰抑制功能的慢速被控对象深度控制，借鉴自 DJI 高度控制。具体实现上，外部深度循环→内部垂直速度循环。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"具有快速干扰抑制功能的慢速被控对象深度控制，借鉴自 DJI 高度控制"},
  {"id":"mb-priority-override-chain","proj":"mantabot","cat":"algo","term":"Priority/override chain","detail":"In the MantaBot underwater robot, I used Priority/override chain, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — safety commands bypassing input-source mutual exclusion. In practice, I implemented it this way: E-Stop > thermal > armed gate > cruise > stick. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"safety commands bypassing input-source mutual exclusion","recall":"How would you structure command priorities so safety actions always override automation and manual inputs?","recall_zh":"你将如何构建命令优先级，以便安全操作始终优先于自动化和手动输入？","detail_zh":"在 MantaBot 水下机器人中，我采用了 Priority/override chain，把状态、决策或数据流显式化。它解决的是这个具体问题：让安全命令不受普通输入源互斥限制，始终拥有最高优先级。具体实现上，优先级依次是 E-Stop > thermal protection > armed gate > cruise > stick。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"让安全命令不受普通输入源互斥限制，始终拥有最高优先级"},
  {"id":"mb-multi-rate-threading","proj":"mantabot","cat":"pylang","term":"Multi-rate threading","detail":"In the MantaBot underwater robot, I used Multi-rate threading, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — each subsystem running at its natural rate without blocking the others. In practice, I implemented it this way: 50Hz control loop, 200Hz CAN motor command thread, ~15fps camera thread, all sharing state through a central `shared_state` module. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"each subsystem running at its natural rate without blocking the others","recall":"Several subsystems need different update rates. How would you schedule them and share state without one blocking the others?","recall_zh":"多个子系统需要不同更新频率。你会怎样调度并共享状态，避免它们互相阻塞？","detail_zh":"在 MantaBot 水下机器人中，我用 Multi-rate threading 来划分软件职责和接口边界。它解决的是这个具体问题：让每个子系统按各自所需频率运行，同时不阻塞其他子系统。具体实现上，50Hz控制循环，200Hz CAN电机命令线程，~15fps相机线程，所有这些都通过中央`shared_state`模块共享状态。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"让每个子系统按各自所需频率运行，同时不阻塞其他子系统"},
  {"id":"mb-dataclass-command-structs-processedcommands","proj":"mantabot","cat":"pylang","term":"Dataclass command structs","detail":"In the MantaBot underwater robot, I used Dataclass command structs, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — tracing which layer owns/overwrites a value during debugging. In practice, I implemented it this way: typed command objects passed through the pipeline instead of raw dicts. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"tracing which layer owns/overwrites a value during debugging","recall":"Why pass typed command objects through a control pipeline instead of raw dictionaries?","recall_zh":"为什么在控制 pipeline 中传递类型化命令对象，而不是原始 dictionary？","detail_zh":"在 MantaBot 水下机器人中，我用 Dataclass command structs 来划分软件职责和接口边界。它解决的是这个具体问题：在调试期间跟踪哪个层拥有/覆盖某个值。具体实现上，通过 pipeline 而不是原始字典传递类型化命令对象。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"在调试期间跟踪哪个层拥有/覆盖某个值"},
  {"id":"mb-qt-signal-slot-cross-thread-marshaling","proj":"mantabot","cat":"pylang","term":"Qt signal/slot cross-thread marshaling","detail":"In the MantaBot underwater robot, I used Qt signal/slot cross-thread marshaling, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — updating QML UI from non-GUI threads without crashes. In practice, I implemented it this way: network IO stays on worker threads, emits Signals consumed by the GUI thread via QObject bridges (TelemetryBridge, VideoBridge, etc.). I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"updating QML UI from non-GUI threads without crashes","recall":"How would you update a Qt interface from background I/O workers without violating GUI thread rules?","recall_zh":"如何在不违反 GUI 线程规则的情况下从后台 I/O 工作人员更新 Qt 接口？","detail_zh":"在 MantaBot 水下机器人中，我用 Qt signal/slot cross-thread marshaling 来划分软件职责和接口边界。它解决的是这个具体问题：从非 GUI 线程更新 QML UI 而不会崩溃。具体实现上，网络 IO 保留在工作线程上，通过 QObject 桥（TelemetryBridge、VideoBridge 等）发出 GUI 线程消耗的信号。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"从非 GUI 线程更新 QML UI 而不会崩溃"},
  {"id":"mb-qobject-property-bridges-to-qml","proj":"mantabot","cat":"pylang","term":"QObject property bridges to QML","detail":"In the MantaBot underwater robot, I used QObject property bridges to QML, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — clean separation of Python backend from declarative QML UI. In practice, I implemented it this way: Python logic exposed as notifying Properties + slots. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"clean separation of Python backend from declarative QML UI","recall":"How would you expose a Python backend to a declarative QML interface while keeping the layers cleanly separated?","recall_zh":"如何将 Python 后端暴露给声明性 QML 接口，同时保持各层清晰分离？","detail_zh":"在 MantaBot 水下机器人中，我用 QObject property bridges to QML 来划分软件职责和接口边界。它解决的是这个具体问题：Python 后端与声明式 QML UI 完全分离。具体实现上，Python 逻辑公开为通知属性 + 槽。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"Python 后端与声明式 QML UI 完全分离"},
  {"id":"mb-asyncio-fastapi-websocket","proj":"mantabot","cat":"pylang","term":"asyncio + FastAPI WebSocket","detail":"In the MantaBot underwater robot, I used asyncio + FastAPI WebSocket, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — serving many dashboard clients without a thread per client. In practice, I implemented it this way: async telemetry push at ~10Hz alongside the synchronous control threads. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"serving many dashboard clients without a thread per client","recall":"How would you serve real-time telemetry to many browser clients alongside synchronous control threads?","recall_zh":"你将如何与同步控制线程一起向许多浏览器客户端提供实时遥测服务？","detail_zh":"在 MantaBot 水下机器人中，我用 asyncio + FastAPI WebSocket 来划分软件职责和接口边界。它解决的是这个具体问题：为许多仪表板客户端提供服务，每个客户端没有线程。具体实现上，异步遥测推送在 ~10Hz 与同步控制线程一起。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"为许多仪表板客户端提供服务，每个客户端没有线程"},
  {"id":"mb-abstraction-interface-for-swappable-transports","proj":"mantabot","cat":"pylang","term":"Abstraction interface for swappable transports","detail":"In the MantaBot underwater robot, I used Abstraction interface for swappable transports, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — changing the codec without touching UI code. In practice, I implemented it this way: \"video frame provider\" interface with MJPEG implementation now, H.264 later. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"changing the codec without touching UI code","recall":"How would you design a media transport so the codec can change without modifying the user interface?","recall_zh":"你将如何设计媒体传输，以便可以在不修改用户界面的情况下更改编解码器？","detail_zh":"在 MantaBot 水下机器人中，我用 Abstraction interface for swappable transports 来划分软件职责和接口边界。它解决的是这个具体问题：更改编解码器而不触及 UI 代码。具体实现上，“视频帧提供程序”接口现在使用 MJPEG 实现，稍后使用 H.264 实现。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"更改编解码器而不触及 UI 代码"},
  {"id":"mb-callback-registration-hook-register-processor","proj":"mantabot","cat":"pylang","term":"Callback registration hook","detail":"In the MantaBot underwater robot, I used Callback registration hook, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — extensibility without modifying the capture loop. In practice, I implemented it this way: camera pipeline exposes a processor hook for future CV/SLAM modules. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"extensibility without modifying the capture loop","recall":"How would you make a camera pipeline extensible for future perception modules without editing its capture loop?","recall_zh":"如何使相机 pipeline 可扩展用于未来的感知模块而不编辑其捕获循环？","detail_zh":"在 MantaBot 水下机器人中，我用 Callback registration hook 来划分软件职责和接口边界。它解决的是这个具体问题：无需修改捕获循环即可扩展。具体实现上，相机 pipeline 为未来的 CV/SLAM 模块公开处理器钩子。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"无需修改捕获循环即可扩展"},
  {"id":"mb-config-as-single-source-of-truth","proj":"mantabot","cat":"pylang","term":"Config-as-single-source-of-truth","detail":"In the MantaBot underwater robot, I used Config-as-single-source-of-truth, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — tuning without hunting through control code. In practice, I implemented it this way: all constants in `config.py`, no magic numbers in control logic. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"tuning without hunting through control code","recall":"Where should tunable constants live, and why is scattering magic numbers through control logic risky?","recall_zh":"可调常量应该存在于哪里，为什么通过控制逻辑分散幻数是有风险的？","detail_zh":"在 MantaBot 水下机器人中，我用 Config-as-single-source-of-truth 来划分软件职责和接口边界。它解决的是这个具体问题：无需通过控制代码进行调整。具体实现上，`config.py`中的所有常量，控制逻辑中没有幻数。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"无需通过控制代码进行调整"},
  {"id":"mb-can-bus-mit-mode","proj":"mantabot","cat":"hw","term":"CAN bus MIT mode","detail":"In the MantaBot underwater robot, I used CAN bus MIT mode, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — closed-loop actuator control and doubles as a free force sensor for ground-effect experiments. In practice, I implemented it this way: position/velocity/KP/KD/feedforward-torque packed into 8-byte frames; parsing motor reply frames gives position + torque feedback. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"closed-loop actuator control and doubles as a free force sensor for ground-effect experiments","recall":"How would you fit closed-loop motor commands into a compact CAN frame and reuse reply telemetry for sensing?","recall_zh":"如何把闭环电机命令打包进紧凑的 CAN 帧，并复用返回遥测做传感？","detail_zh":"在 MantaBot 水下机器人中，我用 CAN bus MIT mode 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：用紧凑 CAN 帧实现闭环执行器控制，并把电机回复遥测复用为近地效应实验的力传感信号。具体实现上，position/velocity/KP/KD/feedforward-torque 打包到 8-byte 帧中；解析电机回复帧给出位置+扭矩反馈。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"用紧凑 CAN 帧实现闭环执行器控制，并把电机回复遥测复用为近地效应实验的力传感信号"},
  {"id":"mb-parsing-mit-mode-entry-confirmation-frames","proj":"mantabot","cat":"hw","term":"Parsing MIT-mode entry confirmation frames","detail":"In the MantaBot underwater robot, I used Parsing MIT-mode entry confirmation frames, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — the startup jump when the commanded zero disagrees with physical rest position. In practice, I implemented it this way: read the motor's actual neutral position at startup instead of assuming 0.0. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"the startup jump when the commanded zero disagrees with physical rest position","recall":"An actuator may not start at mathematical zero. How would you prevent a position jump when entering closed-loop mode?","recall_zh":"执行器可能无法从数学零开始。进入闭环模式时如何防止位置跳跃？","detail_zh":"在 MantaBot 水下机器人中，我用 Parsing MIT-mode entry confirmation frames 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：当命令的零与物理静止位置不一致时启动跳跃。具体实现上，在启动时读取电机的实际中立位置，而不是假设 0.0。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"当命令的零与物理静止位置不一致时启动跳跃"},
  {"id":"mb-can-logical-addressing","proj":"mantabot","cat":"hw","term":"CAN logical addressing","detail":"In the MantaBot underwater robot, I used CAN logical addressing, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — knowing what's safe during hardware rework. In practice, I implemented it this way: IDs 0/1 are independent of physical daisy-chain order; swapping motors is consequence-free if termination resistors are external/fixed. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"knowing what's safe during hardware rework","recall":"How should CAN device identity relate to physical bus order so hardware can be rearranged safely?","recall_zh":"CAN 设备标识应如何与物理总线顺序相关，以便可以安全地重新排列硬件？","detail_zh":"在 MantaBot 水下机器人中，我用 CAN logical addressing 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：了解硬件返工期间什么是安全的。具体实现上，ID 0/1 独立于物理菊花链顺序；如果终端电阻是外部/固定的，则更换电机不会产生任何后果。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"了解硬件返工期间什么是安全的"},
  {"id":"mb-sysfs-pwm-rp1-chip-on-pi-5","proj":"mantabot","cat":"hw","term":"sysfs PWM (RP1 chip on Pi 5)","detail":"In the MantaBot underwater robot, I used sysfs PWM (RP1 chip on Pi 5), a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — userspace hardware PWM without a kernel driver. In practice, I implemented it this way: servos and LEDs driven by writing period/duty_cycle to `/sys/class/pwm/`. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"userspace hardware PWM without a kernel driver","recall":"How can a Linux single-board computer drive hardware PWM from userspace without a custom kernel driver?","recall_zh":"Linux 单板计算机如何在没有自定义内核驱动程序的情况下从用户空间驱动硬件 PWM？","detail_zh":"在 MantaBot 水下机器人中，我用 sysfs PWM (RP1 chip on Pi 5) 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：没有内核驱动程序的用户空间硬件 PWM。具体实现上，通过将 period/duty_cycle 写入 `/sys/class/pwm/` 来驱动伺服系统和 LED。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"没有内核驱动程序的用户空间硬件 PWM"},
  {"id":"mb-servo-slew-rate-limiting","proj":"mantabot","cat":"hw","term":"Servo slew-rate limiting","detail":"In the MantaBot underwater robot, I used Servo slew-rate limiting, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — power-supply voltage sag from fast servo current spikes browning out the Pi. In practice, I implemented it this way: max 40°/s = 0.8°/tick at 50Hz enforced in the driver. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"power-supply voltage sag from fast servo current spikes browning out the Pi","recall":"Fast servo motion causes current spikes and controller brownouts. What software-side mitigation would you add?","recall_zh":"快速伺服运动会导致电流尖峰和控制器断电。你会添加哪些软件端缓解措施？","detail_zh":"在 MantaBot 水下机器人中，我用 Servo slew-rate limiting 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：快速伺服电流尖峰导致电源电压骤降，导致 Pi 掉电。具体实现上，驱动程序中强制执行的 max 40°/s = 0.8°/tick at 50Hz。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"快速伺服电流尖峰导致电源电压骤降，导致 Pi 掉电"},
  {"id":"mb-udp-at-50hz-with-timeout-watchdog","proj":"mantabot","cat":"hw","term":"UDP at 50Hz with timeout watchdog","detail":"In the MantaBot underwater robot, I used UDP at 50Hz with timeout watchdog, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — stale-command runaway on link loss. In practice, I implemented it this way: JSON gamepad packets; 500ms silence zeros the gamepad state. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"stale-command runaway on link loss","recall":"How would you prevent stale UDP control packets from leaving an actuator running after the link disappears?","recall_zh":"如何防止过时的 UDP 控制数据包在链接消失后使执行器继续运行？","detail_zh":"在 MantaBot 水下机器人中，我用 UDP at 50Hz with timeout watchdog 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：链接丢失时陈旧命令失控。具体实现上，JSON gamepad packet； 500ms 静音会将游戏手柄状态归零。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"链接丢失时陈旧命令失控"},
  {"id":"mb-i2c-sensor-integration","proj":"mantabot","cat":"hw","term":"I2C sensor integration","detail":"In the MantaBot underwater robot, I used I2C sensor integration, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — depth sensing cleaner than barometric fusion (IMU only needed for vertical velocity). In practice, I implemented it this way: MS5837 pressure sensor at address 0x76, ~2mm depth resolution. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"depth sensing cleaner than barometric fusion (IMU only needed for vertical velocity)","recall":"How would you choose and integrate sensors for accurate depth and vertical-motion estimation?","recall_zh":"你将如何选择和集成传感器来进行精确的深度和垂直运动估计？","detail_zh":"在 MantaBot 水下机器人中，我用 I2C sensor integration 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：深度传感比气压融合更清晰（仅垂直速度需要 IMU）。具体实现上，MS5837压力传感器，地址为0x76，〜2mm深度分辨率。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"深度传感比气压融合更清晰（仅垂直速度需要 IMU）"},
  {"id":"mb-mjpeg-software-encoding","proj":"mantabot","cat":"hw","term":"MJPEG software encoding","detail":"In the MantaBot underwater robot, I used MJPEG software encoding, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — streaming two cameras in one stream within thermal budget. In practice, I implemented it this way: Pi 5 has no hardware H.264 encoder, so CPU MJPEG with side-by-side stereo frame packing. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"streaming two cameras in one stream within thermal budget","recall":"Your embedded platform lacks hardware video encoding. How would you stream multiple cameras within CPU and thermal limits?","recall_zh":"你的嵌入式平台缺乏硬件视频编码。如何在 CPU 和热限制内流式传输多个摄像机？","detail_zh":"在 MantaBot 水下机器人中，我用 MJPEG software encoding 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：在热预算范围内将两台摄像机传输到一个流中。具体实现上，Pi 5没有硬件H.264编码器，因此CPU MJPEG具有并排立体声帧封装。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"在热预算范围内将两台摄像机传输到一个流中"},
  {"id":"mb-networkmanager-dual-interface-wifi","proj":"mantabot","cat":"hw","term":"NetworkManager dual-interface WiFi","detail":"In the MantaBot underwater robot, I used NetworkManager dual-interface WiFi, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — simultaneous field hotspot + internet access. In practice, I implemented it this way: USB dongle as AP + onboard as eduroam client (PEAP/MSCHAPv2), interfaces pinned via udev rules keyed to MAC. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"simultaneous field hotspot + internet access","recall":"How would you configure an embedded robot to provide a field hotspot while maintaining internet access on another interface?","recall_zh":"如何配置嵌入式机器人以提供现场热点，同时在另一个接口上保持互联网访问？","detail_zh":"在 MantaBot 水下机器人中，我用 NetworkManager dual-interface WiFi 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：同时现场热点+互联网接入。具体实现上，USB 加密狗作为 AP + 板载作为 eduroam 客户端 (PEAP/MSCHAPv2)，通过与 MAC 关联的 udev 规则固定接口。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"同时现场热点+互联网接入"},
  {"id":"mb-stereo-calibration-pipeline","proj":"mantabot","cat":"math","term":"Stereo calibration pipeline","detail":"In the MantaBot underwater robot, I used Stereo calibration pipeline, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — converting disparity to metric depth. In practice, I implemented it this way: `cv2.calibrateCamera` per camera → `cv2.stereoCalibrate` (R, T, baseline) → `cv2.stereoRectify` (rectification maps + Q matrix). I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"converting disparity to metric depth","recall":"Walk me through the calibration steps required to turn stereo image disparity into metric depth.","recall_zh":"引导我完成将立体图像视差转换为公制深度所需的校准步骤。","detail_zh":"在 MantaBot 水下机器人中，我用 Stereo calibration pipeline 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：将视差转换为度量深度。具体实现上，每个相机 `cv2.calibrateCamera` → `cv2.stereoCalibrate`（R，T，基线）→ `cv2.stereoRectify`（校正图 + Q 矩阵）。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"将视差转换为度量深度"},
  {"id":"mb-reprojection-error-as-quality-gate","proj":"mantabot","cat":"math","term":"Reprojection error as quality gate","detail":"In the MantaBot underwater robot, I used Reprojection error as quality gate, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — knowing whether a calibration is trustworthy before building on it. In practice, I implemented it this way: RMS > ~0.5–1.0px triggers recapture. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"knowing whether a calibration is trustworthy before building on it","recall":"How do you decide whether a camera calibration is trustworthy enough to use?","recall_zh":"你如何确定相机校准是否值得使用？","detail_zh":"在 MantaBot 水下机器人中，我用 Reprojection error as quality gate 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：在建立校准之前了解校准是否值得信赖。具体实现上，RMS > ~0.5–1.0px 触发重新捕获。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"在建立校准之前了解校准是否值得信赖"},
  {"id":"mb-epipolar-line-rectification-verification","proj":"mantabot","cat":"math","term":"Epipolar-line rectification verification","detail":"In the MantaBot underwater robot, I used Epipolar-line rectification verification, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — a fast go/no-go visual check. In practice, I implemented it this way: corresponding features must lie on the same horizontal scanline after rectification. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"a fast go/no-go visual check","recall":"What's a quick visual check that stereo rectification is working correctly?","recall_zh":"什么是快速目视检查立体校正是否正常工作的方法？","detail_zh":"在 MantaBot 水下机器人中，我用 Epipolar-line rectification verification 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：快速通过/不通过目视检查。具体实现上，校正后相应的特征必须位于同一水平扫描线上。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"快速通过/不通过目视检查"},
  {"id":"mb-q-matrix-disparity-depth-reprojection","proj":"mantabot","cat":"math","term":"Q-matrix disparity→depth reprojection","detail":"In the MantaBot underwater robot, I used Q-matrix disparity→depth reprojection, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — per-pixel metric distance for the depth colormap overlay. In practice, I implemented it this way: 4×4 matrix mapping (u, v, disparity) to 3D. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"per-pixel metric distance for the depth colormap overlay","recall":"How do you convert rectified stereo disparity into per-pixel metric three-dimensional coordinates?","recall_zh":"如何把校正后的双目 disparity 转成每个像素对应的米制三维坐标？","detail_zh":"在 MantaBot 水下机器人中，我用 Q-matrix disparity→depth reprojection 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：为深度伪彩图提供逐像素的米制距离。具体实现上，4×4矩阵映射（u，v，视差）到3D。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"为深度伪彩图提供逐像素的米制距离"},
  {"id":"mb-neighborhood-median-for-distance-readout","proj":"mantabot","cat":"math","term":"Neighborhood median for distance readout","detail":"In the MantaBot underwater robot, I used Neighborhood median for distance readout, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — single-pixel disparity noise/holes making the readout jumpy. In practice, I implemented it this way: cursor distance = median of surrounding disparity pixels. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"single-pixel disparity noise/holes making the readout jumpy","recall":"A depth cursor jumps because individual disparity pixels are noisy or missing. How would you make the readout robust?","recall_zh":"深度光标跳跃是因为各个视差像素有噪声或丢失。如何使读数稳健？","detail_zh":"在 MantaBot 水下机器人中，我用 Neighborhood median for distance readout 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：单像素视差噪声/孔使读数不稳定。具体实现上，光标距离=周围视差像素的中值。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"单像素视差噪声/孔使读数不稳定"},
  {"id":"mb-phase-re-synchronization","proj":"mantabot","cat":"math","term":"Phase re-synchronization","detail":"In the MantaBot underwater robot, I used Phase re-synchronization, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — accumulated phase offset when frequencies diverge and re-converge. In practice, I implemented it this way: gradual phase realignment between two motors after differential turning ends. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"accumulated phase offset when frequencies diverge and re-converge","recall":"Two oscillating actuators accumulate phase error after running at different frequencies. How would you bring them back into alignment smoothly?","recall_zh":"两个振荡执行器在不同频率下运行后会累积相位误差。你将如何使它们顺利地重新对齐？","detail_zh":"在 MantaBot 水下机器人中，我用 Phase re-synchronization 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：频率发散和重新收敛时累积的相位偏移。具体实现上，差速转动结束后，两个电机之间逐渐进行相位重新对准。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"频率发散和重新收敛时累积的相位偏移"},
  {"id":"mb-differential-mixing-math","proj":"mantabot","cat":"math","term":"Differential mixing math","detail":"In the MantaBot underwater robot, I used Differential mixing math, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — independent control of symmetric and asymmetric motion from orthogonal stick axes. In practice, I implemented it this way: common-mode + differential decomposition for turning (freq) and roll (servo). I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"independent control of symmetric and asymmetric motion from orthogonal stick axes","recall":"How would you separate common-mode and differential commands to control symmetric and asymmetric robot motion independently?","recall_zh":"如何分离共模和差分命令来独立控制对称和非对称机器人运动？","detail_zh":"在 MantaBot 水下机器人中，我用 Differential mixing math 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：独立控制正交杆轴的对称和非对称运动。具体实现上，共模+转动（频率）和滚动（伺服）的微分分解。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"独立控制正交杆轴的对称和非对称运动"},
  {"id":"mb-deadzone-clamping-chains","proj":"mantabot","cat":"math","term":"Deadzone + clamping chains","detail":"In the MantaBot underwater robot, I used Deadzone + clamping chains, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — noise rejection and safe operating envelopes at the input layer. In practice, I implemented it this way: deadzone → scale → clamp applied consistently (joystick freq cap 3Hz, D-pad hard cap 6Hz). I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"noise rejection and safe operating envelopes at the input layer","recall":"How should joystick inputs be conditioned to reject noise while enforcing safe actuator limits?","recall_zh":"应如何调节操纵杆输入以抑制噪声，同时执行安全执行器限制？","detail_zh":"在 MantaBot 水下机器人中，我用 Deadzone + clamping chains 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：输入层的噪声抑制和安全操作范围。具体实现上，deadzone → 缩放 → 一致应用钳位（操纵杆频率上限 3Hz，方向键硬上限 6Hz）。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"输入层的噪声抑制和安全操作范围"},
  {"id":"mb-camera-fov-changes-with-resolution-on-imx219","proj":"mantabot","cat":"gotcha","term":"Camera FOV changes with resolution on IMX219","detail":"In the MantaBot underwater robot, I used Camera FOV changes with resolution on IMX219, a failure mode I had to isolate at a component boundary. That addressed a specific project need — invalid stereo geometry when calibration and reconstruction use different sensor crop modes. In practice, I implemented it this way: 480p is a center crop, not a downscale; stereo calibration done at one resolution is invalid at another; fixed by calibrating at the exact 720p reconstruction resolution. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"invalid stereo geometry when calibration and reconstruction use different sensor crop modes","recall":"Why can changing a camera's capture mode invalidate an existing stereo calibration, even when the image is merely lower resolution?","recall_zh":"为什么更改相机的拍摄模式会使现有的立体校准失效，即使图像分辨率较低？","detail_zh":"在 MantaBot 水下机器人中，我把 Camera FOV changes with resolution on IMX219 当作组件边界上的故障模式来排查。它解决的是这个具体问题：当校准和重建使用不同的传感器裁剪模式时立体几何无效。具体实现上，480p是中心裁剪，而不是缩小；在一种分辨率下完成的立体校准在另一种分辨率下无效；通过精确的 720p 重建分辨率进行校准来修复。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"当校准和重建使用不同的传感器裁剪模式时立体几何无效"},
  {"id":"mb-cruise-deadzone-crossing-stutter","proj":"mantabot","cat":"gotcha","term":"Cruise deadzone-crossing stutter","detail":"In the MantaBot underwater robot, I used Cruise deadzone-crossing stutter, a failure mode I had to isolate at a component boundary. That addressed a specific project need — a discontinuous command jump when control returns from live stick input to the cruise snapshot. In practice, I implemented it this way: output snapped discontinuously from live stick values to the locked snapshot; fixed with a 300ms lerp ramp + activate/deactivate hysteresis. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"a discontinuous command jump when control returns from live stick input to the cruise snapshot","recall":"An automatic controller stutters when manual input crosses a deadzone. How would you diagnose and smooth the handoff?","recall_zh":"当手动输入穿过 deadzone 时，自动控制器会出现卡顿。你将如何诊断并顺利进行切换？","detail_zh":"在 MantaBot 水下机器人中，我把 Cruise deadzone-crossing stutter 当作组件边界上的故障模式来排查。它解决的是这个具体问题：当控制从实时摇杆输入返回到巡航快照时，出现不连续的命令跳转。具体实现上，输出从实时摇杆值不连续地瞬间跳到锁定快照；使用 300ms lerp 斜坡 + 激活/停用 hysteresis 进行修复。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"当控制从实时摇杆输入返回到巡航快照时，出现不连续的命令跳转"},
  {"id":"mb-dtoverlay-fails-silently-on-bad-config-txt-section-headers","proj":"mantabot","cat":"gotcha","term":"`dtoverlay` fails silently on bad config.txt section headers","detail":"In the MantaBot underwater robot, I used `dtoverlay` fails silently on bad config.txt section headers, a failure mode I had to isolate at a component boundary. That addressed a specific project need — silent RP1 PWM failure caused by malformed `config.txt` section headers. In practice, I implemented it this way: sysfs PWM nodes go \"zombie\": writes are accepted but never reach RP1 hardware; the servo just doesn't move with zero errors anywhere. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"silent RP1 PWM failure caused by malformed `config.txt` section headers","recall":"A Linux PWM interface accepts writes but the hardware never moves and reports no error. How would you debug the configuration path?","recall_zh":"Linux PWM 接口接受写入，但硬件从不移动并且不报告任何错误。你将如何调试配置路径？","detail_zh":"在 MantaBot 水下机器人中，我把 `dtoverlay` fails silently on bad config.txt section headers 当作组件边界上的故障模式来排查。它解决的是这个具体问题：由格式错误的 `config.txt` 节头导致的静默 RP1 PWM 失败。具体实现上，sysfs PWM节点变成“僵尸”：写入被接受但永远不会到达RP1硬件；伺服系统在任何地方都不会以零误差移动。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"由格式错误的 `config.txt` 节头导致的静默 RP1 PWM 失败"},
  {"id":"mb-zombie-systemd-services","proj":"mantabot","cat":"gotcha","term":"Zombie systemd services","detail":"In the MantaBot underwater robot, I used Zombie systemd services, a failure mode I had to isolate at a component boundary. That addressed a specific project need — legacy units continuing to run under unexpected names after their init files are deleted. In practice, I implemented it this way: a legacy service survived deletion of its init scripts under a different unit name; lesson: full `systemctl` audit after any cleanup, don't trust file deletion. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"legacy units continuing to run under unexpected names after their init files are deleted","recall":"A supposedly deleted service is still running under another name. How would you find and remove the real active unit?","recall_zh":"据称已删除的服务仍在以其他名称运行。你将如何找到并删除真正的活动单元？","detail_zh":"在 MantaBot 水下机器人中，我把 Zombie systemd services 当作组件边界上的故障模式来排查。它解决的是这个具体问题：删除初始化文件后，遗留单元继续以意外名称运行。具体实现上，一个遗留服务在删除其不同单元名称下的初始化脚本后仍然存在；教训：任何清理后的完整 `systemctl` 审核，不要相信文件删除。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"删除初始化文件后，遗留单元继续以意外名称运行"},
