  {"id":"mb-motor-startup-jump","proj":"mantabot","cat":"gotcha","term":"Motor startup jump","detail":"In the MantaBot underwater robot, I used Motor startup jump, a failure mode I had to isolate at a component boundary. That addressed a specific project need — a commanded zero that disagrees with the motor's physical neutral at MIT-mode entry. In practice, I implemented it this way: commanding position 0.0 at MIT-mode entry when the physical neutral wasn't 0.0; fixed by parsing the entry confirmation frame to read the real neutral and gliding to it. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"a commanded zero that disagrees with the motor's physical neutral at MIT-mode entry","recall":"A motor jumps as soon as closed-loop control starts. What initialization assumption would you investigate first?","recall_zh":"一旦闭环控制启动，电机就会跳变。你首先要研究什么初始化假设？","detail_zh":"在 MantaBot 水下机器人中，我把 Motor startup jump 当作组件边界上的故障模式来排查。它解决的是这个具体问题：在 MIT-mode 入口处与电机物理中性点不一致的命令零。具体实现上，当物理中立点不是 0.0 时，在 MIT-mode 入口处指挥位置 0.0；通过解析进入确认帧以读取真实的中性点并滑向它来修复。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"在 MIT-mode 入口处与电机物理中性点不一致的命令零"},
  {"id":"mb-phase-accumulator-drift-between-motors","proj":"mantabot","cat":"gotcha","term":"Phase accumulator drift between motors","detail":"In the MantaBot underwater robot, I used Phase accumulator drift between motors, a failure mode I had to isolate at a component boundary. That addressed a specific project need — phase offset accumulated during differential turns and worsened by independent idle resets. In practice, I implemented it this way: differential turning drives the two accumulators apart, and independent idle resets made it worse; fixed with gradual re-sync plus a coordinated reset requiring both motors idle simultaneously. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"phase offset accumulated during differential turns and worsened by independent idle resets","recall":"Paired oscillators drift after differential commands. How would you resynchronize them without creating another discontinuity?","recall_zh":"成对振荡器在差分命令后发生漂移。如何在不造成另一个不连续性的情况下重新同步它们？","detail_zh":"在 MantaBot 水下机器人中，我把 Phase accumulator drift between motors 当作组件边界上的故障模式来排查。它解决的是这个具体问题：相位偏移在差分匝数期间累积并因独立空闲复位而恶化。具体实现上，差速转动驱动两个累加器分开，独立的怠速复位使情况变得更糟；修复了逐渐重新同步以及需要两个电机同时空闲的协调重置。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"相位偏移在差分匝数期间累积并因独立空闲复位而恶化"},
  {"id":"mb-can-motors-corrupt-magnetometer-readings","proj":"mantabot","cat":"gotcha","term":"CAN motors corrupt magnetometer readings","detail":"In the MantaBot underwater robot, I used CAN motors corrupt magnetometer readings, a failure mode I had to isolate at a component boundary. That addressed a specific project need — compass-based heading unreliable underwater; heading estimation will drift without an alternative reference. In practice, I implemented it this way: motor currents make compass-based heading unreliable underwater; heading estimation will drift without an alternative reference. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"compass-based heading unreliable underwater; heading estimation will drift without an alternative reference","recall":"Motor current corrupts magnetic heading measurements. How would you recognize the interference and plan an alternative reference?","recall_zh":"电机电流会破坏磁航向测量。你将如何识别干扰并计划替代参考？","detail_zh":"在 MantaBot 水下机器人中，我把 CAN motors corrupt magnetometer readings 当作组件边界上的故障模式来排查。它解决的是这个具体问题：基于罗盘的航向在水下不可靠；如果没有替代参考，航向估计将会漂移。具体实现上，电机电流使基于罗盘的航向在水下变得不可靠；如果没有替代参考，航向估计将会漂移。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"基于罗盘的航向在水下不可靠；如果没有替代参考，航向估计将会漂移"},
  {"id":"mb-pi-5-has-no-hardware-h-264-encoder","proj":"mantabot","cat":"gotcha","term":"Pi 5 has no hardware H.264 encoder","detail":"In the MantaBot underwater robot, I used Pi 5 has no hardware H.264 encoder, a failure mode I had to isolate at a component boundary. That addressed a specific project need — streaming stereo video within the Pi 5 thermal budget without relying on nonexistent H.264 hardware. In practice, I implemented it this way: assumed drone-style hardware encoding was available; had to redesign around CPU MJPEG, where underclocking for thermals directly trades away encoding throughput. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"streaming stereo video within the Pi 5 thermal budget without relying on nonexistent H.264 hardware","recall":"A planned hardware codec is unavailable on your embedded target. How would you redesign the video pipeline around real compute and thermal constraints?","recall_zh":"计划的硬件编解码器在你的嵌入式目标上不可用。你将如何围绕实际计算和热约束重新设计视频 pipeline？","detail_zh":"在 MantaBot 水下机器人中，我把 Pi 5 has no hardware H.264 encoder 当作组件边界上的故障模式来排查。它解决的是这个具体问题：在 Pi 5 热预算内流式传输立体声视频，而无需依赖不存在的 H.264 硬件。具体实现上，假设无人机式硬件编码可用；必须围绕 CPU MJPEG 重新设计，其中散热的降频直接牺牲了编码吞吐量。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"在 Pi 5 热预算内流式传输立体声视频，而无需依赖不存在的 H.264 硬件"},
  {"id":"mb-wifi-interface-name-drift","proj":"mantabot","cat":"gotcha","term":"WiFi interface name drift","detail":"In the MantaBot underwater robot, I used WiFi interface name drift, a failure mode I had to isolate at a component boundary. That addressed a specific project need — AP and eduroam profiles binding to the wrong radios after wlan0/wlan1 swap on reboot. In practice, I implemented it this way: wlan0/wlan1 swap identities across reboots, breaking AP/eduroam profile binding; fixed with udev rules keyed to MAC addresses. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"AP and eduroam profiles binding to the wrong radios after wlan0/wlan1 swap on reboot","recall":"Network interface names swap across reboots and break profile binding. How would you make device identity persistent?","recall_zh":"网络接口名称在重新启动时交换并破坏配置文件绑定。如何使设备身份持久化？","detail_zh":"在 MantaBot 水下机器人中，我把 WiFi interface name drift 当作组件边界上的故障模式来排查。它解决的是这个具体问题：重启后 wlan0/wlan1 交换后，AP 和 eduroam 配置文件绑定到错误的无线电。具体实现上，wlan0/wlan1 在重新启动时交换身份，破坏 AP/eduroam 配置文件绑定；修复了以 MAC 地址为关键的 udev 规则。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"重启后 wlan0/wlan1 交换后，AP 和 eduroam 配置文件绑定到错误的无线电"},
  {"id":"mb-gamepad-triggers-already-normalized-client-side","proj":"mantabot","cat":"gotcha","term":"Gamepad triggers already normalized client-side","detail":"In the MantaBot underwater robot, I used Gamepad triggers already normalized client-side, a failure mode I had to isolate at a component boundary. That addressed a specific project need — double-transforming an input value because the server assumes the client sent raw data. In practice, I implemented it this way: server-side re-normalization double-processed the value; lesson: verify what the input layer actually delivers before transforming it. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"double-transforming an input value because the server assumes the client sent raw data","recall":"An input value is transformed twice across client and server layers. How would you trace and prevent duplicate normalization?","recall_zh":"输入值在客户端层和服务器层之间转换两次。你将如何跟踪和防止重复标准化？","detail_zh":"在 MantaBot 水下机器人中，我把 Gamepad triggers already normalized client-side 当作组件边界上的故障模式来排查。它解决的是这个具体问题：对输入值进行双重转换，因为服务器假设客户端发送了原始数据。具体实现上，服务器端重新归一化对值进行双重处理；教训：在转换输入层之前验证输入层实际提供的内容。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"对输入值进行双重转换，因为服务器假设客户端发送了原始数据"},
  {"id":"mb-channel-order-flip-in-picamera2-rgb888-pil-pipeline","proj":"mantabot","cat":"gotcha","term":"Channel-order flip in picamera2 RGB888 + PIL pipeline","detail":"In the MantaBot underwater robot, I used Channel-order flip in picamera2 RGB888 + PIL pipeline, a failure mode I had to isolate at a component boundary. That addressed a specific project need — wrong image colors caused by applying an unnecessary BGR/RGB channel swap. In practice, I implemented it this way: a spurious BGR/RGB swap gave wrong colors; classic mismatch between OpenCV/picamera2 (BGR-ish conventions) and PIL (RGB). I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"wrong image colors caused by applying an unnecessary BGR/RGB channel swap","recall":"Camera colors look wrong after passing frames through multiple imaging libraries. What representation mismatch would you check?","recall_zh":"将帧传递给多个图像库后，相机颜色看起来不正确。你会检查哪些表示不匹配？","detail_zh":"在 MantaBot 水下机器人中，我把 Channel-order flip in picamera2 RGB888 + PIL pipeline 当作组件边界上的故障模式来排查。它解决的是这个具体问题：由于应用不必要的 BGR/RGB 通道交换而导致错误的图像颜色。具体实现上，一个虚假的 BGR/RGB 交换给出了错误的颜色； OpenCV/picamera2（BGR-ish 约定）和 PIL（RGB）之间的经典不匹配。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"由于应用不必要的 BGR/RGB 通道交换而导致错误的图像颜色"},
  {"id":"mb-gui-e-stop-didn-t-trigger-the-full-reset-sequence","proj":"mantabot","cat":"gotcha","term":"GUI E-Stop didn't trigger the full reset sequence","detail":"In the MantaBot underwater robot, I used GUI E-Stop didn't trigger the full reset sequence, a failure mode I had to isolate at a component boundary. That addressed a specific project need — an incomplete UI safety reset and drift between duplicated GUI and gamepad E-Stop paths. In practice, I implemented it this way: found via a static consistency audit after many iterations; UI-triggered safety paths drift from gamepad-triggered ones unless audited. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"an incomplete UI safety reset and drift between duplicated GUI and gamepad E-Stop paths","recall":"Two emergency-stop entry points behave differently. How would you audit and prevent safety-path drift?","recall_zh":"两个紧急停止入口点的行为不同。你将如何审核和防止安全路径漂移？","detail_zh":"在 MantaBot 水下机器人中，我把 GUI E-Stop didn't trigger the full reset sequence 当作组件边界上的故障模式来排查。它解决的是这个具体问题：不完整的 UI 安全重置以及重复的 GUI 和游戏手柄急停路径之间的漂移。具体实现上，通过多次迭代后的静态一致性审计发现；除非经过审核，否则 UI 触发的安全路径与游戏手柄触发的安全路径有所不同。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"不完整的 UI 安全重置以及重复的 GUI 和游戏手柄急停路径之间的漂移"},
  {"id":"mb-open-campus-wifi-logs-out-sessions-periodically","proj":"mantabot","cat":"gotcha","term":"Open campus WiFi logs out sessions periodically","detail":"In the MantaBot underwater robot, I used Open campus WiFi logs out sessions periodically, a failure mode I had to isolate at a component boundary. That addressed a specific project need — persistent 24/7 connectivity for a headless robot. In practice, I implemented it this way: unusable for 24/7 headless operation; eduroam (PEAP + MSCHAPv2) required for persistent connectivity. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"persistent 24/7 connectivity for a headless robot","recall":"A headless robot loses network sessions periodically. How would you choose and validate a more persistent connectivity strategy?","recall_zh":"无头机器人会定期丢失网络会话。你将如何选择和验证更持久的连接策略？","detail_zh":"在 MantaBot 水下机器人中，我把 Open campus WiFi logs out sessions periodically 当作组件边界上的故障模式来排查。它解决的是这个具体问题：无头机器人的持久 24/7 连接。具体实现上，无法用于24/7无头操作；持久连接所需的 eduroam (PEAP + MSCHAPv2)。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"无头机器人的持久 24/7 连接"},
  {"id":"mb-arm64-native-binary-sigsegv-in-the-vs-code-extension","proj":"mantabot","cat":"gotcha","term":"ARM64 native binary SIGSEGV in the VS Code extension","detail":"In the MantaBot underwater robot, I used ARM64 native binary SIGSEGV in the VS Code extension, a failure mode I had to isolate at a component boundary. That addressed a specific project need — a bundled native extension binary crashing on ARM64 Pi 5. In practice, I implemented it this way: bundled binary crashed on Pi 5; worked around by installing the npm CLI, bypassing the extension's binary. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"a bundled native extension binary crashing on ARM64 Pi 5","recall":"A bundled development-tool binary crashes on an embedded architecture. How would you isolate the compatibility issue and find a practical fallback?","recall_zh":"捆绑的开发工具二进制文件在嵌入式架构上崩溃。你将如何隔离兼容性问题并找到实际的后备方案？","detail_zh":"在 MantaBot 水下机器人中，我把 ARM64 native binary SIGSEGV in the VS Code extension 当作组件边界上的故障模式来排查。它解决的是这个具体问题：捆绑的本机扩展二进制文件在 ARM64 Pi 5 上崩溃。具体实现上，捆绑的二进制文件在 Pi 5 上崩溃；通过安装 npm CLI 来解决，绕过扩展的二进制文件。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"捆绑的本机扩展二进制文件在 ARM64 Pi 5 上崩溃"},
  {"id":"vca-state-machine-latched-motion-mode","proj":"vcabot","cat":"algo","term":"State machine (latched motion mode)","detail":"In the VCA actuator testbed, I used State machine (latched motion mode), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — discrete triggering from a noisy continuous sensor signal. In practice, I implemented it this way: angle crossing ±40° latches full push on the corresponding channel, releases on return through 0°. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"discrete triggering from a noisy continuous sensor signal","recall":"How would you convert a noisy continuous angle signal into stable, discrete actuator commands?","recall_zh":"如何将嘈杂的连续角度信号转换为稳定、离散的执行器命令？","detail_zh":"在 VCA 执行器测试台中，我采用了 State machine (latched motion mode)，把状态、决策或数据流显式化。它解决的是这个具体问题：来自嘈杂的连续传感器信号的离散触发。具体实现上，角度交叉±40°锁存相应通道上的全推，通过0°返回时释放。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"来自嘈杂的连续传感器信号的离散触发"},
  {"id":"vca-watchdog-timer-pattern","proj":"vcabot","cat":"algo","term":"Watchdog timer pattern","detail":"In the VCA actuator testbed, I used Watchdog timer pattern, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — fail-safe behavior on wireless link loss. In practice, I implemented it this way: driver STOPs both actuators if no command in 500ms (`millis()` delta check in `loop()`). I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"fail-safe behavior on wireless link loss","recall":"What fail-safe would you add so actuators stop automatically when wireless commands stop arriving?","recall_zh":"你会添加什么故障保护功能，以便执行器在无线命令停止到达时自动停止？","detail_zh":"在 VCA 执行器测试台中，我采用了 Watchdog timer pattern，把状态、决策或数据流显式化。它解决的是这个具体问题：无线链路丢失时的故障安全行为。具体实现上，如果 500ms 中没有命令（`millis()` 增量检查 `loop()`），驱动程序将停止两个执行器。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"无线链路丢失时的故障安全行为"},
  {"id":"vca-priority-queue-for-command-scheduling","proj":"vcabot","cat":"algo","term":"Priority queue for command scheduling","detail":"In the VCA actuator testbed, I used Priority queue for command scheduling, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — bandwidth contention between telemetry polling, sine ticks, and emergency stop. In practice, I implemented it this way: GUI backend enforces 50ms min serial interval with STOP always highest priority. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"bandwidth contention between telemetry polling, sine ticks, and emergency stop","recall":"Telemetry, motion updates, and emergency commands share a limited link. How would you schedule them so urgent traffic always wins?","recall_zh":"遥测、运动更新和紧急命令共享一条带宽有限的链路。你会怎样调度，保证紧急命令永远优先？","detail_zh":"在 VCA 执行器测试台中，我采用了 Priority queue for command scheduling，把状态、决策或数据流显式化。它解决的是这个具体问题：遥测轮询、正弦信号和紧急停止之间的带宽争用。具体实现上，GUI后端强制50ms最小串行间隔，STOP始终具有最高优先级。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"遥测轮询、正弦信号和紧急停止之间的带宽争用"},
  {"id":"vca-bang-bang-control-accepted-as-constraint","proj":"vcabot","cat":"algo","term":"Bang-bang control (accepted as constraint)","detail":"In the VCA actuator testbed, I used Bang-bang control (accepted as constraint), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — the \"which control regime am I actually in\" question and led to square-wave beat design instead of sine. In practice, I implemented it this way: past ~170 PWM the joint snaps to ±45° limits with no stable intermediates. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"the \"which control regime am I actually in\" question and led to square-wave beat design instead of sine","recall":"A plant has no stable intermediate output states. How does that change your controller and trajectory choices?","recall_zh":"被控对象没有稳定的中间输出。这个约束会怎样改变你的控制器和轨迹设计？","detail_zh":"在 VCA 执行器测试台中，我采用了 Bang-bang control (accepted as constraint)，把状态、决策或数据流显式化。它解决的是这个具体问题：识别真实的 bang-bang 工作区间，并据此选择方波而不是正弦轨迹。具体实现上，PWM 超过约 170 后，关节会直接跳到 ±45° 限位，中间没有稳定工作点。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"识别真实的 bang-bang 工作区间，并据此选择方波而不是正弦轨迹"},
  {"id":"vca-metronome-keep-alive-loop","proj":"vcabot","cat":"algo","term":"Metronome/keep-alive loop","detail":"In the VCA actuator testbed, I used Metronome/keep-alive loop, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — sustained motion under a watchdog without firmware changes. In practice, I implemented it this way: PC re-sends direction every ~250ms within each half-period. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"sustained motion under a watchdog without firmware changes","recall":"A watchdog protects the actuator, but periodic motions include long holds. How would you keep the system alive safely?","recall_zh":"watchdog 可以保护执行器，但周期性运动包括长时间保持。你将如何保持系统安全运行？","detail_zh":"在 VCA 执行器测试台中，我采用了 Metronome/keep-alive loop，把状态、决策或数据流显式化。它解决的是这个具体问题：watchdog 下的持续运动，无需更改固件。具体实现上，PC 在每个半周期内每隔 ~250ms 重新发送方向。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"watchdog 下的持续运动，无需更改固件"},
  {"id":"vca-abstraction-layering-for-polarity","proj":"vcabot","cat":"algo","term":"Abstraction layering for polarity","detail":"In the VCA actuator testbed, I used Abstraction layering for polarity, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — a physical wiring inversion without contaminating any upstream logic. In practice, I implemented it this way: `CHANNEL_INVERT = {\"B\": True}` applied only at the lowest serial translation function. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"a physical wiring inversion without contaminating any upstream logic","recall":"One actuator is wired with reversed polarity. At which software layer should you compensate, and why?","recall_zh":"一个执行器的接线极性相反。你应该在哪个软件层进行补偿，为什么？","detail_zh":"在 VCA 执行器测试台中，我采用了 Abstraction layering for polarity，把状态、决策或数据流显式化。它解决的是这个具体问题：物理接线反转，不会污染任何上游逻辑。具体实现上，`CHANNEL_INVERT = {\"B\": True}`仅应用于最低串行翻译功能。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"物理接线反转，不会污染任何上游逻辑"},
  {"id":"vca-slew-rate-limiting-antagonistic-co-activation","proj":"vcabot","cat":"algo","term":"Slew-rate limiting + antagonistic co-activation","detail":"In the VCA actuator testbed, I used Slew-rate limiting + antagonistic co-activation, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — jerky output from opposing actuators in a threshold-dominated plant. In practice, I implemented it this way: solved jerky output when driving two opposing actuators through a threshold-dominated plant. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"jerky output from opposing actuators in a threshold-dominated plant","recall":"How would you reduce jerky motion when opposing actuators drive a threshold-dominated mechanism?","recall_zh":"当相反的执行器驱动阈值主导的机构时，如何减少抖动？","detail_zh":"在 VCA 执行器测试台中，我采用了 Slew-rate limiting + antagonistic co-activation，把状态、决策或数据流显式化。它解决的是这个具体问题：在阈值主导的被控对象中，反向执行器的输出不稳定。具体实现上，解决了驱动两个相对的执行器通过阈值主导的设备时的抖动输出问题。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"在阈值主导的被控对象中，反向执行器的输出不稳定"},
  {"id":"vca-modular-arithmetic-wrap-around-handling","proj":"vcabot","cat":"algo","term":"Modular arithmetic wrap-around handling","detail":"In the VCA actuator testbed, I used Modular arithmetic wrap-around handling, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — angle discontinuity in calibration mapping. In practice, I implemented it this way: 12-bit encoder crossing the 0/4095 boundary. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"angle discontinuity in calibration mapping","recall":"How do you compute continuous angle changes from a circular encoder that wraps at its numeric boundary?","recall_zh":"如何计算在其数字边界处环绕的圆形编码器的连续角度变化？","detail_zh":"在 VCA 执行器测试台中，我采用了 Modular arithmetic wrap-around handling，把状态、决策或数据流显式化。它解决的是这个具体问题：校准映射中的角度不连续性。具体实现上，12-bit编码器跨越0/4095边界。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"校准映射中的角度不连续性"},
  {"id":"vca-packed-structs-over-the-wire","proj":"vcabot","cat":"pylang","term":"Packed structs over the wire","detail":"In the VCA actuator testbed, I used Packed structs over the wire, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — binary protocol compatibility across two MCUs. In practice, I implemented it this way: `__attribute__((packed))` C structs (5-byte VcaCommand, 6-byte VcaAck) with matched enum values on both nodes. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"binary protocol compatibility across two MCUs","recall":"How would you design a compact binary protocol so two microcontrollers agree exactly on layout and enum values?","recall_zh":"你将如何设计一个紧凑的二进制协议，以便两个微控制器在布局和枚举值上完全一致？","detail_zh":"在 VCA 执行器测试台中，我用 Packed structs over the wire 来划分软件职责和接口边界。它解决的是这个具体问题：两个 MCU 之间的二进制协议兼容性。具体实现上，`__attribute__((packed))` C 结构体（5-byte VcaCommand、6-byte VcaAck）在两个节点上具有匹配的枚举值。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"两个 MCU 之间的二进制协议兼容性"},
  {"id":"vca-asyncio-aiohttp-websocket-telemetry-10-20hz","proj":"vcabot","cat":"pylang","term":"asyncio + aiohttp + WebSocket telemetry (10–20Hz)","detail":"In the VCA actuator testbed, I used asyncio + aiohttp + WebSocket telemetry (10–20Hz), a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — concurrent serial I/O, HTTP serving, and real-time browser telemetry in one process. In practice, I implemented it this way: solved concurrent serial I/O, HTTP serving, and real-time push to a browser in one process. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"concurrent serial I/O, HTTP serving, and real-time browser telemetry in one process","recall":"How would you combine serial communication, HTTP serving, and live browser telemetry in one nonblocking process?","recall_zh":"如何将串行通信、HTTP 服务和实时浏览器遥测结合到一个非阻塞进程中？","detail_zh":"在 VCA 执行器测试台中，我用 asyncio + aiohttp + WebSocket telemetry (10–20Hz) 来划分软件职责和接口边界。它解决的是这个具体问题：一个进程中的并发串行 I/O、HTTP 服务和实时浏览器遥测。具体实现上，在一个进程中解决并发串行 I/O、HTTP 服务和实时推送到浏览器的问题。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"一个进程中的并发串行 I/O、HTTP 服务和实时浏览器遥测"},
  {"id":"vca-pyserial-with-timeouts-regex-response-filtering","proj":"vcabot","cat":"pylang","term":"pyserial with timeouts + regex response filtering","detail":"In the VCA actuator testbed, I used pyserial with timeouts + regex response filtering, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — parsing a specific reply out of a noisy shared serial stream, never blocking indefinitely. In practice, I implemented it this way: Commander interleaves status lines with responses (`ANGLE: 2048 (180.0 deg)`). I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"parsing a specific reply out of a noisy shared serial stream, never blocking indefinitely","recall":"A serial stream mixes replies with unsolicited status lines. How would you extract the response you need without blocking forever?","recall_zh":"串行流将回复与未经请求的状态行混合在一起。如何提取所需的响应而不永远阻塞？","detail_zh":"在 VCA 执行器测试台中，我用 pyserial with timeouts + regex response filtering 来划分软件职责和接口边界。它解决的是这个具体问题：从嘈杂的共享串行流中解析特定的回复，永远不会无限期地阻塞。具体实现上，Commander 将状态行与响应交错 (`ANGLE: 2048 (180.0 deg)`)。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"从嘈杂的共享串行流中解析特定的回复，永远不会无限期地阻塞"},
  {"id":"vca-config-blocks-at-file-top","proj":"vcabot","cat":"pylang","term":"CONFIG blocks at file top","detail":"In the VCA actuator testbed, I used CONFIG blocks at file top, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — reproducibility and quick retuning between experiments. In practice, I implemented it this way: all magic numbers (pins, thresholds, intervals) in one section. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"reproducibility and quick retuning between experiments","recall":"How would you organize hardware pins, thresholds, and timing constants to make experiments reproducible and easy to retune?","recall_zh":"你将如何组织硬件引脚、阈值和定时常数以使实验可重复且易于重新调整？","detail_zh":"在 VCA 执行器测试台中，我用 CONFIG blocks at file top 来划分软件职责和接口边界。它解决的是这个具体问题：实验之间的再现性和快速重新调整。具体实现上，所有幻数（引脚、阈值、间隔）都在一个部分中。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"实验之间的再现性和快速重新调整"},
  {"id":"vca-dataclasses-json-for-calibration-persistence","proj":"vcabot","cat":"pylang","term":"Dataclasses + JSON for calibration persistence","detail":"In the VCA actuator testbed, I used Dataclasses + JSON for calibration persistence, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — saving, reloading, and validating sensor calibration across sessions. In practice, I implemented it this way: solved saving/reloading/validating sensor calibration across sessions. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"saving, reloading, and validating sensor calibration across sessions","recall":"How would you persist sensor calibration between sessions while validating the data when it reloads?","recall_zh":"如何在会话之间保持传感器校准，同时在重新加载时验证数据？","detail_zh":"在 VCA 执行器测试台中，我用 Dataclasses + JSON for calibration persistence 来划分软件职责和接口边界。它解决的是这个具体问题：跨会话保存、重新加载和验证传感器校准。具体实现上，解决了跨会话保存/重新加载/验证传感器校准的问题。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"跨会话保存、重新加载和验证传感器校准"},
  {"id":"vca-sinusoidal-trajectory-generation-with-anti-phase-channels","proj":"vcabot","cat":"pylang","term":"Sinusoidal trajectory generation with anti-phase channels","detail":"In the VCA actuator testbed, I used Sinusoidal trajectory generation with anti-phase channels, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — coordinated dual-actuator drive from a single phase variable. In practice, I implemented it this way: `opposite_sine` generator for antagonistic pairs. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"coordinated dual-actuator drive from a single phase variable","recall":"How would you generate coordinated sinusoidal commands for an antagonistic actuator pair from one phase variable?","recall_zh":"如何只用一个 phase 变量，为一对拮抗执行器生成协调的正弦命令？","detail_zh":"在 VCA 执行器测试台中，我用 Sinusoidal trajectory generation with anti-phase channels 来划分软件职责和接口边界。它解决的是这个具体问题：用同一个 phase 变量协调驱动两个拮抗执行器。具体实现上，对抗对的 `opposite_sine` 生成器。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"用同一个 phase 变量协调驱动两个拮抗执行器"},
  {"id":"vca-esp-now-commander-driver-topology","proj":"vcabot","cat":"hw","term":"ESP-NOW commander/driver topology","detail":"In the VCA actuator testbed, I used ESP-NOW commander/driver topology, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — low-latency wireless control without WiFi infrastructure. In practice, I implemented it this way: PC→USB serial→Commander→ESP-NOW→Driver, fixed channel 1, `WIFI_STA` without AP, optional strict MAC pairing. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"low-latency wireless control without WiFi infrastructure","recall":"When would you choose a peer-to-peer wireless protocol over infrastructure WiFi for microcontroller control?","recall_zh":"你何时会选择基于基础设施 WiFi 的点对点无线协议来进行微控制器控制？","detail_zh":"在 VCA 执行器测试台中，我用 ESP-NOW commander/driver topology 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：低延迟无线控制，无需 WiFi 基础设施。具体实现上，PC→USB串口→Commander→ESP-NOW→Driver，固定通道1，`WIFI_STA`不带AP，可选严格MAC配对。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"低延迟无线控制，无需 WiFi 基础设施"},
  {"id":"vca-ledc-pwm-esp32-arduino-core-v3-x","proj":"vcabot","cat":"hw","term":"LEDC PWM (ESP32 Arduino Core v3.x)","detail":"In the VCA actuator testbed, I used LEDC PWM (ESP32 Arduino Core v3.x), a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — silent, runtime-retunable PWM (and knowing the v2→v3 API break). In practice, I implemented it this way: `ledcAttach/ledcWrite/ledcChangeFrequency`, 8-bit @ 20kHz, verified clock allows it. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"silent, runtime-retunable PWM (and knowing the v2→v3 API break)","recall":"How would you verify a microcontroller PWM configuration when the SDK API changed between major versions?","recall_zh":"当 SDK API 在主要版本之间发生变化时，你如何验证微控制器 PWM 配置？","detail_zh":"在 VCA 执行器测试台中，我用 LEDC PWM (ESP32 Arduino Core v3.x) 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：静默、运行时可调整的 PWM （并且知道 v2→v3 API 中断）。具体实现上，`ledcAttach/ledcWrite/ledcChangeFrequency`，8-bit @ 20kHz，经过验证的时钟允许它。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"静默、运行时可调整的 PWM （并且知道 v2→v3 API 中断）"},
  {"id":"vca-drv8871-truth-table-decay-modes","proj":"vcabot","cat":"hw","term":"DRV8871 truth table + decay modes","detail":"In the VCA actuator testbed, I used DRV8871 truth table + decay modes, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — understanding why decay mode changes the motion threshold and low-PWM fidelity. In practice, I implemented it this way: fast decay = PWM on one IN, other LOW (coast off-phase); slow decay = one IN held HIGH + *inverted* PWM on the other (brake off-phase). I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"understanding why decay mode changes the motion threshold and low-PWM fidelity","recall":"What's the practical difference between fast and slow H-bridge decay, and how can each affect low-duty-cycle motion?","recall_zh":"快速和慢速 H-bridge 衰减之间的实际区别是什么？每种衰减如何影响低占空比运动？","detail_zh":"在 VCA 执行器测试台中，我用 DRV8871 truth table + decay modes 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：了解为什么衰减模式会改变运动阈值和低 PWM 保真度。具体实现上，快速衰减=一个IN上的PWM，另一个LOW（海岸离相）；缓慢衰减 = 一个 IN 保持 HIGH + *反向* PWM 放在另一个上（制动断相）。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"了解为什么衰减模式会改变运动阈值和低 PWM 保真度"},
  {"id":"vca-i2c-encoder-readout","proj":"vcabot","cat":"hw","term":"I2C encoder readout","detail":"In the VCA actuator testbed, I used I2C encoder readout, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — joint feedback and the \"same chip, different address\" trap. In practice, I implemented it this way: AS5600L at nonstandard address 0x40 (vs 0x36 for AS5600), 12-bit angle from registers 0x0E/0x0F combined. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"joint feedback and the \"same chip, different address\" trap","recall":"How would you read a multi-byte angle register over I2C and verify that you're talking to the correct device?","recall_zh":"如何通过 I2C 读取多字节角度寄存器并验证你正在与正确的设备通信？","detail_zh":"在 VCA 执行器测试台中，我用 I2C encoder readout 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：联合反馈与“同芯片、不同地址”陷阱。具体实现上，AS5600L位于非标准地址0x40（相对于AS5600的0x36），12-bit角度来自寄存器0x0E/0x0F组合。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"联合反馈与“同芯片、不同地址”陷阱"},
  {"id":"vca-buck-converter-design-from-datasheet-mp2338","proj":"vcabot","cat":"hw","term":"Buck converter design from datasheet (MP2338)","detail":"In the VCA actuator testbed, I used Buck converter design from datasheet (MP2338), a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — replacing a failure-prone module with an onboard regulator. In practice, I implemented it this way: Vref 0.5V feedback divider (90.9k/10k), 6.8µH inductor, 2×22µF output, 22nF soft-start, EN pin divider because EN max is 6V < VIN. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"replacing a failure-prone module with an onboard regulator","recall":"Walk me through selecting a buck converter's feedback network, inductor, capacitors, soft start, and enable protection from its datasheet.","recall_zh":"指导我从数据表中选择降压转换器的反馈网络、电感器、电容器、软启动并启用保护。","detail_zh":"在 VCA 执行器测试台中，我用 Buck converter design from datasheet (MP2338) 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：用板载稳压器替换容易发生故障的模块。具体实现上，Vref 0.5V反馈分频器（90.9k/10k），6.8μH电感器，2×22μF输出，22nF软启动，EN引脚分频器，因为EN max是6V < VIN。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"用板载稳压器替换容易发生故障的模块"},
  {"id":"vca-current-sensing-via-ipropi-drv8874","proj":"vcabot","cat":"hw","term":"Current sensing via IPROPI (DRV8874)","detail":"In the VCA actuator testbed, I used Current sensing via IPROPI (DRV8874), a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — motor current feedback within ADC limits. In practice, I implemented it this way: sense resistor sized at 2.2kΩ because 10kΩ at 1A → 8.3V, exceeding the 3.3V ADC ceiling. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"motor current feedback within ADC limits","recall":"How do you size a current-sense resistor so the expected load remains within a microcontroller ADC range?","recall_zh":"如何确定电流检测电阻的大小，以使预期负载保持在微控制器 ADC 范围内？","detail_zh":"在 VCA 执行器测试台中，我用 Current sensing via IPROPI (DRV8874) 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：电机电流反馈在 ADC 限制内。具体实现上，感应电阻大小为 2.2kΩ，因为 10kΩ 在 1A → 8.3V，超过了 3.3V ADC 上限。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"电机电流反馈在 ADC 限制内"},
  {"id":"vca-protection-chain-design","proj":"vcabot","cat":"hw","term":"Protection chain design","detail":"In the VCA actuator testbed, I used Protection chain design, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — three distinct failure paths from one real board-kill event. In practice, I implemented it this way: PTC fuse in series at 12V entry, TVS in parallel clamping back-EMF, Schottky in series blocking USB 5V backfeed through buck body diodes. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"three distinct failure paths from one real board-kill event","recall":"How would you protect a mixed USB and actuator power system against overcurrent, back-EMF, and reverse backfeed?","recall_zh":"如何保护混合 USB 和执行器电源系统免受过流、反向 EMF 和反向反馈的影响？","detail_zh":"在 VCA 执行器测试台中，我用 Protection chain design 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：来自一次真实的电路板损坏事件的三种不同的故障路径。具体实现上，PTC熔断器在12V入口处串联，TVS并联钳位反向EMF，肖特基串联阻断USB 5V通过降压体二极管反馈。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"来自一次真实的电路板损坏事件的三种不同的故障路径"},
  {"id":"vca-decoupling-strategy","proj":"vcabot","cat":"hw","term":"Decoupling strategy","detail":"In the VCA actuator testbed, I used Decoupling strategy, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — high-frequency noise at each IC and low-frequency transients on the shared power rail. In practice, I implemented it this way: 100nF per IC + bulk electrolytic on the rail: frequency-domain division of labor, not capacitance summation. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"high-frequency noise at each IC and low-frequency transients on the shared power rail","recall":"Why do boards need both local ceramic decoupling and bulk rail capacitance instead of simply adding capacitance anywhere?","recall_zh":"为什么电路板需要局部陶瓷去耦和大容量轨电容，而不是简单地在任何地方添加电容？","detail_zh":"在 VCA 执行器测试台中，我用 Decoupling strategy 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：每个 IC 处的高频噪声和共享电源轨上的低频瞬态。具体实现上，100nF per IC + 轨上的体电解：频域分工，而不是电容求和。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"每个 IC 处的高频噪声和共享电源轨上的低频瞬态"},
  {"id":"vca-strouhal-number-scaling-st-f-a-u","proj":"vcabot","cat":"math","term":"Strouhal number scaling (St = f·A/U)","detail":"In the VCA actuator testbed, I used Strouhal number scaling (St = f·A/U), a numerical technique for turning system behavior into something measurable. That addressed a specific project need — translating actuation parameters into the physically meaningful nondimensional control variable. In practice, I implemented it this way: targeting 0.2–0.4 for a thrust (reverse Kármán) wake. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"translating actuation parameters into the physically meaningful nondimensional control variable","recall":"How does nondimensional scaling help translate actuator frequency, amplitude, and flow speed into a meaningful experimental regime?","recall_zh":"无量纲缩放如何帮助将执行器频率、振幅和流速转化为有意义的实验状态？","detail_zh":"在 VCA 执行器测试台中，我用 Strouhal number scaling (St = f·A/U) 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：将驱动参数转换为具有物理意义的无量纲控制变量。具体实现上，以 0.2–0.4 为目标进行推力（反向卡门）尾流。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"将驱动参数转换为具有物理意义的无量纲控制变量"},
  {"id":"vca-empirical-a-f-characterization-with-iterative-solve","proj":"vcabot","cat":"math","term":"Empirical A(f) characterization with iterative solve","detail":"In the VCA actuator testbed, I used Empirical A(f) characterization with iterative solve, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — parameter selection when the \"constant\" isn't constant. In practice, I implemented it this way: amplitude drops with frequency due to rise-time limits, and f = St·U/A depends on A(f), so solve by 1–2 iterations. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"parameter selection when the \"constant\" isn't constant","recall":"If oscillation amplitude depends on frequency, how would you solve for a target nondimensional operating point?","recall_zh":"如果振荡幅度取决于频率，你将如何求解目标无量纲工作点？","detail_zh":"在 VCA 执行器测试台中，我用 Empirical A(f) characterization with iterative solve 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：当“常数”不是常数时的参数选择。具体实现上，由于上升时间限制，幅度随频率下降，并且 f = St·U/A 取决于 A(f)，因此通过 1–2 迭代进行求解。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"当“常数”不是常数时的参数选择"},
  {"id":"vca-phase-averaging-over-cycles","proj":"vcabot","cat":"math","term":"Phase averaging over cycles","detail":"In the VCA actuator testbed, I used Phase averaging over cycles, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — extracting coherent flow structure from noisy PIV fields. In practice, I implemented it this way: discard transient cycles, average tens of steady cycles per case. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"extracting coherent flow structure from noisy PIV fields","recall":"How would you extract a coherent periodic flow structure from noisy measurements collected over many cycles?","recall_zh":"如何从多个周期收集的噪声测量中提取相干的周期性流结构？","detail_zh":"在 VCA 执行器测试台中，我用 Phase averaging over cycles 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：从嘈杂的 PIV 场中提取相干流结构。具体实现上，丢弃瞬态周期，平均每个案例数十个稳定周期。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"从嘈杂的 PIV 场中提取相干流结构"},
  {"id":"vca-post-hoc-image-based-phase-recovery","proj":"vcabot","cat":"math","term":"Post-hoc image-based phase recovery","detail":"In the VCA actuator testbed, I used Post-hoc image-based phase recovery, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — phase-locking without hardware triggers over a jittery wireless link. In practice, I implemented it this way: track tail kinematics and cylinder shedding phase from the PIV frames themselves, assign phase per frame afterward. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"phase-locking without hardware triggers over a jittery wireless link","recall":"How would you recover experiment phase from recorded images when reliable hardware synchronization is unavailable?","recall_zh":"当可靠的硬件同步不可用时，如何从记录的图像中恢复实验阶段？","detail_zh":"在 VCA 执行器测试台中，我用 Post-hoc image-based phase recovery 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：通过不稳定的无线链路进行锁相，无需硬件触发。具体实现上，从 PIV 帧本身跟踪尾部运动学和气缸脱落相位，然后为每帧分配相位。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"通过不稳定的无线链路进行锁相，无需硬件触发"},
  {"id":"vca-lock-in-detection-via-relative-phase-stationarity","proj":"vcabot","cat":"math","term":"Lock-in detection via relative phase stationarity","detail":"In the VCA actuator testbed, I used Lock-in detection via relative phase stationarity, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — a quantitative criterion for an emergent phenomenon. In practice, I implemented it this way: Kármán gait entrainment identified when tail-beat vs shedding phase stops drifting. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"a quantitative criterion for an emergent phenomenon","recall":"What quantitative signal would tell you that two periodic physical processes have become entrained?","recall_zh":"什么定量信号会告诉你两个周期性物理过程已被夹带？","detail_zh":"在 VCA 执行器测试台中，我用 Lock-in detection via relative phase stationarity 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：新兴现象的定量标准。具体实现上，当尾巴拍打与脱落阶段停止漂移时，识别出卡门步态夹带。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"新兴现象的定量标准"},
  {"id":"vca-hysteresis-and-noise-quantification","proj":"vcabot","cat":"math","term":"Hysteresis and noise quantification","detail":"In the VCA actuator testbed, I used Hysteresis and noise quantification, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — separating sensor noise from plant nonlinearity. In practice, I implemented it this way: up/down PWM sweeps compared for return error; static raw-value jitter over 5s. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"separating sensor noise from plant nonlinearity","recall":"How would you design measurements that separate sensor noise from mechanical hysteresis?","recall_zh":"你将如何设计将传感器噪声与机械 hysteresis 分开的测量？","detail_zh":"在 VCA 执行器测试台中，我用 Hysteresis and noise quantification 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：将传感器噪声与设备非线性分离。具体实现上，向上/向下 PWM 扫描比较返回错误； 5s 上的静态原始值抖动。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"将传感器噪声与设备非线性分离"},
  {"id":"vca-zero-point-averaging","proj":"vcabot","cat":"math","term":"Zero-point averaging","detail":"In the VCA actuator testbed, I used Zero-point averaging, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — noise in the encoder's calibration reference. In practice, I implemented it this way: 20-sample mean for calibration reference; basic noise rejection. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"noise in the encoder's calibration reference","recall":"How would you establish a stable calibration zero when individual sensor readings are noisy?","recall_zh":"当各个传感器读数有噪声时，如何建立稳定的校准零位？","detail_zh":"在 VCA 执行器测试台中，我用 Zero-point averaging 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：编码器校准参考中的噪声。具体实现上，20-sample 均值用于校准参考；基本的噪声抑制。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"编码器校准参考中的噪声"},
  {"id":"vca-gpio3-d3-is-jtag-contaminated","proj":"vcabot","cat":"gotcha","term":"GPIO3/D3 is JTAG-contaminated","detail":"In the VCA actuator testbed, I used GPIO3/D3 is JTAG-contaminated, a failure mode I had to isolate at a component boundary. That addressed a specific project need — a debug/strapping pin producing a pseudo-brake voltage instead of a clean LOW. In practice, I implemented it this way: driving it LOW isn't a clean 0V, putting the H-bridge into a pseudo-brake state (power draw, no motion); fix was abandoning the pin entirely. Lesson: check strapping/debug pin functions before assigning outputs. I reproduced the smallest failure, fixed its assumption, and added a regression check. This removed the root cause instead of masking the symptom.","solved":"a debug/strapping pin producing a pseudo-brake voltage instead of a clean LOW","recall":"A digital output never reaches a clean low level. Which hidden pin functions would you investigate?","recall_zh":"数字输出永远不会达到干净的低电平。你会研究哪些隐藏引脚功能？","detail_zh":"在 VCA 执行器测试台中，我把 GPIO3/D3 is JTAG-contaminated 当作组件边界上的故障模式来排查。它解决的是这个具体问题：调试/捆绑引脚产生伪制动电压，而不是干净的 LOW。具体实现上，驱动它 LOW 不是一个干净的 0V，将 H-bridge 置于伪制动状态（功率消耗，无运动）；修复方法是完全放弃该引脚。课程：在分配输出之前检查捆绑/调试引脚功能。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"调试/捆绑引脚产生伪制动电压，而不是干净的 LOW"},
  {"id":"vca-boot-state-glitch-energized-the-actuator","proj":"vcabot","cat":"gotcha","term":"Boot-state glitch energized the actuator","detail":"In the VCA actuator testbed, I used Boot-state glitch energized the actuator, a failure mode I had to isolate at a component boundary. That addressed a specific project need — unsafe H-bridge input levels before firmware `setup()` runs. In practice, I implemented it this way: GPIO defaults on boot briefly drove the VCA before `setup()` ran; fix was 10kΩ pull-downs on H-bridge inputs. Lesson: hardware must be safe before firmware runs. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"unsafe H-bridge input levels before firmware `setup()` runs","recall":"How do you guarantee an actuator remains safe before microcontroller firmware has initialized its output pins?","recall_zh":"在微控制器固件初始化其输出引脚之前，如何保证执行器保持安全？","detail_zh":"在 VCA 执行器测试台中，我把 Boot-state glitch energized the actuator 当作组件边界上的故障模式来排查。它解决的是这个具体问题：固件 `setup()` 运行前不安全的 H-bridge 输入级别。具体实现上，GPIO默认在启动时短暂驱动VCA，然后`setup()`运行；修复了 H-bridge 输入上的 10kΩ 下拉。教训：在固件运行之前，硬件必须是安全的。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"固件 `setup()` 运行前不安全的 H-bridge 输入级别"},
  {"id":"vca-the-triple-cause-board-kill","proj":"vcabot","cat":"gotcha","term":"The triple-cause board kill","detail":"In the VCA actuator testbed, I used The triple-cause board kill, a failure mode I had to isolate at a component boundary. That addressed a specific project need — combined boot-high, back-EMF, and USB backfeed paths destroying the buck supply. In practice, I implemented it this way: GPIO high on boot + back-EMF from manually pushing the actuator + USB 5V backfeeding through the buck's body diode into the 12V rail, together killed the buck module. Lesson: failures compound; protect every path (PTC + TVS + Schottky). I reproduced the smallest failure, fixed its assumption, and added a regression check. This removed the root cause instead of masking the symptom.","solved":"combined boot-high, back-EMF, and USB backfeed paths destroying the buck supply","recall":"A power board failed only when several paths interacted. How would you reconstruct the compound failure and protect each path?","recall_zh":"仅当多个路径交互时，电源板才会出现故障。你将如何重建复合故障并保护每条路径？","detail_zh":"在 VCA 执行器测试台中，我把 The triple-cause board kill 当作组件边界上的故障模式来排查。它解决的是这个具体问题：组合启动高、后 EMF 和 USB 反馈路径会破坏降压电源。具体实现上，启动时 GPIO 高 + 手动推动执行器返回 EMF + USB 5V 通过降压的体二极管反馈到 12V 导轨，一起杀死降压模块。教训：失败复合；保护每条路径（PTC + TVS + 肖特基）。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"组合启动高、后 EMF 和 USB 反馈路径会破坏降压电源"},
  {"id":"vca-vca-b-wired-physically-reversed","proj":"vcabot","cat":"gotcha","term":"Reversed actuator wiring","detail":"In the VCA actuator testbed, I used Reversed actuator wiring, a failure mode I had to isolate at a component boundary. That addressed a specific project need — polarity compensation leaking into multiple upstream layers. In practice, I implemented it this way: first \"fixed\" ad hoc in multiple places, then correctly consolidated into one `CHANNEL_INVERT` constant at the lowest layer. Lesson: hardware quirks get compensated exactly once, at the boundary. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"polarity compensation leaking into multiple upstream layers","recall":"A hardware channel is physically reversed. How do you prevent that quirk from contaminating multiple software layers?","recall_zh":"硬件通道在物理上是相反的。如何防止这种怪癖污染多个软件层？","detail_zh":"在 VCA 执行器测试台中，我把 Reversed actuator wiring 当作组件边界上的故障模式来排查。它解决的是这个具体问题：极性补偿泄漏到多个上游层。具体实现上，首先在多个地方“固定”临时，然后在最低层正确地合并为一个 `CHANNEL_INVERT` 常量。教训：硬件怪癖在边界处得到一次性补偿。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"极性补偿泄漏到多个上游层"},
  {"id":"vca-open-loop-pwm-calibration-can-t-fix-bang-bang","proj":"vcabot","cat":"gotcha","term":"Open-loop PWM calibration can't fix bang-bang","detail":"In the VCA actuator testbed, I used Open-loop PWM calibration can't fix bang-bang, a failure mode I had to isolate at a component boundary. That addressed a specific project need — a lookup-table calibration applied to a plant with no stable intermediate positions. In practice, I implemented it this way: spent effort building a PWM→angle curve before realizing there are no stable intermediate positions; the fix is closed-loop PID or spring balancing, not a better lookup table. Lesson: identify the plant's regime before calibrating it. I reproduced the smallest failure, fixed its assumption, and added a regression check. This removed the root cause instead of masking the symptom.","solved":"a lookup-table calibration applied to a plant with no stable intermediate positions","recall":"Why can a more detailed open-loop calibration table fail to improve a mechanism with bang-bang behavior?","recall_zh":"为什么更详细的开环校准表无法改进具有 bang-bang 行为的机制？","detail_zh":"在 VCA 执行器测试台中，我把 Open-loop PWM calibration can't fix bang-bang 当作组件边界上的故障模式来排查。它解决的是这个具体问题：应用于没有稳定中间位置的设备的查找表校准。具体实现上，花精力构建一条 PWM→角度曲线，然后才意识到没有稳定的中间位置；修复方法是闭环 PID 或弹簧平衡，而不是更好的查找表。教训：在校准之前确定被控对象的状态。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"应用于没有稳定中间位置的设备的查找表校准"},
  {"id":"vca-10k-ipropi-resistor-would-fry-the-adc","proj":"vcabot","cat":"gotcha","term":"10kΩ IPROPI resistor would fry the ADC","detail":"In the VCA actuator testbed, I used 10kΩ IPROPI resistor would fry the ADC, a failure mode I had to isolate at a component boundary. That addressed a specific project need — ADC overvoltage caused by copying a sense-resistor value without checking the 3.3V input ceiling. In practice, I implemented it this way: copying a datasheet's typical value without checking your own ADC range; 2.2kΩ was required. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"ADC overvoltage caused by copying a sense-resistor value without checking the 3.3V input ceiling","recall":"A datasheet's typical sense resistor would overdrive your ADC. What calculation should you perform before copying the reference design?","recall_zh":"数据表的典型检测电阻会使你的 ADC 过载。在复制参考设计之前你应该执行什么计算？","detail_zh":"在 VCA 执行器测试台中，我把 10kΩ IPROPI resistor would fry the ADC 当作组件边界上的故障模式来排查。它解决的是这个具体问题：ADC 因复制检测电阻值而不检查 3.3V 输入上限而导致过压。具体实现上，复制数据表的典型值而不检查自己的 ADC 范围；需要 2.2kΩ。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"ADC 因复制检测电阻值而不检查 3.3V 输入上限而导致过压"},
  {"id":"vca-as5600l-as5600","proj":"vcabot","cat":"gotcha","term":"AS5600L ≠ AS5600","detail":"In the VCA actuator testbed, I used AS5600L ≠ AS5600, a failure mode I had to isolate at a component boundary. That addressed a specific project need — the wrong-address trap between the AS5600L at 0x40 and AS5600 at 0x36. In practice, I implemented it this way: the \"L\" variant sits at I2C 0x40, not 0x36; scanning the bus beats trusting the part-family address. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"the wrong-address trap between the AS5600L at 0x40 and AS5600 at 0x36","recall":"An I2C sensor doesn't respond at the expected datasheet address. Walk me through how you'd diagnose it.","recall_zh":"I2C 传感器在预期的数据表地址处没有响应。告诉我你如何诊断它。","detail_zh":"在 VCA 执行器测试台中，我把 AS5600L ≠ AS5600 当作组件边界上的故障模式来排查。它解决的是这个具体问题：0x40 处的 AS5600L 和 0x36 处的 AS5600 之间的错误地址陷阱。具体实现上，“L”变体位于 I2C 0x40，而不是 0x36；扫描总线胜过信任部分家庭地址。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"0x40 处的 AS5600L 和 0x36 处的 AS5600 之间的错误地址陷阱"},
  {"id":"vca-watchdog-vs-long-waits","proj":"vcabot","cat":"gotcha","term":"Watchdog vs. long waits","detail":"In the VCA actuator testbed, I used Watchdog vs. long waits, a failure mode I had to isolate at a component boundary. That addressed a specific project need — calibration holds exceeding the watchdog interval and triggering STOP mid-measurement. In practice, I implemented it this way: calibration hold periods silently triggered STOP mid-measurement until periodic PING keep-alives were added. Lesson: safety features fight your test scripts if you forget them. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"calibration holds exceeding the watchdog interval and triggering STOP mid-measurement","recall":"A calibration routine unexpectedly triggers the safety watchdog during long measurements. How would you preserve safety without interrupting the test?","recall_zh":"在长时间测量期间，校准例程意外触发安全 watchdog。如何在不中断测试的情况下保证安全？","detail_zh":"在 VCA 执行器测试台中，我把 Watchdog vs. long waits 当作组件边界上的故障模式来排查。它解决的是这个具体问题：校准保持超过 watchdog 间隔并触发 STOP 中间测量。具体实现上，校准保持周期在测量过程中默默地触发 STOP，直到添加定期的 PING 保持活动。经验教训：如果你忘记了安全功能，则会与你的测试脚本发生冲突。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"校准保持超过 watchdog 间隔并触发 STOP 中间测量"},
  {"id":"vca-vbus-not-bat","proj":"vcabot","cat":"gotcha","term":"VBUS not BAT","detail":"In the VCA actuator testbed, I used VBUS not BAT, a failure mode I had to isolate at a component boundary. That addressed a specific project need — destroying the XIAO by applying 5V to a pin that is not a 5V input. In practice, I implemented it this way: 5V into the XIAO's BAT pin is a board-killer; power input naming isn't standardized across boards. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"destroying the XIAO by applying 5V to a pin that is not a 5V input","recall":"How do you verify a development board's power-input pins before connecting an external supply?","recall_zh":"在连接外部电源之前如何验证开发板的电源输入引脚？","detail_zh":"在 VCA 执行器测试台中，我把 VBUS not BAT 当作组件边界上的故障模式来排查。它解决的是这个具体问题：通过将 5V 应用于不是 5V 输入的引脚来破坏 XIAO。具体实现上，将 5V 插入 XIAO 的 BAT 引脚是板杀手；电源输入命名并未跨板标准化。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"通过将 5V 应用于不是 5V 输入的引脚来破坏 XIAO"},
  {"id":"vca-don-t-do-electronic-piv-sync-over-a-jittery-wireless-link-with-no-trigger-in","proj":"vcabot","cat":"gotcha","term":"Don't do electronic PIV sync over a jittery wireless link with no trigger-in","detail":"In the VCA actuator testbed, I used Don't do electronic PIV sync over a jittery wireless link with no trigger-in, a failure mode I had to isolate at a component boundary. That addressed a specific project need — unreliable electronic phase synchronization over a jittery link with no hardware trigger input. In practice, I implemented it this way: recognized it early and chose image-based post-hoc phase instead of fighting the hardware. Lesson: sometimes the right synchronization is offline. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"unreliable electronic phase synchronization over a jittery link with no hardware trigger input","recall":"When would offline phase recovery be a better engineering choice than forcing synchronization over an unreliable wireless link?","recall_zh":"什么时候离线阶段恢复会成为比通过不可靠的无线链路强制同步更好的工程选择？","detail_zh":"在 VCA 执行器测试台中，我把 Don't do electronic PIV sync over a jittery wireless link with no trigger-in 当作组件边界上的故障模式来排查。它解决的是这个具体问题：在没有硬件触发输入的抖动链路上实现不可靠的电子相位同步。具体实现上，尽早认识到这一点，并选择基于图像的事后阶段，而不是与硬件对抗。教训：有时正确的同步是离线的。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"在没有硬件触发输入的抖动链路上实现不可靠的电子相位同步"},
  {"id":"vca-kicad-project-cloning-by-copying-files-breaks-internal-linkages","proj":"vcabot","cat":"gotcha","term":"KiCad project cloning by copying files breaks internal linkages","detail":"In the VCA actuator testbed, I used KiCad project cloning by copying files breaks internal linkages, a failure mode I had to isolate at a component boundary. That addressed a specific project need — broken KiCad project links and uncaught schematic errors during board revision. In practice, I implemented it this way: copy the whole folder or use Save As; also caught real schematic bugs via review: floating PGND, 22µF vs 22nF soft-start label, reversed Schottky, duplicated net labels. I reproduced the smallest failure, fixed its assumption, and added a regression check. This removed the root cause instead of masking the symptom.","solved":"broken KiCad project links and uncaught schematic errors during board revision","recall":"How would you clone a PCB design safely and review the copy for broken project links or schematic mistakes?","recall_zh":"如何安全地克隆 PCB 设计并检查副本是否有损坏的项目链接或原理图错误？","detail_zh":"在 VCA 执行器测试台中，我把 KiCad project cloning by copying files breaks internal linkages 当作组件边界上的故障模式来排查。它解决的是这个具体问题：损坏的 KiCad 项目链接和电路板修订期间未捕获的原理图错误。具体实现上，复制整个文件夹或者使用另存为；还通过审查发现了真正的原理图错误：浮动 PGND、22μF 与 22nF 软启动标签、反向肖特基、重复的网络标签。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"损坏的 KiCad 项目链接和电路板修订期间未捕获的原理图错误"},
  {"id":"flow-two-stage-training-pretrain-autoencoder-freeze-fine-tune-decoder","proj":"flow","cat":"algo","term":"Two-stage training (pretrain autoencoder → freeze/fine-tune decoder)","detail":"In the Flow Sensing reconstruction pipeline, I used Two-stage training (pretrain autoencoder → freeze/fine-tune decoder), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — \"learning what flow fields look like\" from \"mapping sensors to fields\", so the decoder carries a flow-structure prior. In practice, I implemented it this way: decouples \"learning what flow fields look like\" from \"mapping sensors to fields\", so the decoder carries a flow-structure prior. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"\"learning what flow fields look like\" from \"mapping sensors to fields\", so the decoder carries a flow-structure prior","recall":"Why might you pretrain a field autoencoder before learning the mapping from sparse sensors to dense outputs?","recall_zh":"为什么要先预训练流场 autoencoder，再学习从稀疏传感器到稠密流场的映射？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我采用了 Two-stage training (pretrain autoencoder → freeze/fine-tune decoder)，把状态、决策或数据流显式化。它解决的是这个具体问题：把学习流场结构与学习传感器到流场的映射解耦，让 decoder 带有流场结构先验。具体实现上，我先让 autoencoder 学会流场本身的结构，再冻结或微调 decoder，训练 sparse sensors 到 latent representation 的映射。这样 decoder 自带流场先验，不必在第二阶段从头学习输出结构。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"把学习流场结构与学习传感器到流场的映射解耦，让 decoder 带有流场结构先验"},
  {"id":"flow-cross-attention-decoder-grid-queries-attend-over-sensor-tokens","proj":"flow","cat":"algo","term":"Cross-attention decoder (grid queries attend over sensor tokens)","detail":"In the Flow Sensing reconstruction pipeline, I used Cross-attention decoder (grid queries attend over sensor tokens), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — sparse point measurements into a dense field by letting each output pixel selectively pull from the most relevant sensors. In practice, I implemented it this way: turns sparse point measurements into a dense field by letting each output pixel selectively pull from the most relevant sensors. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"sparse point measurements into a dense field by letting each output pixel selectively pull from the most relevant sensors","recall":"How can cross-attention turn a small set of sensor measurements into a dense spatial prediction?","recall_zh":"cross-attention 如何将一小组传感器测量结果转化为密集的空间预测？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我采用了 Cross-attention decoder (grid queries attend over sensor tokens)，把状态、决策或数据流显式化。它解决的是这个具体问题：通过让每个输出像素选择性地从最相关的传感器拉取稀疏点测量到密集区域。具体实现上，通过让每个输出像素选择性地从最相关的传感器中提取数据，将稀疏点测量转换为密集场。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"通过让每个输出像素选择性地从最相关的传感器拉取稀疏点测量到密集区域"},
  {"id":"flow-spatial-self-attention-over-sensor-tokens","proj":"flow","cat":"algo","term":"Spatial self-attention over sensor tokens","detail":"In the Flow Sensing reconstruction pipeline, I used Spatial self-attention over sensor tokens, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — cross-sensor reasoning (a downstream sensor's phase constrains an upstream vortex inference). In practice, I implemented it this way: enables cross-sensor reasoning (a downstream sensor's phase constrains an upstream vortex inference). I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"cross-sensor reasoning (a downstream sensor's phase constrains an upstream vortex inference)","recall":"Why let sensor tokens attend to each other before decoding a spatial field?","recall_zh":"为什么要让不同传感器的 token 先彼此做 attention，再解码完整空间流场？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我采用了 Spatial self-attention over sensor tokens，把状态、决策或数据流显式化。它解决的是这个具体问题：跨传感器推理（下游传感器的相位约束上游涡旋推理）。具体实现上，启用跨传感器推理（下游传感器的相位限制上游涡旋推理）。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"跨传感器推理（下游传感器的相位约束上游涡旋推理）"},
  {"id":"flow-learnable-spatial-tokens-nn-parameter-as-extra-k-v","proj":"flow","cat":"algo","term":"Learnable spatial tokens (nn.Parameter as extra K/V)","detail":"In the Flow Sensing reconstruction pipeline, I used Learnable spatial tokens (nn.Parameter as extra K/V), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — the rank-≤5 cross-attention bottleneck created by having only five sensor tokens. In practice, I implemented it this way: breaks the rank-≤5 bottleneck of cross-attention when only 5 sensors exist. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"the rank-≤5 cross-attention bottleneck created by having only five sensor tokens","recall":"How would you overcome an attention bottleneck when the model has only a few physical sensor tokens?","recall_zh":"模型只有少量物理 sensor token 时，你会怎样突破 cross-attention 的 rank bottleneck？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我采用了 Learnable spatial tokens (nn.Parameter as extra K/V)，把状态、决策或数据流显式化。它解决的是这个具体问题：只有 5 个 sensor token 时出现的 rank ≤ 5 cross-attention bottleneck。具体实现上，当只有5传感器存在时，打破cross-attention的rank-≤5瓶颈。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"只有 5 个 sensor token 时出现的 rank ≤ 5 cross-attention bottleneck"},
  {"id":"flow-dual-pathway-multi-modal-fusion","proj":"flow","cat":"algo","term":"Dual-pathway multi-modal fusion","detail":"In the Flow Sensing reconstruction pipeline, I used Dual-pathway multi-modal fusion, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — interference between heterogeneous spatial PIV patches and scalar pressure inputs. In practice, I implemented it this way: encodes heterogeneous inputs (spatial PIV patches vs. scalar pressure) separately before combining, avoiding modality interference. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"interference between heterogeneous spatial PIV patches and scalar pressure inputs","recall":"How would you fuse spatial measurements with scalar sensors without one modality interfering with the other?","recall_zh":"如何将空间测量与标量传感器融合在一起，而不使一种模态干扰另一种模态？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我采用了 Dual-pathway multi-modal fusion，把状态、决策或数据流显式化。它解决的是这个具体问题：异构空间 PIV 块与标量压力输入之间的干扰。具体实现上，在组合之前分别对异构输入（空间 PIV patch与标量压力）进行编码，避免模态干扰。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"异构空间 PIV 块与标量压力输入之间的干扰"},
  {"id":"flow-shared-weight-encoders-siamese-style-across-5-patches-sensors","proj":"flow","cat":"algo","term":"Shared-weight encoders (Siamese-style across 5 patches/sensors)","detail":"In the Flow Sensing reconstruction pipeline, I used Shared-weight encoders (Siamese-style across 5 patches/sensors), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — parameters and enforces permutation-consistent encoding. In practice, I implemented it this way: one CNN/MLP reused per patch cuts parameters and enforces permutation-consistent encoding. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"parameters and enforces permutation-consistent encoding","recall":"When should multiple sensor patches share one encoder, and what invariance does that encourage?","recall_zh":"多个传感器贴片何时应共享一个编码器，这会带来什么样的不变性？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我采用了 Shared-weight encoders (Siamese-style across 5 patches/sensors)，把状态、决策或数据流显式化。它解决的是这个具体问题：参数并强制排列一致的编码。具体实现上，每个patch重用一个 CNN/MLP 来削减参数并强制执行排列一致编码。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"参数并强制排列一致的编码"},
  {"id":"flow-ensemble-decoder-heads-for-uncertainty","proj":"flow","cat":"algo","term":"Ensemble decoder heads for uncertainty","detail":"In the Flow Sensing reconstruction pipeline, I used Ensemble decoder heads for uncertainty, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — an uncertainty map (planned, for active learning). In practice, I implemented it this way: variance across heads gives an uncertainty map (planned, for active learning). I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"an uncertainty map (planned, for active learning)","recall":"How can multiple prediction heads provide a useful spatial uncertainty estimate?","recall_zh":"多个预测头如何提供有用的空间不确定性估计？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我采用了 Ensemble decoder heads for uncertainty，把状态、决策或数据流显式化。它解决的是这个具体问题：不确定性图（规划中，用于 active learning）。具体实现上，各个 head 之间的方差给出了不确定性图（规划中，用于 active learning）。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"不确定性图（规划中，用于 active learning）"},
  {"id":"flow-case-level-train-test-split-leave-k-cases-out","proj":"flow","cat":"algo","term":"Case-level train/test split (leave-K-cases-out)","detail":"In the Flow Sensing reconstruction pipeline, I used Case-level train/test split (leave-K-cases-out), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — leakage; tests true generalization to unseen (St, x, y) regimes. In practice, I implemented it this way: prevents leakage; tests true generalization to unseen (St, x, y) regimes. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"leakage; tests true generalization to unseen (St, x, y) regimes","recall":"How would you split experimental data to test generalization across operating conditions rather than memorization?","recall_zh":"你将如何分割实验数据来测试跨操作条件的泛化而不是记忆？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我采用了 Case-level train/test split (leave-K-cases-out)，把状态、决策或数据流显式化。它解决的是这个具体问题：泄漏；测试对未见过的 (St, x, y) 状态的真实泛化。具体实现上，防止泄漏；测试对未见过的 (St, x, y) 状态的真实泛化。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"泄漏；测试对未见过的 (St, x, y) 状态的真实泛化"},
  {"id":"flow-temporal-window-via-channel-stacking","proj":"flow","cat":"pylang","term":"Temporal window via channel stacking","detail":"In the Flow Sensing reconstruction pipeline, I used Temporal window via channel stacking, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — giving a 2D CNN temporal context without adding an LSTM. In practice, I implemented it this way: stacks T consecutive frames into channels so a 2D CNN sees time without needing an LSTM. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"giving a 2D CNN temporal context without adding an LSTM","recall":"When can stacking consecutive frames as channels replace a recurrent model for short temporal context?","recall_zh":"什么时候可以将连续帧堆叠为通道来取代短时间上下文的循环模型？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Temporal window via channel stacking 来划分软件职责和接口边界。它解决的是这个具体问题：给出 2D CNN 时间上下文而不添加 LSTM。具体实现上，将 T 个连续帧堆叠到通道中，这样 2D CNN 就可以看到时间，而不需要 LSTM。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"给出 2D CNN 时间上下文而不添加 LSTM"},
