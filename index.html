  {"id":"coach-gaussian-smoothing-on-time-series","proj":"coach","cat":"math","term":"Gaussian smoothing on time-series","detail":"In the ClearCoach coaching app, I used Gaussian smoothing on time-series, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — noisy motion scores producing multiple false peaks near the true hitting moment. In practice, I implemented it this way: Smooth the motion score array before peak detection to suppress single-frame noise (camera shake, lighting flicker). I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"noisy motion scores producing multiple false peaks near the true hitting moment","recall":"A motion signal has many noisy local peaks. How would you reveal the underlying event peak?","recall_zh":"运动信号具有许多噪声局部峰值。你将如何揭示潜在的事件峰值？","detail_zh":"在 ClearCoach 教练应用中，我用 Gaussian smoothing on time-series 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：嘈杂的运动分数在真实击球时刻附近产生多个假峰值。具体实现上，在峰值检测之前平滑运动得分数组以抑制单帧噪声（相机抖动、灯光闪烁）。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"嘈杂的运动分数在真实击球时刻附近产生多个假峰值"},
  {"id":"coach-spectral-onset-strength-librosa","proj":"coach","cat":"math","term":"Spectral onset strength (librosa)","detail":"In the ClearCoach coaching app, I used Spectral onset strength (librosa), a numerical technique for turning system behavior into something measurable. That addressed a specific project need — detecting percussive transients (shuttle hits) in noisy audio. In practice, I implemented it this way: `librosa.onset.onset_strength(sr=22050, hop_length=512)` computes a spectral flux envelope. Delta parameter tunes sensitivity: `delta=0.15` baseline, raise to suppress crowd noise, lower to catch soft drop shots. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"detecting percussive transients (shuttle hits) in noisy audio","recall":"How does spectral-flux onset detection find percussive events, and how would you tune its sensitivity?","recall_zh":"谱通量 onset detection 如何发现撞击事件？你会怎样调它的灵敏度？","detail_zh":"在 ClearCoach 教练应用中，我用 Spectral onset strength (librosa) 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：在嘈杂音频中检测羽毛球击球的撞击瞬态。具体实现上，`librosa.onset.onset_strength(sr=22050, hop_length=512)` 计算谱通量包络。 Delta 参数调整灵敏度：`delta=0.15` 基线，升高以抑制人群噪音，降低以捕捉较轻的击球。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"在嘈杂音频中检测羽毛球击球的撞击瞬态"},
  {"id":"coach-bandpass-filtering-for-audio-isolation","proj":"coach","cat":"math","term":"Bandpass filtering for audio isolation","detail":"In the ClearCoach coaching app, I used Bandpass filtering for audio isolation, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — false positives in broadcast footage with commentary. In practice, I implemented it this way: Apply 2kHz–8kHz bandpass before onset detection to isolate the shuttle-hit frequency range from voice (commentary, coaching) and low-frequency crowd noise. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"false positives in broadcast footage with commentary","recall":"How would you isolate a high-frequency impact from speech and low-frequency crowd noise before event detection?","recall_zh":"在事件检测之前，如何隔离语音和低频人群噪声的高频影响？","detail_zh":"在 ClearCoach 教练应用中，我用 Bandpass filtering for audio isolation 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：带有评论的广播片段中出现误报。具体实现上，在开始检测之前应用 2kHz–8kHz 带通，将羽毛球击球声频率范围与语音（评论、指导）和低频人群噪音隔离。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"带有评论的广播片段中出现误报"},
  {"id":"coach-minimum-inter-peak-gap-physics-constraint","proj":"coach","cat":"math","term":"Minimum inter-peak gap (physics constraint)","detail":"In the ClearCoach coaching app, I used Minimum inter-peak gap (physics constraint), a numerical technique for turning system behavior into something measurable. That addressed a specific project need — echo/double-detection of a single hit. In practice, I implemented it this way: Enforce 0.3s minimum between detected audio peaks. Two badminton shots physically cannot happen faster than this. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"echo/double-detection of a single hit","recall":"How can a physical minimum interval reduce duplicate event detections caused by echoes?","recall_zh":"物理最小间隔如何减少由回声引起的重复事件检测？","detail_zh":"在 ClearCoach 教练应用中，我用 Minimum inter-peak gap (physics constraint) 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：单次击球的回声/双重检测。具体实现上，在检测到的音频峰值之间强制执行 0.3s 最小值。两次羽毛球击球的速度不可能比这更快。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"单次击球的回声/双重检测"},
  {"id":"coach-contact-sheet-resolution-math","proj":"coach","cat":"math","term":"Contact sheet resolution math","detail":"In the ClearCoach coaching app, I used Contact sheet resolution math, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — balancing per-frame resolution against frames-per-API-call throughput. In practice, I implemented it this way: `thumb_long=600` at 20 frames/sheet → each thumbnail is ~336×600px (16:9 video). At 40 frames/sheet with `thumb_long=300`, each is ~168×300px which gets further compressed by the LLM's internal image resizing → detail loss. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"balancing per-frame resolution against frames-per-API-call throughput","recall":"How do you balance the number of frames in a contact sheet against per-frame visual detail?","recall_zh":"如何平衡 contact sheet 中的帧数与每帧视觉细节？","detail_zh":"在 ClearCoach 教练应用中，我用 Contact sheet resolution math 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：平衡每帧分辨率与每帧 API-call 吞吐量。具体实现上，`thumb_long=600` at 20 帧/表→每个缩略图都是~336×600px（16：9 视频）。在带有 `thumb_long=300` 的 40 帧/表中，每个都是 ~168×300px，通过 LLM 的内部图像调整大小 → 细节损失进一步压缩。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"平衡每帧分辨率与每帧 API-call 吞吐量"},
  {"id":"coach-asymmetric-clip-windowing","proj":"coach","cat":"math","term":"Asymmetric clip windowing","detail":"In the ClearCoach coaching app, I used Asymmetric clip windowing, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — centering the hit in the clip and capturing all relevant phases. In practice, I implemented it this way: `[t_hit - 1.5s, t_hit + 1.0s]` based on biomechanical observation: preparation + windup take longer than follow-through in overhead strokes. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"centering the hit in the clip and capturing all relevant phases","recall":"Why might an event-centered video clip need more context before the event than after it?","recall_zh":"为什么以事件为中心的视频剪辑在事件之前需要比事件之后更多的上下文？","detail_zh":"在 ClearCoach 教练应用中，我用 Asymmetric clip windowing 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：让击球时刻位于 clip 中部，并覆盖准备、引拍、随挥等完整阶段。具体实现上，我根据生物力学观察使用 `[t_hit - 1.5s, t_hit + 1.0s]`：过顶击球的准备和引拍通常比随挥更久。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"让击球时刻位于 clip 中部，并覆盖准备、引拍、随挥等完整阶段"},
  {"id":"coach-llm-hitting-frame-bias-consistently-early","proj":"coach","cat":"gotcha","term":"LLM hitting frame bias — consistently early","detail":"In the ClearCoach coaching app, I used LLM hitting frame bias — consistently early, a failure mode I had to isolate at a component boundary. That addressed a specific project need — early contact-frame picks caused by dramatic arm-up poses. In practice, I implemented it this way: LLMs confuse \"arm raised and approaching\" with \"moment of contact.\" The arm-up posture looks dramatic → LLM picks it. Fix: don't let LLM search the full clip; use computational motion peak to constrain the search window to ±15 frames around true contact. I reproduced the smallest failure, fixed its assumption, and added a regression check. This removed the root cause instead of masking the symptom.","solved":"early contact-frame picks caused by dramatic arm-up poses","recall":"A vision model picks a visually dramatic pose instead of the true event moment. How would you constrain its search?","recall_zh":"视觉模型选择视觉上戏剧性的姿态，而不是真实的事件时刻。你将如何限制其搜索？","detail_zh":"在 ClearCoach 教练应用中，我把 LLM hitting frame bias — consistently early 当作组件边界上的故障模式来排查。它解决的是这个具体问题：戏剧性的抬臂姿态导致模型过早选择接触帧。具体实现上，LLM将“手臂举起并接近”与“接触时刻”混为一谈。手臂举起的姿态看起来很戏剧化→LLM 选了它。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"戏剧性的抬臂姿态导致模型过早选择接触帧"},
  {"id":"coach-llm-won-t-self-correct-in-a-feedback-loop","proj":"coach","cat":"gotcha","term":"LLM won't self-correct in a feedback loop","detail":"In the ClearCoach coaching app, I used LLM won't self-correct in a feedback loop, a failure mode I had to isolate at a component boundary. That addressed a specific project need — confirmation bias in an LLM asked to validate its own earlier frame choice. In practice, I implemented it this way: A \"confirm\" step asking the LLM \"should I shift the window earlier or later?\" almost always returns \"no, this is fine\" even when wrong. The LLM is biased toward confirming its own prior answer. Fix: remove the confirm loop entirely; replace with computational signal. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"confirmation bias in an LLM asked to validate its own earlier frame choice","recall":"Why might asking a model to validate its own earlier answer fail, and what independent signal would you use instead?","recall_zh":"为什么要求模型验证其先前的答案可能会失败，你会使用什么独立信号来代替？","detail_zh":"在 ClearCoach 教练应用中，我把 LLM won't self-correct in a feedback loop 当作组件边界上的故障模式来排查。它解决的是这个具体问题：让 LLM 验证自己先前的帧选择会产生确认偏差。具体实现上，“确认”步骤询问 LLM“我应该提前还是推迟窗口移动？”即使错误时，几乎总是返回“不，这很好”。 LLM 偏向于确认自己先前的答案。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"让 LLM 验证自己先前的帧选择会产生确认偏差"},
  {"id":"coach-dead-code-that-looks-like-working-features","proj":"coach","cat":"gotcha","term":"Dead code that looks like working features","detail":"In the ClearCoach coaching app, I used Dead code that looks like working features, a failure mode I had to isolate at a component boundary. That addressed a specific project need — mistaking uncalled helper definitions for behavior present in the actual runtime pipeline. In practice, I implemented it this way: `scout_hitting_zone()`, `_validate_key_frames()`, `select_frames_for_llm()` were all defined but never called in `process_clip()`. The actual runtime was: extract all frames → build sheet → single LLM call. Code reviews must trace call chains from entry point, not just check function definitions. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"mistaking uncalled helper definitions for behavior present in the actual runtime pipeline","recall":"A codebase contains polished helper functions that never affect runtime behavior. How would you uncover that during review?","recall_zh":"代码库包含精美的辅助函数，这些函数永远不会影响运行时行为。在审查过程中你会如何发现这一点？","detail_zh":"在 ClearCoach 教练应用中，我把 Dead code that looks like working features 当作组件边界上的故障模式来排查。它解决的是这个具体问题：将未调用的辅助函数定义误认为是实际运行时中存在的行为 pipeline。具体实现上，`scout_hitting_zone()`、`_validate_key_frames()`、`select_frames_for_llm()`都已定义，但从未在`process_clip()`中调用。实际运行流程是：提取所有帧→生成 contact sheet→单个 LLM 调用。代码审查必须从入口点跟踪调用链，而不仅仅是检查函数定义。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"将未调用的辅助函数定义误认为是实际运行时中存在的行为 pipeline"},
  {"id":"coach-frame-number-mismatch-from-fps-resampling","proj":"coach","cat":"gotcha","term":"Frame number mismatch from fps resampling","detail":"In the ClearCoach coaching app, I used Frame number mismatch from fps resampling, a failure mode I had to isolate at a component boundary. That addressed a specific project need — frame indices that no longer match the native-fps video player's scrubber. In practice, I implemented it this way: Extracting frames at a resampled fps (e.g., 10fps from a 60fps video) produces frame indices that don't match scrubbing in a video player. Fix: always extract at native fps, never resample. I reproduced the smallest failure, fixed its assumption, and added a regression check. This removed the root cause instead of masking the symptom.","solved":"frame indices that no longer match the native-fps video player's scrubber","recall":"Why can frame resampling make model outputs disagree with a user's video-player timeline?","recall_zh":"为什么帧重采样会使模型输出与用户的视频播放器时间线不一致？","detail_zh":"在 ClearCoach 教练应用中，我把 Frame number mismatch from fps resampling 当作组件边界上的故障模式来排查。它解决的是这个具体问题：帧索引不再与本机 fps 视频播放器的时间轴拖动位置匹配。具体实现上，以重新采样的 fps 提取帧（例如，从 60fps 视频中提取 10fps）会产生与视频播放器中的时间轴位置不匹配的帧索引。修复：始终以本机 fps 提取，从不重新采样。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"帧索引不再与本机 fps 视频播放器的时间轴拖动位置匹配"},
  {"id":"coach-llm-output-format-instability","proj":"coach","cat":"gotcha","term":"LLM output format instability","detail":"In the ClearCoach coaching app, I used LLM output format instability, a failure mode I had to isolate at a component boundary. That addressed a specific project need — `json.loads()` failures caused by inconsistent markdown fences around otherwise valid JSON. In practice, I implemented it this way: Same model, same prompt: sometimes returns bare JSON, sometimes wraps in ` ```json ``` ` fences. If you only handle one case, the other crashes `json.loads()`. Fix: always strip markdown fences before parsing. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"`json.loads()` failures caused by inconsistent markdown fences around otherwise valid JSON","recall":"A model alternates between raw structured output and fenced markdown. Where should that variability be normalized?","recall_zh":"模型在原始结构化输出和隔离降价之间交替。这种变异性应该在哪里标准化？","detail_zh":"在 ClearCoach 教练应用中，我把 LLM output format instability 当作组件边界上的故障模式来排查。它解决的是这个具体问题：`json.loads()` 因有效 JSON 周围的降价围栏不一致而导致失败。具体实现上，相同的模型，相同的提示：有时返回裸露的 JSON，有时包裹在 ` ```json ``` ` 栅栏中。如果只处理一种情况，另一种情况就会崩溃 `json.loads()`。修复：在解析之前始终删除 Markdown 栅栏。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"`json.loads()` 因有效 JSON 周围的降价围栏不一致而导致失败"},
  {"id":"coach-adjacent-court-audio-bleed","proj":"coach","cat":"gotcha","term":"Adjacent-court audio bleed","detail":"In the ClearCoach coaching app, I used Adjacent-court audio bleed, a failure mode I had to isolate at a component boundary. That addressed a specific project need — false shot detections from real audio transients with no matching target-player motion. In practice, I implemented it this way: Gym recordings pick up shuttle hits from neighboring courts. These audio peaks are real transients but have no corresponding motion peak in the target player's video. Fix: audio-motion cross-validation — require both signals to co-occur. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"false shot detections from real audio transients with no matching target-player motion","recall":"An audio detector finds real impacts from the wrong source. What second modality could reject them?","recall_zh":"音频检测器抓到了相邻球场的真实击球声。你会用什么第二信号把它排除？","detail_zh":"在 ClearCoach 教练应用中，我把 Adjacent-court audio bleed 当作组件边界上的故障模式来排查。它解决的是这个具体问题：相邻球场的真实击球声在目标球员没有对应动作时造成误检。具体实现上，健身房录音拾取来自邻近球场的羽毛球击球声。这些音频峰值是真实的瞬态，但在目标玩家的视频中没有相应的运动峰值。修复：音频-运动交叉验证——要求两个信号同时出现。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"相邻球场的真实击球声在目标球员没有对应动作时造成误检"},
  {"id":"coach-nginx-proxy-read-timeout-kills-llm-requests","proj":"coach","cat":"gotcha","term":"nginx `proxy_read_timeout` kills LLM requests","detail":"In the ClearCoach coaching app, I used nginx `proxy_read_timeout` kills LLM requests, a failure mode I had to isolate at a component boundary. That addressed a specific project need — silent disconnections when multi-minute LLM calls exceed nginx's default timeout. In practice, I implemented it this way: Default 60s timeout. LLM analysis calls take 2–5 minutes. Connection drops silently mid-processing. Fix: set `proxy_read_timeout 300s`.","solved":"silent disconnections when multi-minute LLM calls exceed nginx's default timeout","recall":"A reverse proxy silently drops long-running inference requests. What configuration would you inspect first?","recall_zh":"反向代理会默默地丢弃长时间运行的推理请求。你首先要检查什么配置？","detail_zh":"在 ClearCoach 教练应用中，我把 nginx `proxy_read_timeout` kills LLM requests 当作组件边界上的故障模式来排查。它解决的是这个具体问题：当多分钟 LLM 调用超过 nginx 的默认超时时静默断开连接。具体实现上，默认60s超时。 LLM 分析调用需要 2–5 分钟。连接在处理过程中悄然断开。修复：设置 `proxy_read_timeout 300s`。","solved_zh":"当多分钟 LLM 调用超过 nginx 的默认超时时静默断开连接"},
  {"id":"coach-nginx-default-client-max-body-size-blocks-uploads","proj":"coach","cat":"gotcha","term":"nginx default `client_max_body_size` blocks uploads","detail":"In the ClearCoach coaching app, I used nginx default `client_max_body_size` blocks uploads, a failure mode I had to isolate at a component boundary. That addressed a specific project need — HTTP 413 failures when 50–500MB videos exceed nginx's 1MB default. In practice, I implemented it this way: Default is 1MB. Video files are 50–500MB. Upload fails with a cryptic 413 error. Fix: `client_max_body_size 500M`.","solved":"HTTP 413 failures when 50–500MB videos exceed nginx's 1MB default","recall":"Large uploads fail before reaching the application. How would you determine which infrastructure layer rejected them?","recall_zh":"大型上传在到达应用程序之前会失败。你如何确定哪个基础设施层拒绝了它们？","detail_zh":"在 ClearCoach 教练应用中，我把 nginx default `client_max_body_size` blocks uploads 当作组件边界上的故障模式来排查。它解决的是这个具体问题：当 50–500MB 视频超出 nginx 的 1MB 默认值时，HTTP 413 失败。具体实现上，默认是1MB。视频文件为50–500MB。上传失败并出现神秘的 413 错误。修复：`client_max_body_size 500M`。","solved_zh":"当 50–500MB 视频超出 nginx 的 1MB 默认值时，HTTP 413 失败"},
  {"id":"coach-model-name-scatter-across-codebase","proj":"coach","cat":"gotcha","term":"Model name scatter across codebase","detail":"In the ClearCoach coaching app, I used Model name scatter across codebase, a failure mode I had to isolate at a component boundary. That addressed a specific project need — stale or inconsistent Gemini model selection after SDK changes. In practice, I implemented it this way: Some files hardcode `gemini-2.0-flash`, others `gemini-1.5-pro`, others `gemini-2.5-pro`. After an SDK migration, stale model strings silently fall back to defaults or error. Fix: centralize all model names in one config/constant file. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"stale or inconsistent Gemini model selection after SDK changes","recall":"Model identifiers are hardcoded across many files. What failures can that cause, and how would you centralize them?","recall_zh":"模型标识符在许多文件中进行硬编码。这会导致什么故障？你将如何集中它们？","detail_zh":"在 ClearCoach 教练应用中，我把 Model name scatter across codebase 当作组件边界上的故障模式来排查。它解决的是这个具体问题：SDK 更改后，Gemini 模型选择陈旧或不一致。具体实现上，一些文件硬编码 `gemini-2.0-flash`，其他文件硬编码 `gemini-1.5-pro`，其他文件硬编码 `gemini-2.5-pro`。 SDK 迁移后，过时的模型字符串会默默地回退到默认值或错误。修复：将所有模型名称集中在一个配置/常量文件中。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"SDK 更改后，Gemini 模型选择陈旧或不一致"},
  {"id":"coach-frontend-backend-contract-mismatch","proj":"coach","cat":"gotcha","term":"Frontend-backend contract mismatch","detail":"In the ClearCoach coaching app, I used Frontend-backend contract mismatch, a failure mode I had to isolate at a component boundary. That addressed a specific project need — runtime breakage when the frontend expects `analysis_result` but the backend returns `comparison_result`. In practice, I implemented it this way: Frontend JS expects a field name (`analysis_result`) that the backend sends as something else (`comparison_result`). No shared schema. Fix: code review must check both sides of every API endpoint. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"runtime breakage when the frontend expects `analysis_result` but the backend returns `comparison_result`","recall":"The frontend and backend disagree on a response field. How would you prevent this class of integration bug?","recall_zh":"前端和后端在响应字段上存在分歧。你将如何防止此类集成错误？","detail_zh":"在 ClearCoach 教练应用中，我把 Frontend-backend contract mismatch 当作组件边界上的故障模式来排查。它解决的是这个具体问题：前端期待 `analysis_result` 而后端返回 `comparison_result` 时造成的运行时错误。具体实现上，前端 JS 读取 `analysis_result`，但后端实际返回 `comparison_result`，双方也没有共享 schema。修复时我会逐个 API endpoint 对照前后端契约。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"前端期待 `analysis_result` 而后端返回 `comparison_result` 时造成的运行时错误"},
  {"id":"coach-shot-segmenter-accumulates-persistent-state-with-no-reset","proj":"coach","cat":"gotcha","term":"Shot segmenter accumulates persistent state with no reset","detail":"In the ClearCoach coaching app, I used Shot segmenter accumulates persistent state with no reset, a failure mode I had to isolate at a component boundary. That addressed a specific project need — mixing labels and clips from different videos across repeated tool runs. In practice, I implemented it this way: Running the tool multiple times appends to previous `labels.json` and `clips/` without clearing. User ends up with mixed data from different videos. Fix: add a clear/reset button per session. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"mixing labels and clips from different videos across repeated tool runs","recall":"A repeated processing run mixes outputs from previous sessions. How would you design state isolation and reset behavior?","recall_zh":"重复的处理运行会混合先前会话的输出。你将如何设计状态隔离和重置行为？","detail_zh":"在 ClearCoach 教练应用中，我把 Shot segmenter accumulates persistent state with no reset 当作组件边界上的故障模式来排查。它解决的是这个具体问题：在重复的工具运行中混合来自不同视频的标签和剪辑。具体实现上，多次运行该工具会追加到之前的 `labels.json` 和 `clips/` 上，而无需清除。用户最终会得到来自不同视频的混合数据。修复：为每个会话添加一个清除/重置按钮。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"在重复的工具运行中混合来自不同视频的标签和剪辑"},
  {"id":"coach-google-generativeai-sdk-silently-deprecated","proj":"coach","cat":"gotcha","term":"`google-generativeai` SDK silently deprecated","detail":"In the ClearCoach coaching app, I used `google-generativeai` SDK silently deprecated, a failure mode I had to isolate at a component boundary. That addressed a specific project need — remaining on an EOL SDK that lacks Vertex AI and newer model features. In practice, I implemented it this way: Package still installs and works, but is EOL since Aug 2025. New features (Vertex AI, thinking models) are only in `google-genai`. No warning at import time. Fix: proactively migrate; `grep -rn \"google.generativeai\"` to verify zero old-SDK references remain.","solved":"remaining on an EOL SDK that lacks Vertex AI and newer model features","recall":"A dependency still works but is officially deprecated. How would you detect and migrate it before it becomes a production problem?","recall_zh":"依赖项仍然有效，但已被正式弃用。在它成为生产问题之前，你将如何检测并迁移它？","detail_zh":"在 ClearCoach 教练应用中，我把 `google-generativeai` SDK silently deprecated 当作组件边界上的故障模式来排查。它解决的是这个具体问题：保留在缺少 Vertex AI 和更新模型功能的 EOL SDK 上。具体实现上，软件包仍然可以安装并工作，但是自 8 月 2025 以来就是 EOL。新功能（Vertex AI、思维模型）仅在`google-genai`中。导入时没有警告。修复：主动迁移； `grep -rn \"google.generativeai\"` 验证是否保留零旧的 SDK 引用。","solved_zh":"保留在缺少 Vertex AI 和更新模型功能的 EOL SDK 上"},
  {"id":"coach-contact-sheet-resolution-vs-llm-token-budget","proj":"coach","cat":"gotcha","term":"Contact sheet resolution vs LLM token budget","detail":"In the ClearCoach coaching app, I used Contact sheet resolution vs LLM token budget, a failure mode I had to isolate at a component boundary. That addressed a specific project need — loss of arm-angle detail when too many undersized thumbnails share one contact sheet. In practice, I implemented it this way: 40 frames at 300px thumbnails → too small, LLM can't distinguish arm angles. 20 frames at 600px → sharp enough, but now you need 2 sheets for a 40-frame clip = 2 API calls. There's no free lunch. Fix: tune `frames_per_sheet` and `thumb_long` together based on actual LLM accuracy, not intuition.","solved":"loss of arm-angle detail when too many undersized thumbnails share one contact sheet","recall":"A vision model misses fine motion details when many frames share one image. How would you tune resolution against request count?","recall_zh":"很多帧挤在同一张图里时，视觉模型会丢掉动作细节。你会怎样权衡分辨率和请求次数？","detail_zh":"在 ClearCoach 教练应用中，我把 Contact sheet resolution vs LLM token budget 当作组件边界上的故障模式来排查。它解决的是这个具体问题：当太多尺寸过小的缩略图共享一个 contact sheet 时，手臂角度细节会丢失。具体实现上，40 帧配 300px 缩略图时细节太小，LLM 无法分辨手臂角度。改成每张 20 帧、600px 后图像足够清晰，但 40 帧 clip 需要 2 张 contact sheet，也就是 2 次 API 调用。这个 trade-off 无法消除。实际参数要根据模型准确率联合调整 `frames_per_sheet` 和 `thumb_long`，不能只凭直觉。","solved_zh":"当太多尺寸过小的缩略图共享一个 contact sheet 时，手臂角度细节会丢失"}

/* ---- Arrays & Hashing ---- */
{id:"two-sum",z:"ah",t:"Two Sum",d:"E",lc:"LC 1",fn:"two_sum",
prompt:"Given an integer array `nums` and an integer `target`, return the indices of the two numbers that add up to `target`. Exactly one solution exists, and you may not use the same element twice. Return the pair of indices in any order.",
robo:"Same reflex as matching a pair of sensor timestamps whose offsets sum to a target latency: one pass with a hash map beats scanning all pairs.",
sig:["Find a **pair** hitting an exact sum","Array is unsorted","Brute force is O(n^2) -- the interviewer wants O(n)"],
app:["Ask: standing on `x`, what am I looking for? `target - x`.","Store every value already seen in a dict `value -> index`.","One pass: check the complement first, then insert the current value. Checking before inserting prevents matching an element with itself."],
tool:["`seen = {}` then `need in seen` -- O(1) lookup","`enumerate(nums)` gives `(i, x)` without manual indexing"],
pit:"Inserting into the dict before checking the complement makes `[3,3], target 6` self-match or fail. Check first, insert second.",
start:`def two_sum(nums, target):
    # return [i, j]
`,
sol:`def two_sum(nums, target):
    seen = {}                     # value -> index
    for i, x in enumerate(nums):
        need = target - x
        if need in seen:
            return [seen[need], i]
        seen[x] = i
    return []`,
tests:[{a:[[2,7,11,15],9],w:[0,1]},{a:[[3,2,4],6],w:[1,2]},{a:[[3,3],6],w:[0,1]}],fl:{so:1}},

{id:"valid-anagram",z:"ah",t:"Valid Anagram",d:"E",lc:"LC 242",fn:"is_anagram",
prompt:"Given two strings `s` and `t`, return True if `t` is an anagram of `s` (same characters with the same counts).",
robo:"Counting occurrences with a dict is the same idiom as histogramming PIV vector magnitudes -- `cnt[x] = cnt.get(x, 0) + 1` should be muscle memory.",
sig:["Compare **composition**, not order","Words like anagram, permutation, same letters"],
app:["Early exit: different lengths can never match.","Count characters of `s` up, then characters of `t` down; any counter going below zero means mismatch.","Worth mentioning: `sorted(s) == sorted(t)` is a correct O(n log n) one-liner."],
tool:["`cnt[c] = cnt.get(c, 0) + 1` -- the counting idiom","`cnt.get(c, 0)` guards missing keys on the way down"],
pit:"Skipping the length check lets inputs like 'a' vs 'ab' sneak through subtle count-down bugs.",
start:`def is_anagram(s, t):
    # return True / False
`,
sol:`def is_anagram(s, t):
    if len(s) != len(t):
        return False
    cnt = {}
    for c in s:
        cnt[c] = cnt.get(c, 0) + 1
    for c in t:
        if cnt.get(c, 0) == 0:
            return False
        cnt[c] -= 1
    return True`,
tests:[{a:["anagram","nagaram"],w:true},{a:["rat","car"],w:false},{a:["a","ab"],w:false}],fl:{}},

{id:"group-anagrams",z:"ah",t:"Group Anagrams",d:"M",lc:"LC 49",fn:"group_anagrams",
prompt:"Given an array of strings, group the anagrams together. Return a list of groups in any order.",
robo:"Bucketing by a computed key is how you would group CAN frames by arbitration ID: compute the key, append to `dict[key]`.",
sig:["Group items by an equivalence, not just detect one pair","You need a canonical **key** per group"],
app:["Every anagram shares the same sorted spelling: use `''.join(sorted(w))` as the dict key.","Append each word to its bucket; return the buckets."],
tool:["`\"\".join(sorted(w))` -- canonical key","`groups.setdefault(key, []).append(w)` -- create-or-append in one line"],
pit:"Using a list as a dict key raises TypeError. Keys must be hashable: use a string or a tuple.",
start:`def group_anagrams(strs):
    # return list of lists
`,
sol:`def group_anagrams(strs):
    groups = {}
    for w in strs:
        key = "".join(sorted(w))
        groups.setdefault(key, []).append(w)
    return list(groups.values())`,
tests:[{a:[["eat","tea","tan","ate","nat","bat"]],w:[["ate","eat","tea"],["bat"],["nat","tan"]]},{a:[[""]],w:[[""]]},{a:[["a"]],w:[["a"]]}],fl:{si:1,so:1}},

{id:"top-k-frequent",z:"ah",t:"Top K Frequent Elements",d:"M",lc:"LC 347",fn:"top_k_frequent",
prompt:"Return the `k` most frequent elements of `nums`, in any order. The answer is guaranteed unique.",
robo:"Which fault codes fired most this run? Count with a dict, then rank. On live streams you would keep a heap; offline, sorting the counted keys is cleanest.",
sig:["Phrases like top k, most frequent, k largest by score","Count first, select second"],
app:["Pass 1: histogram with `cnt.get(x, 0) + 1`.","Pass 2: sort the unique keys by count descending, slice `[:k]`.","Say the upgrades exist: a heap gives O(n log k), bucket sort gives O(n)."],
tool:["`sorted(cnt, key=lambda x: -cnt[x])[:k]` -- rank dict keys by value","Slicing never raises even if k is near len"],
pit:"`sorted(cnt)` alone sorts the keys by their own value, not by count -- the `key=` argument is the whole point.",
start:`def top_k_frequent(nums, k):
    # return list of k values
`,
sol:`def top_k_frequent(nums, k):
    cnt = {}
    for x in nums:
        cnt[x] = cnt.get(x, 0) + 1
    order = sorted(cnt, key=lambda x: -cnt[x])
    return order[:k]`,

{id:"product-except-self",z:"ah",t:"Product of Array Except Self",d:"M",lc:"LC 238",fn:"product_except_self",
prompt:"Return an array where `out[i]` is the product of every element of `nums` except `nums[i]`. Division is not allowed; run in O(n).",
robo:"Prefix/suffix accumulation is the same trick as your cumulative arc-length table: precompute running aggregates so each query costs O(1).",
sig:["Phrases like except self, without element i","Division banned points at prefix x suffix"],
app:["`out[i]` = (product of everything left of i) x (product of everything right of i).","Left pass: carry one running prefix product; write it into `out[i]` **before** multiplying in `nums[i]`.","Right pass: same from the end, multiplying into `out`."],
tool:["Two passes, one running scalar each -- no extra arrays","`range(n - 1, -1, -1)` for the reverse pass"],
pit:"Multiplying the current element into the running product before writing `out[i]` -- the order of those two lines is the entire problem.",
start:`def product_except_self(nums):
    # return list, no division
`,
sol:`def product_except_self(nums):
    n = len(nums)
    out = [1] * n
    left = 1
    for i in range(n):
        out[i] = left
        left *= nums[i]
    right = 1
    for i in range(n - 1, -1, -1):
        out[i] *= right
        right *= nums[i]
    return out`,
tests:[{a:[[1,2,3,4]],w:[24,12,8,6]},{a:[[-1,1,0,-3,3]],w:[0,0,9,0,0]}],fl:{}},

/* ---- Two Pointers ---- */
{id:"valid-palindrome",z:"tp",t:"Valid Palindrome",d:"E",lc:"LC 125",fn:"is_palindrome",
prompt:"Return True if `s` reads the same forwards and backwards, considering only alphanumeric characters and ignoring case.",
robo:"Two pointers walking inward is the same scan structure as checking a symmetric pressure profile across the fin midline.",
sig:["Compare a sequence with its reverse","Some characters must be skipped while scanning"],
app:["Pointers `l` and `r` start at both ends.","Inner while-loops skip non-alphanumeric characters on each side.","Compare lowercased characters; mismatch returns False; pointers crossing returns True."],
tool:["`c.isalnum()` and `c.lower()`","Outer loop `while l < r:`"],
pit:"The inner skip loops must also guard `l < r`, or punctuation-only inputs run the pointers past each other.",
start:`def is_palindrome(s):
    # alphanumeric only, case-insensitive
`,
sol:`def is_palindrome(s):
    l, r = 0, len(s) - 1
    while l < r:
        while l < r and not s[l].isalnum():
            l += 1
        while l < r and not s[r].isalnum():
            r -= 1
        if s[l].lower() != s[r].lower():
            return False
        l += 1
        r -= 1
    return True`,
tests:[{a:["A man, a plan, a canal: Panama"],w:true},{a:["race a car"],w:false},{a:[" "],w:true}],fl:{}},

{id:"container-water",z:"tp",t:"Container With Most Water",d:"M",lc:"LC 11",fn:"max_area",
prompt:"`height[i]` is a wall at x = i. Choose two walls so the container between them holds the most water. Return the maximum area.",
robo:"Greedy pointer movement with a proof -- the same which-side-is-the-bottleneck reasoning you use whenever one constraint limits the whole system.",
sig:["Best **pair** under a min() constraint","Squeeze from both ends"],
app:["Start with the widest container: `l = 0, r = n - 1`.","Area = `(r - l) * min(h[l], h[r])`.","Move the **shorter** wall inward: moving the taller one can only shrink the area, since width drops and height stays capped by the short wall."],
tool:["`min(height[l], height[r])`","`best = max(best, area)` each step"],
pit:"Moving the taller pointer to explore -- the greedy proof is exactly why only the shorter one moves.",
start:`def max_area(height):
    # return max area
`,
sol:`def max_area(height):
    l, r = 0, len(height) - 1
    best = 0
    while l < r:
        area = (r - l) * min(height[l], height[r])
        best = max(best, area)
        if height[l] < height[r]:
            l += 1
        else:
            r -= 1
    return best`,
tests:[{a:[[1,8,6,2,5,4,8,3,7]],w:49},{a:[[1,1]],w:1}],fl:{}},

{id:"three-sum",z:"tp",t:"3Sum",d:"M",lc:"LC 15",fn:"three_sum",
prompt:"Return all unique triplets in `nums` that sum to 0. No duplicate triplets in the output.",
robo:"Sort-then-two-pointers converts an O(n^3) search into O(n^2) -- the standard move whenever ordering the data unlocks a squeeze.",
sig:["Triplets summing to a target **with dedup**","Sorting is allowed"],
app:["Sort first. Fix index `i`, then run two-sum with pointers `l = i + 1, r = n - 1`.","Sum below zero moves `l` right; above zero moves `r` left; zero records and moves both.","Dedup in three places: skip repeated values at `i`, and at `l` and `r` after each hit."],
tool:["`nums.sort()`","`if i > 0 and nums[i] == nums[i-1]: continue`"],
pit:"Three separate dedup points (i, l, r). Missing any one of them produces duplicate triplets.",
start:`def three_sum(nums):
    # return list of triplets
`,
sol:`def three_sum(nums):
    nums.sort()
    res = []
    n = len(nums)
    for i in range(n - 2):
        if i > 0 and nums[i] == nums[i - 1]:
            continue
        l, r = i + 1, n - 1
        while l < r:
            s = nums[i] + nums[l] + nums[r]
            if s < 0:
                l += 1
            elif s > 0:
                r -= 1
            else:
                res.append([nums[i], nums[l], nums[r]])
                l += 1
                while l < r and nums[l] == nums[l - 1]:
                    l += 1
                r -= 1
                while l < r and nums[r] == nums[r + 1]:
                    r -= 1
    return res`,

{id:"longest-substring",z:"sw",t:"Longest Substring Without Repeats",d:"M",lc:"LC 3",fn:"length_of_longest_substring",
prompt:"Return the length of the longest substring of `s` without repeating characters.",
robo:"Variable-size sliding window: grow the right edge, jump the left edge only when the constraint breaks -- the same shape as a longest-clean-sensor-segment scan.",
sig:["Longest substring/subarray with a property","When the property breaks, the left pointer moves"],
app:["Window `[l, r]` plus a dict `last` mapping character to last index seen.","If `s[r]` was seen **inside** the current window, jump `l` to `last[s[r]] + 1`.","Answer is the max of `r - l + 1` over all r."],
tool:["`last[c] = r` after processing each character","The jump must never move l backwards: check `last[c] >= l`"],
pit:"Jumping `l = last[c] + 1` without checking the entry is inside the window drags l backwards -- the classic 'abba' bug.",
start:`def length_of_longest_substring(s):
    # return an int
`,
sol:`def length_of_longest_substring(s):
    last = {}
    l = 0
    best = 0
    for r, c in enumerate(s):
        if c in last and last[c] >= l:
            l = last[c] + 1
        last[c] = r
        best = max(best, r - l + 1)
    return best`,

{id:"min-size-subarray",z:"sw",t:"Minimum Size Subarray Sum",d:"M",lc:"LC 209",fn:"min_subarray_len",
prompt:"All elements of `nums` are positive. Return the smallest length of a contiguous subarray whose sum is at least `target`, or 0 if none exists.",
robo:"Shortest burst of samples whose energy crosses a threshold: the window sum grows on the right and shrinks greedily from the left.",
sig:["Minimum window satisfying a >= constraint","All positive means the window sum is monotone in its size"],
app:["Expand r, adding into a running sum.","While the sum is >= target: record the length, then shrink from the left.","Positivity is exactly what makes shrink-while-valid correct."],
tool:["Running `total += nums[r]` and `total -= nums[l]`","`best = min(best, r - l + 1)` **inside** the while"],
pit:"Recording the length outside the shrink loop misses shorter valid windows.",
start:`def min_subarray_len(target, nums):
    # return min length, or 0
`,
sol:`def min_subarray_len(target, nums):
    l = 0
    total = 0
    best = float('inf')
    for r in range(len(nums)):
        total += nums[r]
        while total >= target:
            best = min(best, r - l + 1)
            total -= nums[l]
            l += 1
    return 0 if best == float('inf') else best`,

{id:"valid-parentheses",z:"st",t:"Valid Parentheses",d:"E",lc:"LC 20",fn:"is_valid",
prompt:"Given a string containing only ()[]{}， return True if every bracket closes in the correct order.",
robo:"A stack mirrors nested state -- the same structure as tracking nested context frames in a parser or matched start/stop markers in a log.",
sig:["Matching or nesting pairs","Most recent open must close first = LIFO"],
app:["Map closers to openers: `{')': '(', ']': '[', '}': '{'}`.","Opener: push. Closer: the stack must be non-empty and its top must match; pop it.","Valid iff the stack is empty at the end."],
tool:["`stack.append(c)` / `stack.pop()`","`if not stack or stack.pop() != pairs[c]: return False`"],
pit:"Two distinct failure modes: popping an empty stack (input ')(' ) and leftovers at the end (input '((' ). Handle both.",
start:`def is_valid(s):
    # return True / False
`,
sol:`def is_valid(s):
    pairs = {')': '(', ']': '[', '}': '{'}
    stack = []
    for c in s:
        if c in pairs:
            if not stack or stack.pop() != pairs[c]:
                return False
        else:
            stack.append(c)
    return len(stack) == 0`,

{id:"daily-temperatures",z:"st",t:"Daily Temperatures",d:"M",lc:"LC 739",fn:"daily_temperatures",
prompt:"For each day, return how many days until a strictly warmer temperature; 0 if it never comes.",
robo:"Monotonic stack = wait until a bigger event resolves you -- the pattern behind every next-greater query on a time series.",
sig:["Next greater element, days until warmer","The answer for i is resolved by a later j"],
app:["The stack holds **indices** of days still waiting; their temperatures are decreasing top-down.","New day j arrives: while it is warmer than the temperature at the stack top i, pop i and set `ans[i] = j - i`.","Push j. Whatever remains unresolved keeps 0."],
tool:["`while stack and temps[j] > temps[stack[-1]]:`","Preallocate `ans = [0] * n`"],
pit:"Storing temperatures on the stack instead of indices -- you need the indices to compute distances.",
start:`def daily_temperatures(temps):
    # return list of waits
`,
sol:`def daily_temperatures(temps):
    n = len(temps)
    ans = [0] * n
    stack = []
    for j in range(n):
        while stack and temps[j] > temps[stack[-1]]:
            i = stack.pop()
            ans[i] = j - i
        stack.append(j)
    return ans`,

sol:`def ema(readings, alpha):
    if not readings:
        return []
    out = [readings[0]]

    for x in readings[1:]:

prompt:"A robot sits at pose (x, y, theta) in the world. `points` are [px, py] coordinates in the robot's body frame. Return each point in world coordinates: rotate by theta, then translate by (x, y).",
robo:"THE transform: sonar hit in body frame to world map. Getting rotate-then-translate backwards puts every obstacle in the wrong place.",
sig:["Body frame <-> world frame; sensor reading at a robot pose","2D rigid transform = rotation matrix + offset"],
app:["Precompute `c, s = cos(theta), sin(theta)` once, outside the loop.","`wx = x + px*c - py*s` and `wy = y + px*s + py*c` -- the 2x2 rotation matrix written out.","Know the inverse too (world to body): subtract first, rotate by -theta."],
tool:["`math.cos`, `math.sin`","Return `[wx, wy]` pairs, same shape as the input"],
pit:"The minus sign lives on the py*s term of the x-row ONLY. Sign errors here are silent: numbers look plausible, map is garbage.",
start:`import math

def transform_points(points, x, y, theta):
    # return list of [wx, wy]
`,
sol:`import math

def transform_points(points, x, y, theta):
    c, s = math.cos(theta), math.sin(theta)
    out = []
    for px, py in points:
        wx = x + px * c - py * s
        wy = y + px * s + py * c
        out.append([wx, wy])
    return out`,

prompt:"Start at pose (0, 0, 0). `cmds` is a list of [v, omega, dt]. Euler-integrate the unicycle model, updating position with the CURRENT heading before updating heading: x += v*cos(th)*dt; y += v*sin(th)*dt; th += omega*dt. Return [x, y, th].",
robo:"Dead reckoning from fin/wheel odometry: the pose estimate you have when no external fix exists, and the prediction step of a future EKF.",
sig:["Integrate velocity commands into a pose","Update ORDER matters -- stated, or you must ask"],
app:["Loop over commands applying the three update lines in the stated order.","Position must use the heading from BEFORE this step's rotation; swapping lines gives a different discretization.","Say the words Euler integration, and that error shrinks with dt."],
tool:["`math.cos(th)`, `math.sin(th)` re-evaluated every step","Multiple return: `return [x, y, th]`"],
pit:"Updating theta before x and y: a one-line-order bug that only shows up as slow drift in tests with turns.",
start:`import math

def integrate_odometry(cmds):
    # cmds: [[v, omega, dt], ...] -> [x, y, th]
`,
sol:`import math

def integrate_odometry(cmds):
    x, y, th = 0.0, 0.0, 0.0
    for v, w, dt in cmds:
        x += v * math.cos(th) * dt
        y += v * math.sin(th) * dt
        th += w * dt
    return [x, y, th]`,

{id:"path-point",z:"rb",t:"Point Along Path",d:"M",lc:"Custom",fn:"point_along_path",
prompt:"Given a polyline `waypoints` = [[x, y], ...] and an arc length s, return the [x, y] point lying distance s along the path from the first waypoint. Clamp: s <= 0 gives the first point; s >= total length gives the last.",
robo:"The math under pure pursuit: give me the point 0.5 m ahead along the reference path. You derived exactly this for the trajectory tracker.",
sig:["Point at distance d along a path","Accumulate segment lengths, interpolate inside one segment"],
app:["Walk segments, spending s against each segment length until it runs out inside one.","Interpolate there: `t = remaining / seg_len`, point = a + t * (b - a).","Skip zero-length segments (duplicate waypoints).","Upgrade to mention: precompute cumulative lengths once, then bisect per query -- O(log n)."],
tool:["`math.hypot(dx, dy)` for segment length","Lerp: `a[0] + t * (b[0] - a[0])`"],
pit:"Dividing by a zero segment length when two waypoints coincide -- one `if seg == 0: continue` guard.",
start:`import math

def point_along_path(waypoints, s):
    # return [x, y] at arc length s
`,
sol:`import math

def point_along_path(waypoints, s):
    if s <= 0:
        return [waypoints[0][0], waypoints[0][1]]
    for i in range(len(waypoints) - 1):
        a, b = waypoints[i], waypoints[i + 1]
        seg = math.hypot(b[0] - a[0], b[1] - a[1])
        if seg == 0:
            continue
        if s <= seg:
            t = s / seg
            return [a[0] + t * (b[0] - a[0]),
                    a[1] + t * (b[1] - a[1])]
        s -= seg
    last = waypoints[-1]
    return [last[0], last[1]]`,
tests:[{a:[[[0,0],[10,0]],5],w:[5,0]},{a:[[[0,0],[3,0],[3,4]],5],w:[3,2]},{a:[[[0,0],[1,0]],9],w:[1,0]},{a:[[[0,0],[0,0],[2,0]],1],w:[1,0]}],fl:{ap:1}},

{id:"calib",z:"rb",t:"Calibration Table Lookup",d:"M",lc:"Custom",fn:"calib_lookup",
prompt:"`table` is a list of [raw, value] calibration pairs sorted by raw. Return the calibrated value for reading x by linear interpolation between the two bracketing pairs. Clamp outside the table range.",
robo:"Exactly how a raw MS5837 count becomes depth in meters when the datasheet polynomial is not trusted: bench-calibrate a table, interpolate at runtime.",
sig:["Lookup table with interpolation","Sorted keys -> binary search for the bracket"],
app:["Clamp first: x at or below the first raw gives the first value; at or above the last gives the last.","Find the bracketing segment (linear scan here; say the `bisect_right` O(log n) upgrade exists).","Lerp: `v0 + (x - r0) * (v1 - v0) / (r1 - r0)`."],
tool:["`bisect.bisect_right(raws, x)` for the fast version","Column extraction: `raws = [p[0] for p in table]`"],
pit:"Off-by-one picking the bracket after bisect -- always verify with an x exactly equal to a table node.",
start:`def calib_lookup(table, x):
    # linear interpolation, clamped
`,
sol:`def calib_lookup(table, x):
    if x <= table[0][0]:
        return table[0][1]
    if x >= table[-1][0]:
        return table[-1][1]
    for i in range(len(table) - 1):
        r0, v0 = table[i]
        r1, v1 = table[i + 1]
        if r0 <= x <= r1:
            t = (x - r0) / (r1 - r0)
            return v0 + t * (v1 - v0)`,

{id:"dist-transform",z:"rb",t:"Obstacle Distance Field",d:"M",lc:"Custom",fn:"distance_transform",
prompt:"Occupancy grid: 1 = obstacle, 0 = free. Return a same-shape grid where each cell holds its 4-connected step distance to the nearest obstacle (obstacles = 0). At least one obstacle exists.",
robo:"The clearance field: cost maps for planners (stay 2 cells from walls) and the safety margin your controller checks -- one multi-source BFS.",
sig:["Distance to the nearest X for EVERY cell","Multi-source BFS: seed all X cells at 0"],
app:["Seed the queue with every obstacle at distance 0 -- never BFS per free cell.","Standard BFS; first arrival at a cell is its true distance (unweighted).","An output grid initialized to -1 doubles as the visited set."],
tool:["`dist = [[-1] * cols for _ in range(rows)]`","`from collections import deque`"],
pit:"`[[-1]*cols]*rows` -- the aliased-rows trap, and in THIS problem it visibly corrupts the whole field.",
start:`def distance_transform(grid):
    # return grid of step distances
`,
sol:`def distance_transform(grid):
    from collections import deque
    rows, cols = len(grid), len(grid[0])
    dist = [[-1] * cols for _ in range(rows)]
    q = deque()
    for r in range(rows):
        for c in range(cols):
            if grid[r][c] == 1:
                dist[r][c] = 0
                q.append((r, c))
    while q:
        r, c = q.popleft()
        for dr, dc in ((1,0),(-1,0),(0,1),(0,-1)):
            nr, nc = r + dr, c + dc
            if 0 <= nr < rows and 0 <= nc < cols and dist[nr][nc] == -1:
                dist[nr][nc] = dist[r][c] + 1
                q.append((nr, nc))
    return dist`,
tests:[{a:[[[1,0,0]]],w:[[0,1,2]]},{a:[[[0,0],[0,1]]],w:[[2,1],[1,0]]},{a:[[[1,0],[0,1]]],w:[[0,1],[1,0]]}],fl:{}},

{id:"simplify",z:"rb",t:"Simplify Waypoint Path",d:"M",lc:"Custom",fn:"simplify_path",
prompt:"A recorded path [[x, y], ...] with integer coords contains redundant collinear points. Remove every interior point that is collinear (cross product exactly 0) with the previously KEPT point and the next point. Always keep both endpoints.",
robo:"Waypoint compression before sending a path over the CAN/serial link: collinear samples carry no information, and the cross product is the collinearity test.",
sig:["Simplify / compress a polyline","Collinearity -> 2D cross product == 0"],
app:["cross(u, v) = ux*vy - uy*vx; zero iff parallel.","Sweep interior points: u = cur - last_kept, v = next - cur; keep cur only if cross != 0.","Comparing against the last KEPT point (not p[i-1]) collapses whole straight runs in one pass.","Real-world upgrade to name: RDP (Ramer-Douglas-Peucker) with a tolerance, for noisy floats."],
tool:["`ux * vy - uy * vx`","Build `out = [points[0]]` and compare against `out[-1]`"],
pit:"Testing against the immediate predecessor instead of the last kept point leaves every other point of a long straight run in place.",
start:`def simplify_path(points):
    # return compressed waypoint list
`,
sol:`def simplify_path(points):
    if len(points) <= 2:
        return points
    out = [points[0]]
    for i in range(1, len(points) - 1):
        ax, ay = out[-1]
        bx, by = points[i]
        cx, cy = points[i + 1]
        cross = (bx - ax) * (cy - by) - (by - ay) * (cx - bx)
        if cross != 0:
            out.append(points[i])
    out.append(points[-1])
    return out`,

{id:"max-depth",z:"tr",t:"Maximum Depth of Binary Tree",d:"E",lc:"LC 104",fn:"max_depth",wrap:"_run",
pre:`class TreeNode:
    def __init__(self, val=0, left=None, right=None):
        self.val = val; self.left = left; self.right = right
def _build(a):
    if not a or a[0] is None: return None
    root = TreeNode(a[0]); _dq = deque if 'deque' in dir() else __import__('collections').deque
    q = _dq([root]); i = 1
    while q and i < len(a):
        n = q.popleft()
        if i < len(a) and a[i] is not None:
            n.left = TreeNode(a[i]); q.append(n.left)
        i += 1
        if i < len(a) and a[i] is not None:
            n.right = TreeNode(a[i]); q.append(n.right)
        i += 1
    return root
def _run(a):
    return max_depth(_build(a))`,
prompt:"Given the root of a binary tree (provided as a level-order list where `null` marks a missing child), return its maximum depth: the number of nodes along the longest root-to-leaf path.",
robo:"Recursion over a tree is the same shape as walking a tf transform tree or a scene graph: solve a node in terms of its children.",
sig:["Depth / height / longest path in a tree","'In terms of its children' -> recursion"],
app:["Base case: an empty node has depth 0.","Recurse: depth = 1 + max(depth(left), depth(right)).","That is the entire function. Trust the recursion; do not try to track a running max by hand."],
tool:["`if not node: return 0`","`1 + max(left, right)`"],
pit:"Forgetting the empty-node base case gives an AttributeError on a leaf's None child. Every tree recursion starts with the None check.",
start:`# TreeNode: .val .left .right  (build handled for you)
def max_depth(root):
    # return an int
`,
sol:`def max_depth(root):
    if not root:
        return 0
    return 1 + max(max_depth(root.left), max_depth(root.right))`,

{id:"invert-tree",z:"tr",t:"Invert Binary Tree",d:"E",lc:"LC 226",fn:"invert_tree",wrap:"_run",
pre:`class TreeNode:
    def __init__(self, val=0, left=None, right=None):
        self.val = val; self.left = left; self.right = right
def _build(a):
    if not a or a[0] is None: return None
    root = TreeNode(a[0]); _dq = deque if 'deque' in dir() else __import__('collections').deque
    q = _dq([root]); i = 1
    while q and i < len(a):
        n = q.popleft()
        if i < len(a) and a[i] is not None:
            n.left = TreeNode(a[i]); q.append(n.left)
        i += 1
        if i < len(a) and a[i] is not None:
            n.right = TreeNode(a[i]); q.append(n.right)
        i += 1
    return root
def _ser(root):
    _dq = deque if 'deque' in dir() else __import__('collections').deque
    if not root: return []
    out = []; q = _dq([root])
    while q:
        n = q.popleft()
        if n is None: out.append(None); continue
        out.append(n.val); q.append(n.left); q.append(n.right)
    while out and out[-1] is None: out.pop()
    return out
def _run(a):
    return _ser(invert_tree(_build(a)))`,
prompt:"Invert a binary tree: swap the left and right child of every node. Return the (list-serialized) root. Input is a level-order list.",
robo:"A mirror operation on a tree -- structurally identical to reflecting a kinematic chain across a symmetry plane, which you would do to compare left-vs-right stroke data.",
sig:["Mirror / flip / reflect a tree","Swap children at every node -> recursion or BFS"],
app:["At each node, swap left and right, then recurse into both.","Order does not matter: swap-then-recurse or recurse-then-swap both work.","Return the node so the recursion composes."],
tool:["`node.left, node.right = node.right, node.left`","Base case `if not node: return None`"],
pit:"Swapping with a temp variable in the wrong order clobbers one side. Python tuple-swap sidesteps it entirely.",
start:`def invert_tree(root):
    # return the root
`,
sol:`def invert_tree(root):
    if not root:
        return None
    root.left, root.right = root.right, root.left
    invert_tree(root.left)
    invert_tree(root.right)
    return root`,

def _build(a):

{id:"level-order",z:"tr",t:"Binary Tree Level Order Traversal",d:"M",lc:"LC 102",fn:"level_order",wrap:"_run",
pre:`class TreeNode:
    def __init__(self, val=0, left=None, right=None):
        self.val = val; self.left = left; self.right = right
def _build(a):
    if not a or a[0] is None: return None
    root = TreeNode(a[0]); _dq = deque if 'deque' in dir() else __import__('collections').deque
    q = _dq([root]); i = 1
    while q and i < len(a):
        n = q.popleft()
        if i < len(a) and a[i] is not None:
            n.left = TreeNode(a[i]); q.append(n.left)
        i += 1
        if i < len(a) and a[i] is not None:
            n.right = TreeNode(a[i]); q.append(n.right)
        i += 1
    return root
def _run(a):
    return level_order(_build(a))`,
prompt:"Return the level-order traversal of a binary tree as a list of levels: `[[level0], [level1], ...]`. Input is a level-order list.",
robo:"BFS on a tree is the same queue machinery as your grid BFS -- but here you snapshot the queue size each round to cut the stream into levels.",
sig:["Group tree nodes BY LEVEL / by depth","BFS with a per-level boundary"],
app:["Queue seeded with the root. Each round, read `len(queue)` FIRST and freeze it -- that count is exactly this level's width.","Pop that many nodes, collect their values, enqueue their children.","The frozen count is the whole trick; the queue grows as you go, so you must snapshot before draining."],
tool:["`from collections import deque`","`for _ in range(len(q)):` -- snapshot the width"],
pit:"Iterating `while q` without freezing the level size mixes children into the current level. Capture `len(q)` before the inner loop.",
start:`def level_order(root):
    # return list of levels
`,
sol:`def level_order(root):
    from collections import deque
    if not root:
        return []
    out = []
    q = deque([root])
    while q:
        level = []
        for _ in range(len(q)):
            n = q.popleft()
            level.append(n.val)
            if n.left: q.append(n.left)
            if n.right: q.append(n.right)
        out.append(level)
    return out`,

pre:`class TreeNode:
    def __init__(self, val=0, left=None, right=None):

def _build(a):

    q = _dq([root]); i = 1

def _run(a, target):

prompt:"Return True if the tree has a root-to-LEAF path whose node values sum to `target`. Input is a level-order list plus the target integer.",
robo:"Accumulate-along-a-path with a leaf test -- the discrete cousin of integrating cost along a planned route until you reach a terminal node.",
sig:["Root-to-leaf path with a target sum","Carry a running total DOWN the recursion"],
app:["Subtract the current value from the remaining target as you descend.","A LEAF (no children) succeeds only if the remaining target now equals its value -- i.e. remainder hits 0 exactly at a leaf.","Recurse left OR right; either succeeding is enough.","Empty tree is False."],
tool:["Pass the shrinking target as a parameter, no globals","`not node.left and not node.right` = leaf test"],
pit:"Declaring success when the running sum hits target at an INTERNAL node. It must be a leaf -- check both children are None.",
start:`def has_path_sum(root, target):
    # return True / False
`,
sol:`def has_path_sum(root, target):
    if not root:
        return False
    if not root.left and not root.right:
        return target == root.val
    rem = target - root.val
    return has_path_sum(root.left, rem) or has_path_sum(root.right, rem)`,

{id:"dbg-grid",z:"db",t:"Debug: 2D Grid Init",d:"E",lc:"Gotcha",fn:"make_grid",dbg:1,
prompt:"`make_grid(rows, cols)` should return a rows x cols grid of zeros, then set `grid[0][0] = 1` and return it. The code below returns a grid where the WHOLE first column became 1. Find and fix the one-line bug.",
robo:"The single most common grid bug in robotics code. It silently corrupts every occupancy grid, costmap, and visited-set you build with the wrong idiom.",
sig:["Every row mirrors every edit to another row","One assignment changes multiple 'rows'"],
app:["`[[0]*cols]*rows` makes ONE row object, then rows references to it. Editing one edits all.","Fix: build each row independently with a comprehension: `[[0]*cols for _ in range(rows)]`.","Same trap bites `[[]]*n` for adjacency lists and any `[[...]]*n`."],
tool:["`[[0]*cols for _ in range(rows)]`","Test: mutate one cell, confirm the others stay 0"],
pit:"The outer `*rows` aliases the row. The list comprehension is the only safe construction; memorize it.",
start:`def make_grid(rows, cols):
    grid = [[0] * cols] * rows   # <-- bug is here
    grid[0][0] = 1
    return grid`,
sol:`def make_grid(rows, cols):
    grid = [[0] * cols for _ in range(rows)]
    grid[0][0] = 1
    return grid`,

{id:"dbg-atan2",z:"db",t:"Debug: Bearing Angle",d:"E",lc:"Gotcha",fn:"bearing",dbg:1,

    from collections import deque
    adj = [[] for _ in range(n)]
    for u, v in edges:
        adj[u].append(v); adj[v].append(u)
    dist = [-1] * n
    dist[src] = 0
    q = deque([src])
    while q:

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function deckCatName(k){const x=DECK_CATS.find(c=>c[0]===k);return x?x[1]:k}
function deckText(c,k){const z=S.lang==="zh"&&c[k+"_zh"];return z||c[k]}

let S={code:{},solved:{},studied:{},review:{},last:null,lastCard:null,filter:"all",deckFilter:"all",lang:"en"};
const KEY="divestation_v1";
async function loadState(){let raw=null;
  try{const r=await window.storage.get(KEY);if(r&&r.value)raw=r.value}catch(e){}
  if(!raw){try{raw=localStorage.getItem(KEY)}catch(e){}}
  if(raw){try{const o=JSON.parse(raw);for(const k of["code","solved","studied","review"])if(o[k]&&typeof o[k]==="object")S[k]=o[k];for(const k of["last","lastCard","filter","deckFilter","lang"])if(o[k]!==undefined)S[k]=o[k]}catch(e){}}

    ed.addEventListener("keydown",e=>{
      if(e.key==="Tab"){e.preventDefault();const st=ed.selectionStart;ed.setRangeText("    ",st,ed.selectionEnd,"end");S.code[p.id]=ed.value;save()}
      else if(e.key==="Enter"){e.preventDefault();const st=ed.selectionStart;const line=ed.value.slice(0,st).split("\n").pop();let ind=(line.match(/^ */)||[""])[0];if(/:\s*$/.test(line))ind+="    ";ed.setRangeText("\n"+ind,st,ed.selectionEnd,"end");S.code[p.id]=ed.value;save()}});
    $("#resetBtn").onclick=()=>{ed.value=p.start;S.code[p.id]=p.start;save()};
    $("#runBtn").onclick=()=>runTests(p);
  }
}

/* ---- python engines ---- */
let ENG={type:null,py:null,ready:false,loading:null};
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s)})}
function engChip(txt,ok){const c=$("#engChip");c.textContent=txt;c.className="chip"+(ok?" ok":"")}
async function ensureEngine(stat){if(ENG.ready)return;
  if(!ENG.loading){ENG.loading=(async()=>{
    stat("Loading Python engine (first run only, ~6 MB)...");engChip("python: loading");
    const mirrors=[["https://cdnjs.cloudflare.com/ajax/libs/pyodide/0.24.1/pyodide.js","https://cdnjs.cloudflare.com/ajax/libs/pyodide/0.24.1/"],["https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js","https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"]];
    for(const[src,idx]of mirrors){try{await loadScript(src);ENG.py=await loadPyodide({indexURL:idx});ENG.type="pyodide";ENG.ready=true;engChip("python: pyodide",true);return}catch(e){}}
    stat("Pyodide unavailable, loading Skulpt fallback...");
    const sk=[["https://cdnjs.cloudflare.com/ajax/libs/skulpt/1.2.0/skulpt.min.js","https://cdnjs.cloudflare.com/ajax/libs/skulpt/1.2.0/skulpt-stdlib.js"],["https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js","https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"]];
    for(const[a,b]of sk){try{await loadScript(a);await loadScript(b);ENG.type="skulpt";ENG.ready=true;engChip("python: skulpt",true);return}catch(e){}}
    engChip("python: offline");throw new Error("Could not load a Python engine — check network and retry.")})()}
  await ENG.loading}
const SHIM=[
"class _Hq:",
"    def heappush(self, h, item):",
"        h.append(item)",
"        i = len(h) - 1",
"        while i > 0:",
"            p = (i - 1) // 2",
"            if h[i] < h[p]:",
"                t = h[i]; h[i] = h[p]; h[p] = t; i = p",
"            else: break",
"    def heappop(self, h):",
"        last = h.pop()",
"        if not h: return last",
"        root = h[0]; h[0] = last",
"        i = 0; n = len(h)",
"        while True:",
"            l = 2*i+1; r = l+1; s = i",
"            if l < n and h[l] < h[s]: s = l",
"            if r < n and h[r] < h[s]: s = r",
"            if s == i: break",
"            t = h[i]; h[i] = h[s]; h[s] = t; i = s",
"        return root",
"    def heapify(self, h):",
"        tmp = list(h)",
"        while len(h) > 0: h.pop()",
"        for x in tmp: self.heappush(h, x)",
"heapq = _Hq()",
"heappush = heapq.heappush",
"heappop = heapq.heappop",
"heapify = heapq.heapify",
"class deque:",
"    def __init__(self, it=None):",
"        self.d = []",
"        if it:",
"            for x in it: self.d.append(x)",
"    def append(self, x): self.d.append(x)",
"    def appendleft(self, x): self.d.insert(0, x)",
"    def popleft(self): return self.d.pop(0)",
"    def pop(self): return self.d.pop()",
"    def __len__(self): return len(self.d)",
"    def __iter__(self): return iter(self.d)",
"def Counter(it=None):",
"    d = {}",
"    if it:",
"        for x in it: d[x] = d.get(x, 0) + 1",
"    return d",
"def bisect_left(a, x):",
"    lo = 0; hi = len(a)",
"    while lo < hi:",
"        m = (lo + hi) // 2",
"        if a[m] < x: lo = m + 1",
"        else: hi = m",
"    return lo",
"def bisect_right(a, x):",
"    lo = 0; hi = len(a)",
"    while lo < hi:",
"        m = (lo + hi) // 2",
"        if x < a[m]: lo = m + 1",
"        else: hi = m",
"    return lo",
"def _esc(s):",
"    bs = chr(92); q = chr(34); out = q",
"    for ch in s:",
"        if ch == bs: out = out + bs + bs",
"        elif ch == q: out = out + bs + q",
"        else: out = out + ch",
"    return out + q",
"def _ser(x):",
"    if x is True: return 'true'",
"    if x is False: return 'false'",
"    if x is None: return 'null'",
"    if isinstance(x, (list, tuple)):",
"        parts = []",
"        for i in x: parts.append(_ser(i))",
"        return '[' + ','.join(parts) + ']'",
"    if isinstance(x, str): return _esc(x)",
"    return str(x)"
].join("\n");
function stripImports(code){return code.replace(/^[ \t]*(from[ \t]+(heapq|collections|bisect|typing|functools|itertools)[ \t]+import[^\n]*|import[ \t]+(heapq|collections|bisect|typing|functools|itertools)[^\n]*)$/gm,"# provided by shim")}
function pyLit(v){if(v===null)return"None";if(v===true)return"True";if(v===false)return"False";
  if(Array.isArray(v))return"["+v.map(pyLit).join(",")+"]";
  if(typeof v==="string")return JSON.stringify(v);return String(v)}
function buildScript(p,user,args){
  const pre=p.pre?p.pre+"\n":"";
  const call=p.wrap?("_r="+p.wrap+"(*_args)\n"):("_r="+p.fn+"(*_args)\n");
  const tail="\n"+call+(p.fl.ip?"_r=_args[0]\n":"");
  if(ENG.type==="pyodide")return "import json as _json\n"+pre+user+"\n_args=_json.loads("+JSON.stringify(JSON.stringify(args))+")"+tail+"print('@@R@@'+_json.dumps(_r))";
  return SHIM+"\n"+pre+stripImports(user)+"\n_args="+pyLit(args)+tail+"print('@@R@@'+_ser(_r))"}
async function runScript(code){
  if(ENG.type==="pyodide"){const out=[];
    ENG.py.setStdout({batched:s=>out.push(s)});ENG.py.setStderr({batched:s=>out.push(s)});
    try{await ENG.py.runPythonAsync(code);return{out:out.join("\n"),err:null}}
    catch(e){return{out:out.join("\n"),err:String(e.message||e)}}}
  return new Promise(res=>{const out=[];
    Sk.configure({output:s=>out.push(s),read:x=>{if(Sk.builtinFiles===undefined||Sk.builtinFiles.files[x]===undefined)throw "File not found: '"+x+"'";return Sk.builtinFiles.files[x]},__future__:Sk.python3,execLimit:10000});
    Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody("<stdin>",false,code,true)).then(()=>res({out:out.join(""),err:null}),e=>res({out:out.join(""),err:e.toString()}))})}
function cmpAny(a,b){const x=JSON.stringify(a),y=JSON.stringify(b);return x<y?-1:x>y?1:0}
function canon(v,p){if(!Array.isArray(v))return v;let r=v;
  if(p.fl.si)r=r.map(x=>Array.isArray(x)?[...x].sort(cmpAny):x);
  if(p.fl.so)r=[...r].sort(cmpAny);return r}
function eq(a,b,ap){
  if(typeof a==="number"&&typeof b==="number")return ap?Math.abs(a-b)<=1e-6+1e-6*Math.abs(b):Math.abs(a-b)<1e-9;
  if(Array.isArray(a)&&Array.isArray(b)){if(a.length!==b.length)return false;
    for(let i=0;i<a.length;i++)if(!eq(a[i],b[i],ap))return false;return true}
  return a===b}
async function runTests(p){
  const btn=$("#runBtn"),stat=t=>{$("#runStat").textContent=t},out=$("#out");
  btn.disabled=true;out.innerHTML="";
  try{await ensureEngine(stat)}catch(e){stat("");out.innerHTML='<div class="trow bad"><span class="tt">✗ '+esc(e.message)+'</span></div>';btn.disabled=false;return}
  stat("Running...");
  const user=$("#ed").value;let allOk=true;let html="";
  for(let i=0;i<p.tests.length;i++){const t=p.tests[i];
    const args=JSON.parse(JSON.stringify(t.a));
    const res=await runScript(buildScript(p,user,args));
    let got=null,fail=null,prints="";
    if(res.err)fail=res.err;
    else{const k=res.out.indexOf("@@R@@");
      if(k<0)fail="No result returned — did you rename or forget the function "+p.fn+"()?";
      else{prints=res.out.slice(0,k).trim();const line=res.out.slice(k+5);const nl=line.indexOf("\n");
        try{got=JSON.parse(nl<0?line:line.slice(0,nl))}catch(e){fail="Could not read the returned value."}}}
    let ok=false;
    if(!fail)ok=eq(canon(got,p),canon(t.w,p),!!p.fl.ap);
    if(!ok)allOk=false;
    html+='<div class="trow '+(ok?"ok":"bad")+'"><span class="tt">'+(ok?"✓":"✗")+' Test '+(i+1)+'</span>';
    if(!ok){html+='<div class="mono2">in:  '+esc(t.a.map(x=>JSON.stringify(x)).join(", "))+'\nexp: '+esc(JSON.stringify(t.w))+'\ngot: '+esc(fail?("[error] "+fail):JSON.stringify(got))+(prints?'\n--- your prints ---\n'+esc(prints):"")+'</div>'}
    else if(prints){html+='<div class="mono2">'+esc(prints)+'</div>'}
    html+='</div>';out.innerHTML=html}
  stat("");
  if(allOk){S.solved[p.id]=true;save();renderNav();
    out.innerHTML+='<div class="bigok">All tests passed — marked SOLVED. Engine: '+ENG.type+'.</div>';
    const b=document.querySelector(".badges");if(b&&!b.querySelector(".bg.solved")){const s=document.createElement("span");s.className="bg solved";s.textContent="SOLVED";b.insertBefore(s,b.querySelector(".rvbtn"))}}
  btn.disabled=false}
