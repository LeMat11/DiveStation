  {"id":"flow-config-flag-architecture-switching-pretrained-vs-e2e","proj":"flow","cat":"pylang","term":"Config-flag architecture switching (pretrained vs. e2e)","detail":"In the Flow Sensing reconstruction pipeline, I used Config-flag architecture switching (pretrained vs. e2e), a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — running a clean pretrained-versus-end-to-end ablation from one codebase. In practice, I implemented it this way: one codebase, one boolean, two experiment modes for clean ablation. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"running a clean pretrained-versus-end-to-end ablation from one codebase","recall":"How would you structure code so pretrained and end-to-end models can be compared in a clean ablation?","recall_zh":"你将如何构建代码，以便可以干净地比较预训练模型和端到端模型？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Config-flag architecture switching (pretrained vs. e2e) 来划分软件职责和接口边界。它解决的是这个具体问题：从一个代码库运行干净的预训练与端到端消融。具体实现上，一个代码库、一个布尔值、两种干净消融的实验模式。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"从一个代码库运行干净的预训练与端到端消融"},
  {"id":"flow-einsum-tensor-reshaping-for-b-n-patch-t-c-h-w","proj":"flow","cat":"pylang","term":"`einsum` and high-dimensional tensor reshaping","detail":"In the Flow Sensing reconstruction pipeline, I used `einsum` and high-dimensional tensor reshaping, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — the 6D input tensor without manual loops. In practice, I implemented it this way: manages the 6D input tensor without manual loops. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"the 6D input tensor without manual loops","recall":"How would you process a high-dimensional batch of sensor patches without error-prone Python loops?","recall_zh":"如何在不使用容易出错的 Python 循环的情况下处理一批高维传感器块？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 `einsum` and high-dimensional tensor reshaping 来划分软件职责和接口边界。它解决的是这个具体问题：无需手动循环的 6D 输入张量。具体实现上，管理 6D 输入张量，无需手动循环。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"无需手动循环的 6D 输入张量"},
  {"id":"flow-frozen-module-feature-extraction-perceptual-loss","proj":"flow","cat":"pylang","term":"Frozen-module feature extraction (perceptual loss)","detail":"In the Flow Sensing reconstruction pipeline, I used Frozen-module feature extraction (perceptual loss), a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — using encoder features as a stable loss signal without updating the loss network. In practice, I implemented it this way: runs a `.eval()` + `requires_grad=False` encoder as a loss network. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"using encoder features as a stable loss signal without updating the loss network","recall":"How do you use a pretrained network as a perceptual-loss feature extractor without accidentally updating it?","recall_zh":"如何使用预训练网络作为感知损失特征提取器而不意外更新它？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Frozen-module feature extraction (perceptual loss) 来划分软件职责和接口边界。它解决的是这个具体问题：使用编码器特征作为稳定的损失信号，而不更新损失网络。具体实现上，运行 `.eval()` + `requires_grad=False` 编码器作为损失网络。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"使用编码器特征作为稳定的损失信号，而不更新损失网络"},
  {"id":"flow-w-and-b-config-logging-run-naming-convention","proj":"flow","cat":"pylang","term":"W&B config logging + run naming convention","detail":"In the Flow Sensing reconstruction pipeline, I used W&B config logging + run naming convention, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — the 2×2 ablation grid queryable/comparable on one dashboard. In practice, I implemented it this way: makes the 2×2 ablation grid queryable/comparable on one dashboard. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"the 2×2 ablation grid queryable/comparable on one dashboard","recall":"What experiment metadata would you log so a multi-factor ablation remains reproducible and easy to compare?","recall_zh":"你将记录哪些实验元数据，以便多因素消融保持可重复且易于比较？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 W&B config logging + run naming convention 来划分软件职责和接口边界。它解决的是这个具体问题：2×2 消融网格可在一个仪表板上查询/比较。具体实现上，使 2×2 消融网格在一个仪表板上可查询/可比较。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"2×2 消融网格可在一个仪表板上查询/比较"},
  {"id":"flow-mat-i-o-with-scipy-row-major-transpose-handling","proj":"flow","cat":"pylang","term":"`.mat` I/O with scipy + row-major transpose handling","detail":"In the Flow Sensing reconstruction pipeline, I used `.mat` I/O with scipy + row-major transpose handling, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — MATLAB-origin data (column-major) into PyTorch cleanly. In practice, I implemented it this way: bridges MATLAB-origin data (column-major) into PyTorch cleanly. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"MATLAB-origin data (column-major) into PyTorch cleanly","recall":"What data-layout issue must you handle when moving multidimensional arrays between MATLAB and PyTorch?","recall_zh":"在 MATLAB 和 PyTorch 之间移动多维数组时必须处理哪些数据布局问题？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 `.mat` I/O with scipy + row-major transpose handling 来划分软件职责和接口边界。它解决的是这个具体问题：把 MATLAB 的 column-major 数据正确转换成 PyTorch 期望的内存与维度布局。具体实现上，读取 `.mat` 后，我显式处理 axis 顺序和 transpose，把 MATLAB 的 column-major array 转成 PyTorch 期望的 layout。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"把 MATLAB 的 column-major 数据正确转换成 PyTorch 期望的内存与维度布局"},
  {"id":"flow-miniature-piv-via-ov9281-global-shutter-sensor-1280-800","proj":"flow","cat":"hw","term":"Miniature PIV via OV9281 global-shutter sensor (1280×800)","detail":"In the Flow Sensing reconstruction pipeline, I used Miniature PIV via OV9281 global-shutter sensor (1280×800), a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — motion distortion of fast-moving tracer particles. In practice, I implemented it this way: global shutter avoids motion distortion of fast-moving tracer particles. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"motion distortion of fast-moving tracer particles","recall":"Why is global shutter important when imaging fast tracer particles for flow measurement?","recall_zh":"用高速示踪粒子做流场测量时，为什么全局快门很重要？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Miniature PIV via OV9281 global-shutter sensor (1280×800) 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：快速移动示踪粒子的运动畸变。具体实现上，全局快门避免快速移动的示踪粒子的运动失真。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"快速移动示踪粒子的运动畸变"},
  {"id":"flow-synchronized-multi-sensor-acquisition-5-pressure-piv","proj":"flow","cat":"hw","term":"Synchronized multi-sensor acquisition (5 pressure + PIV)","detail":"In the Flow Sensing reconstruction pipeline, I used Synchronized multi-sensor acquisition (5 pressure + PIV), a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — temporal misalignment between pressure and velocity modalities. In practice, I implemented it this way: pressure and velocity sampled on a shared clock so fusion is temporally aligned. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"temporal misalignment between pressure and velocity modalities","recall":"Why must heterogeneous sensors share a clock before their measurements are fused?","recall_zh":"为什么异构传感器必须在测量融合之前共享时钟？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Synchronized multi-sensor acquisition (5 pressure + PIV) 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：压力和速度模式之间的时间错位。具体实现上，在共享时钟上采样压力和速度，以便融合在时间上对齐。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"压力和速度模式之间的时间错位"},
  {"id":"flow-fov-to-resolution-mapping-between-cameras","proj":"flow","cat":"hw","term":"FOV-to-resolution mapping between cameras","detail":"In the Flow Sensing reconstruction pipeline, I used FOV-to-resolution mapping between cameras, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — relating the miniature camera patch to the corresponding NOVA R3 vector cells. In practice, I implemented it this way: OV9281's close-working-distance patch maps to ~7×5 vector cells of the NOVA R3 full field. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"relating the miniature camera patch to the corresponding NOVA R3 vector cells","recall":"How would you map a close-up camera's field of view onto a lower-resolution full-field measurement grid?","recall_zh":"如何将特写相机的视场映射到较低分辨率的全视场测量网格上？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 FOV-to-resolution mapping between cameras 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：将微型相机patch与相应的 NOVA R3 向量单元相关联。具体实现上，OV9281 的近距离工作距离patch映射到 NOVA R3 全场的 ~7×5 向量单元。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"将微型相机patch与相应的 NOVA R3 向量单元相关联"},
  {"id":"flow-vorticity-from-finite-difference-curl-v-x-u-y","proj":"flow","cat":"math","term":"Vorticity from finite-difference curl (ω = ∂v/∂x − ∂u/∂y)","detail":"In the Flow Sensing reconstruction pipeline, I used Vorticity from finite-difference curl (ω = ∂v/∂x − ∂u/∂y), a numerical technique for turning system behavior into something measurable. That addressed a specific project need — the target field from raw velocity. In practice, I implemented it this way: derives the target field from raw velocity. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"the target field from raw velocity","recall":"How would you estimate vorticity from a sampled two-dimensional velocity field?","recall_zh":"你如何从采样的二维速度场估计涡度？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Vorticity from finite-difference curl (ω = ∂v/∂x − ∂u/∂y) 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：原始速度的目标场。具体实现上，从原始速度导出目标场。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"原始速度的目标场"},
  {"id":"flow-fourier-positional-encoding-multi-frequency-sin-cos","proj":"flow","cat":"math","term":"Fourier positional encoding (multi-frequency sin/cos)","detail":"In the Flow Sensing reconstruction pipeline, I used Fourier positional encoding (multi-frequency sin/cos), a numerical technique for turning system behavior into something measurable. That addressed a specific project need — MLP/decoder spectral bias so sharp vortex boundaries survive. In practice, I implemented it this way: counters MLP/decoder spectral bias so sharp vortex boundaries survive. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"MLP/decoder spectral bias so sharp vortex boundaries survive","recall":"Why can Fourier positional features help a neural decoder preserve sharp spatial structures?","recall_zh":"为什么傅里叶位置特征可以帮助神经解码器保留清晰的空间结构？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Fourier positional encoding (multi-frequency sin/cos) 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：MLP/解码器光谱偏差如此尖锐的涡旋边界得以幸存。具体实现上，对抗 MLP/decoder 频谱偏差，以便尖锐的涡旋边界得以保留。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"MLP/解码器光谱偏差如此尖锐的涡旋边界得以幸存"},
  {"id":"flow-sobel-gradient-loss","proj":"flow","cat":"math","term":"Sobel-gradient loss","detail":"In the Flow Sensing reconstruction pipeline, I used Sobel-gradient loss, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — blurred vortex edges produced by pixelwise losses alone. In practice, I implemented it this way: penalizes edge mismatch, forcing sharp vortices instead of blurred mean fields. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"blurred vortex edges produced by pixelwise losses alone","recall":"When would you add a gradient-based loss instead of relying only on pixelwise error?","recall_zh":"什么时候会添加基于梯度的损失而不是仅依赖于像素误差？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Sobel-gradient loss 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：仅由像素损失产生的模糊涡旋边缘。具体实现上，惩罚边缘不匹配，强制产生尖锐的涡流而不是模糊的平均场。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"仅由像素损失产生的模糊涡旋边缘"},
  {"id":"flow-vorticity-weighted-mse","proj":"flow","cat":"math","term":"Vorticity-weighted MSE","detail":"In the Flow Sensing reconstruction pipeline, I used Vorticity-weighted MSE, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — loss by |ω| so vortex cores dominate over quiet freestream. In practice, I implemented it this way: reweights loss by |ω| so vortex cores dominate over quiet freestream. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"loss by |ω| so vortex cores dominate over quiet freestream","recall":"How would you stop large quiet regions from dominating a field-reconstruction loss?","recall_zh":"怎样避免大片平静区域主导流场重建的 loss？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Vorticity-weighted MSE 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：按 |ω| 加权，让涡核而不是平静自由来流主导 loss。具体实现上，我按 |ω| 对 loss 重加权，让涡核区域获得比平静自由来流更高的权重。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"按 |ω| 加权，让涡核而不是平静自由来流主导 loss"},
  {"id":"flow-divergence-penalty-u-x-v-y-0","proj":"flow","cat":"math","term":"Divergence penalty (∂u/∂x + ∂v/∂y ≈ 0)","detail":"In the Flow Sensing reconstruction pipeline, I used Divergence penalty (∂u/∂x + ∂v/∂y ≈ 0), a numerical technique for turning system behavior into something measurable. That addressed a specific project need — incompressibility as free physical regularization. In practice, I implemented it this way: enforces incompressibility as free physical regularization. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"incompressibility as free physical regularization","recall":"How can a physical conservation law be added as a regularizer for predicted flow fields?","recall_zh":"如何添加物理守恒定律作为预测流场的正则项？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Divergence penalty (∂u/∂x + ∂v/∂y ≈ 0) 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：把不可压缩约束作为几乎零额外成本的物理正则项。具体实现上，我把不可压缩条件写成 divergence penalty，直接约束 ∂u/∂x + ∂v/∂y 接近 0。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"把不可压缩约束作为几乎零额外成本的物理正则项"},
  {"id":"flow-phase-averaging-over-last-two-cycles","proj":"flow","cat":"math","term":"Phase-averaging over last two cycles","detail":"In the Flow Sensing reconstruction pipeline, I used Phase-averaging over last two cycles, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — turbulent/transient noise to get a clean target. In practice, I implemented it this way: suppresses turbulent/transient noise to get a clean target. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"turbulent/transient noise to get a clean target","recall":"How would you construct a clean periodic target from measurements containing turbulence and startup transients?","recall_zh":"你如何从包含湍流和启动瞬变的测量中构建一个干净的周期性目标？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Phase-averaging over last two cycles 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：湍流/瞬态噪声以获得干净的目标。具体实现上，抑制湍流/瞬态噪声以获得干净的目标。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"湍流/瞬态噪声以获得干净的目标"},
  {"id":"flow-reynolds-decomposition-mean-fluctuation","proj":"flow","cat":"math","term":"Reynolds decomposition (mean + fluctuation)","detail":"In the Flow Sensing reconstruction pipeline, I used Reynolds decomposition (mean + fluctuation), a numerical technique for turning system behavior into something measurable. That addressed a specific project need — spending model capacity on the static mean instead of the dynamic fluctuation field. In practice, I implemented it this way: lets the network focus capacity on the dynamic fluctuation field. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"spending model capacity on the static mean instead of the dynamic fluctuation field","recall":"Why might you train a model on fluctuations around the mean instead of the full flow field?","recall_zh":"为什么要根据均值周围的波动而不是整个流场来训练模型？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Reynolds decomposition (mean + fluctuation) 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：将模型容量花费在静态均值而不是动态波动场上。具体实现上，让网络将容量集中在动态波动场上。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"将模型容量花费在静态均值而不是动态波动场上"},
  {"id":"flow-non-dimensionalization-u-u-cp-x-c","proj":"flow","cat":"math","term":"Non-dimensionalization (u/U, Cp, x/c)","detail":"In the Flow Sensing reconstruction pipeline, I used Non-dimensionalization (u/U, Cp, x/c), a numerical technique for turning system behavior into something measurable. That addressed a specific project need — different-St cases on comparable scales. In practice, I implemented it this way: puts different-St cases on comparable scales. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"different-St cases on comparable scales","recall":"Why is nondimensionalization essential when training across experiments with different operating scales?","recall_zh":"为什么在不同运行尺度的实验中进行训练时，无量纲化至关重要？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 Non-dimensionalization (u/U, Cp, x/c) 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：可比规模上的不同 St 工况。具体实现上，将不同 St 工况放在可比的尺度上。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"可比规模上的不同 St 工况"},
  {"id":"flow-ssim-as-structural-metric-loss","proj":"flow","cat":"math","term":"SSIM as structural metric/loss","detail":"In the Flow Sensing reconstruction pipeline, I used SSIM as structural metric/loss, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — training objective with structural (not just pixelwise) fidelity. In practice, I implemented it this way: aligns training objective with structural (not just pixelwise) fidelity. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"training objective with structural (not just pixelwise) fidelity","recall":"When is a structural image metric more informative than mean squared error for field reconstruction?","recall_zh":"对于场重建，结构图像度量何时比均方误差提供更多信息？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 SSIM as structural metric/loss 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：具有结构（不仅仅是像素）保真度的训练目标。具体实现上，将训练目标与结构（不仅仅是像素）保真度保持一致。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"具有结构（不仅仅是像素）保真度的训练目标"},
  {"id":"flow-pod-retained-as-diagnostic-only","proj":"flow","cat":"math","term":"POD (retained as diagnostic only)","detail":"In the Flow Sensing reconstruction pipeline, I used POD (retained as diagnostic only), a numerical technique for turning system behavior into something measurable. That addressed a specific project need — whether predicted fields have the right modal energy spectrum. In practice, I implemented it this way: checks whether predicted fields have the right modal energy spectrum. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"whether predicted fields have the right modal energy spectrum","recall":"How would you verify that predicted flow fields preserve the correct dominant energy modes?","recall_zh":"你如何验证预测的流场保留了正确的主导能量模式？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我用 POD (retained as diagnostic only) 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：预测场是否具有正确的模态能谱。具体实现上，检查预测场是否具有正确的模态能谱。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"预测场是否具有正确的模态能谱"},
  {"id":"flow-data-leakage-across-two-stages","proj":"flow","cat":"gotcha","term":"Data leakage across two stages","detail":"In the Flow Sensing reconstruction pipeline, I used Data leakage across two stages, a failure mode I had to isolate at a component boundary. That addressed a specific project need — test fields leaking into autoencoder pretraining and turning Stage 2 into table lookup. In practice, I implemented it this way: if Stage 1 autoencoder sees test-set fields, Stage 2 degenerates into table lookup; must enforce one split across both stages. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"test fields leaking into autoencoder pretraining and turning Stage 2 into table lookup","recall":"How can data leakage occur across a multi-stage training pipeline even when the final train-test split looks correct?","recall_zh":"即使最终的训练-测试分割看起来是正确的，data leakage 如何在多阶段训练 pipeline 中发生？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我把 Data leakage across two stages 当作组件边界上的故障模式来排查。它解决的是这个具体问题：测试流场泄漏进 autoencoder 预训练，使 Stage 2 退化成查表。具体实现上，如果 Stage 1 autoencoder 看过测试流场，Stage 2 就会退化成查表；同一份 split 必须贯穿两个训练阶段。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"测试流场泄漏进 autoencoder 预训练，使 Stage 2 退化成查表"},
  {"id":"flow-cross-attention-rank-bottleneck","proj":"flow","cat":"gotcha","term":"Cross-attention rank bottleneck","detail":"In the Flow Sensing reconstruction pipeline, I used Cross-attention rank bottleneck, a failure mode I had to isolate at a component boundary. That addressed a specific project need — a rank-≤5 output bottleneck that capped vorticity SSIM near 0.13. In practice, I implemented it this way: with only 5 K/V tokens, the output feature map has rank ≤5, capping vorticity SSIM ~0.13 no matter the hyperparameters; fix is learnable tokens. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"a rank-≤5 output bottleneck that capped vorticity SSIM near 0.13","recall":"A model's metric plateaus despite extensive tuning. How would you check whether attention rank is the structural bottleneck?","recall_zh":"尽管进行了大量调整，模型仍处于公制稳定状态。你如何检查注意力等级是否是结构性瓶颈？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我把 Cross-attention rank bottleneck 当作组件边界上的故障模式来排查。它解决的是这个具体问题：秩≤5 输出瓶颈，限制 0.13 附近的涡量 SSIM。具体实现上，仅使用 5 K/V 标记，输出特征图的秩 ≤5，无论超参数如何，都会限制涡度 SSIM ~0.13；修复是可学习的token。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"秩≤5 输出瓶颈，限制 0.13 附近的涡量 SSIM"},
  {"id":"flow-encoder-weights-can-t-transfer-between-stages","proj":"flow","cat":"gotcha","term":"Encoder weights can't transfer between stages","detail":"In the Flow Sensing reconstruction pipeline, I used Encoder weights can't transfer between stages, a failure mode I had to isolate at a component boundary. That addressed a specific project need — invalid weight transfer between incompatible full-field and patch-encoder shapes. In practice, I implemented it this way: Stage 1 (full-field CNN) and Stage 2 (patch encoder) have incompatible shapes; only the decoder's conv-refinement tail can inherit weights. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"invalid weight transfer between incompatible full-field and patch-encoder shapes","recall":"When can pretrained weights not transfer between two stages, and how do you identify the compatible submodules?","recall_zh":"预训练权重什么时候不能在两个阶段之间转移？如何识别兼容的子模块？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我把 Encoder weights can't transfer between stages 当作组件边界上的故障模式来排查。它解决的是这个具体问题：不兼容的全场和patch编码器形状之间的权重传递无效。具体实现上，Stage 1（全场CNN）和Stage 2（patch编码器）具有不兼容的形状；只有解码器的卷积优化尾部可以继承权重。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"不兼容的全场和patch编码器形状之间的权重传递无效"},
  {"id":"flow-t-1-silently-became-6-channels-not-3","proj":"flow","cat":"gotcha","term":"T=1 silently became 6 channels not 3","detail":"In the Flow Sensing reconstruction pipeline, I used T=1 silently became 6 channels not 3, a failure mode I had to isolate at a component boundary. That addressed a specific project need — silent data-loader channel doubling that contradicted the experiment configuration. In practice, I implemented it this way: dp/dt or two-frame stacking in the data loader doubled channels; always verify actual tensor shape vs. intended config. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"silent data-loader channel doubling that contradicted the experiment configuration","recall":"A model receives more channels than the configuration implies. How would you trace the mismatch through the data loader?","recall_zh":"模型接收的通道数量多于配置所暗示的数量。你将如何通过数据加载器追踪不匹配情况？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我把 T=1 silently became 6 channels not 3 当作组件边界上的故障模式来排查。它解决的是这个具体问题：与实验配置相矛盾的静默数据加载器通道加倍。具体实现上，数据加载器双通道中的 dp/dt 或两帧堆叠；始终验证实际张量形状与预期配置。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"与实验配置相矛盾的静默数据加载器通道加倍"},
  {"id":"flow-batch-size-32-on-40-phase-averaged-samples","proj":"flow","cat":"gotcha","term":"batch_size=32 on ~40 phase-averaged samples","detail":"In the Flow Sensing reconstruction pipeline, I used batch_size=32 on ~40 phase-averaged samples, a failure mode I had to isolate at a component boundary. That addressed a specific project need — near-full-batch training that removes stochasticity and encourages overfitting. In practice, I implemented it this way: near-full-batch, kills stochasticity/overfits; batch size must track *actual* sample count (fine once ~3000 frames used). I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"near-full-batch training that removes stochasticity and encourages overfitting","recall":"How should batch size change when preprocessing drastically reduces the true number of training samples?","recall_zh":"当预处理大幅减少训练样本的真实数量时，批量大小应该如何变化？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我把 batch_size=32 on ~40 phase-averaged samples 当作组件边界上的故障模式来排查。它解决的是这个具体问题：近乎全批次的训练消除了随机性并鼓励过度拟合。具体实现上，接近满批次，消除随机性/过度拟合；批量大小必须跟踪*实际*样本计数（使用 ~3000 帧后就可以了）。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"近乎全批次的训练消除了随机性并鼓励过度拟合"},
  {"id":"flow-phase-angle-is-oracle-information","proj":"flow","cat":"gotcha","term":"Phase angle is oracle information","detail":"In the Flow Sensing reconstruction pipeline, I used Phase angle is oracle information, a failure mode I had to isolate at a component boundary. That addressed a specific project need — training/inference mismatch from using foil phase an AUV cannot observe. In practice, I implemented it this way: upstream foil phase isn't available to an AUV at inference; had to replace it with a temporal window of onboard sensor history. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"training/inference mismatch from using foil phase an AUV cannot observe","recall":"How do you detect when a model input is available during training but impossible to observe at deployment?","recall_zh":"如何检测模型输入在训练期间可用但在部署时无法观察到的情况？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我把 Phase angle is oracle information 当作组件边界上的故障模式来排查。它解决的是这个具体问题：使用 AUV 无法观察到的箔相导致的训练/推理不匹配。具体实现上，推理时 AUV 无法使用上游箔相位；必须用机载传感器历史记录的时间窗口取代它。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"使用 AUV 无法观察到的箔相导致的训练/推理不匹配"},
  {"id":"flow-first-oscillation-cycle-has-transients","proj":"flow","cat":"gotcha","term":"First oscillation cycle has transients","detail":"In the Flow Sensing reconstruction pipeline, I used First oscillation cycle has transients, a failure mode I had to isolate at a component boundary. That addressed a specific project need — contaminating phase-averaged targets with startup transients. In practice, I implemented it this way: must be discarded; only phase-average the last two cycles. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"contaminating phase-averaged targets with startup transients","recall":"Why should startup cycles often be excluded from phase-averaged periodic data?","recall_zh":"为什么启动周期经常被排除在相位平均周期数据之外？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我把 First oscillation cycle has transients 当作组件边界上的故障模式来排查。它解决的是这个具体问题：启动瞬态污染相位平均目标。具体实现上，必须丢弃；仅对最后两个周期进行相位平均。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"启动瞬态污染相位平均目标"},
  {"id":"flow-constant-st-wakes-are-self-similar","proj":"flow","cat":"gotcha","term":"Constant-St wakes are self-similar","detail":"In the Flow Sensing reconstruction pipeline, I used Constant-St wakes are self-similar, a failure mode I had to isolate at a component boundary. That addressed a specific project need — false generalization confidence from training and testing within one self-similar Strouhal regime. In practice, I implemented it this way: training only within one St gives false confidence; St is the highest-leverage variable for genuine topology diversity. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"false generalization confidence from training and testing within one self-similar Strouhal regime","recall":"Why can training within one operating regime create false confidence about physical generalization?","recall_zh":"为什么只在单一工况下训练，可能让你误以为模型能泛化到不同物体？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我把 Constant-St wakes are self-similar 当作组件边界上的故障模式来排查。它解决的是这个具体问题：在单一自相似 Strouhal 工况内训练和测试造成虚假的泛化信心。具体实现上，只在一个 Strouhal 工况内训练会产生虚假的信心；Strouhal number 才是决定流场拓扑多样性的关键变量。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"在单一自相似 Strouhal 工况内训练和测试造成虚假的泛化信心"},
  {"id":"flow-evaluating-on-freestream-inflates-scores","proj":"flow","cat":"gotcha","term":"Evaluating on freestream inflates scores","detail":"In the Flow Sensing reconstruction pipeline, I used Evaluating on freestream inflates scores, a failure mode I had to isolate at a component boundary. That addressed a specific project need — misleading metrics dominated by easy, quiet freestream pixels. In practice, I implemented it this way: quiet regions dominate uniform metrics; mask to wake region for honest error. I reproduced it at the smallest observable boundary, fixed the underlying assumption, and added a check so the same failure would be obvious next time. Patching the visible symptom would have left the root cause in place and made the failure intermittent.","solved":"misleading metrics dominated by easy, quiet freestream pixels","recall":"How would you prevent easy background regions from inflating a dense prediction metric?","recall_zh":"如何防止简单的背景区域夸大密集的预测指标？","detail_zh":"在 Flow Sensing 流场重建 pipeline 中，我把 Evaluating on freestream inflates scores 当作组件边界上的故障模式来排查。它解决的是这个具体问题：由简单、安静的自由来流像素主导的误导性指标。具体实现上，统一指标会被大面积平静区域主导；我只在尾流区域统计误差，得到更诚实的结果。我先在最小可观察边界复现问题，修正错误假设，再加回归检查防止复发。只修表面症状会保留根因，让故障继续以间歇方式出现。","solved_zh":"由简单、安静的自由来流像素主导的误导性指标"},
  {"id":"coach-contact-sheet-grid-compositing","proj":"coach","cat":"algo","term":"Contact sheet grid compositing","detail":"In the ClearCoach coaching app, I used Contact sheet grid compositing, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — showing an entire motion sequence in one vision-model call instead of sending dozens of images. In practice, I implemented it this way: Batch N video frames into a single labeled grid image (Pillow `Image.new()` + `paste()` + `ImageDraw` text overlay) so one LLM vision API call can see the entire motion sequence instead of sending 60 separate images. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"showing an entire motion sequence in one vision-model call instead of sending dozens of images","recall":"How would you present an entire motion sequence to a vision model without sending every frame as a separate request?","recall_zh":"如何向视觉模型呈现整个运动序列而不将每一帧作为单独的请求发送？","detail_zh":"在 ClearCoach 教练应用中，我采用了 Contact sheet grid compositing，把状态、决策或数据流显式化。它解决的是这个具体问题：在一次视觉模型调用中显示整个运动序列，而不是发送数十张图像。具体实现上，我把 N 个视频帧合成一张带帧号的网格图，用 Pillow 的 `Image.new()`、`paste()` 和 `ImageDraw` 叠加标签。这样一次 LLM 视觉 API 调用就能看到完整动作序列，不必逐帧发送 60 张图片。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"在一次视觉模型调用中显示整个运动序列，而不是发送数十张图像"},
  {"id":"coach-frame-differencing-for-motion-scoring","proj":"coach","cat":"algo","term":"Frame differencing for motion scoring","detail":"In the ClearCoach coaching app, I used Frame differencing for motion scoring, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — locating the hitting zone computationally instead of relying on LLM guessing. In practice, I implemented it this way: Compute absolute pixel difference between consecutive frames → scalar motion score per frame → Gaussian smooth → find peak. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"locating the hitting zone computationally instead of relying on LLM guessing","recall":"How would you locate the most active moment in a video without using pose estimation?","recall_zh":"如果不使用 pose estimation，如何找到视频中最活跃的时刻？","detail_zh":"在 ClearCoach 教练应用中，我采用了 Frame differencing for motion scoring，把状态、决策或数据流显式化。它解决的是这个具体问题：通过计算来定位击球区域，而不是依靠 LLM 猜测。具体实现上，计算连续帧之间的绝对像素差→每帧标量运动得分→高斯平滑→找到峰值。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"通过计算来定位击球区域，而不是依靠 LLM 猜测"},
  {"id":"coach-audio-onset-detection-transient-detection","proj":"coach","cat":"algo","term":"Audio onset detection (transient detection)","detail":"In the ClearCoach coaching app, I used Audio onset detection (transient detection), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — auto-cutting individual shots from 30–90 minute rally footage. In practice, I implemented it this way: `librosa.onset.onset_strength()` + `librosa.onset.onset_detect()` to find sharp \"pops\" (shuttle hitting strings) in audio. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"auto-cutting individual shots from 30–90 minute rally footage","recall":"How would you automatically segment individual impacts from a long recording using its audio track?","recall_zh":"如何利用音轨，从一段很长的回合录像中自动切出每次击球？","detail_zh":"在 ClearCoach 教练应用中，我采用了 Audio onset detection (transient detection)，把状态、决策或数据流显式化。它解决的是这个具体问题：从 30–90 分钟的回合录像中自动切出单次击球片段。具体实现上，`librosa.onset.onset_strength()` + `librosa.onset.onset_detect()` 在音频中找到尖锐的“pops”（羽毛球击球声）。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"从 30–90 分钟的回合录像中自动切出单次击球片段"},
  {"id":"coach-multi-signal-fusion-with-cross-validation","proj":"coach","cat":"algo","term":"Multi-signal fusion with cross-validation","detail":"In the ClearCoach coaching app, I used Multi-signal fusion with cross-validation, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — filtering false positives from commentary, crowd clapping, or adjacent-court noise. In practice, I implemented it this way: Audio peak + motion peak in a ±1s window must co-occur; audio-only peaks without motion are discarded. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"filtering false positives from commentary, crowd clapping, or adjacent-court noise","recall":"How would you combine audio and visual evidence to reject false event detections?","recall_zh":"你如何结合音频和视觉证据来拒绝错误事件检测？","detail_zh":"在 ClearCoach 教练应用中，我采用了 Multi-signal fusion with cross-validation，把状态、决策或数据流显式化。它解决的是这个具体问题：过滤来自评论、人群鼓掌或邻近法庭噪音的误报。具体实现上，±1s窗口中的音频峰值+运动峰值必须同时出现；没有运动的纯音频峰值将被丢弃。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"过滤来自评论、人群鼓掌或邻近法庭噪音的误报"},
  {"id":"coach-coarse-to-fine-search-computational-llm","proj":"coach","cat":"algo","term":"Coarse-to-fine search (computational → LLM)","detail":"In the ClearCoach coaching app, I used Coarse-to-fine search (computational → LLM), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — LLM can't reliably search a 120-frame clip, but does well in a 30-frame window. In practice, I implemented it this way: Motion peak gives ±5-frame coarse location → send only a dense 20–30 frame window to LLM for precise approach/contact/departure selection. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"LLM can't reliably search a 120-frame clip, but does well in a 30-frame window","recall":"When should deterministic signal processing narrow a search before asking a vision model for fine-grained judgment?","recall_zh":"在要求视觉模型进行细粒度判断之前，确定性信号处理何时应该缩小搜索范围？","detail_zh":"在 ClearCoach 教练应用中，我采用了 Coarse-to-fine search (computational → LLM)，把状态、决策或数据流显式化。它解决的是这个具体问题：LLM 无法可靠地搜索 120-frame 剪辑，但在 30-frame 窗口中表现良好。具体实现上，运动峰值给出±5-frame粗略位置→仅发送密集的20–30帧窗口到LLM以进行精确的接近/接触/离开选择。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"LLM 无法可靠地搜索 120-frame 剪辑，但在 30-frame 窗口中表现良好"},
  {"id":"coach-two-step-llm-pipeline-model-tiering","proj":"coach","cat":"algo","term":"Two-step LLM pipeline (model tiering)","detail":"In the ClearCoach coaching app, I used Two-step LLM pipeline (model tiering), an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — cost control — Flash is ~10× cheaper than Pro. In practice, I implemented it this way: Gemini Flash for visual observation (cheap, fast), Gemini Pro for comparative reasoning (expensive, smart). Two independent Flash calls for each player → one Pro call for cross-player comparison. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"cost control — Flash is ~10× cheaper than Pro","recall":"How would you divide perception and reasoning across cheaper and more capable models to control inference cost?","recall_zh":"你如何将感知和推理划分为更便宜、更强大的模型以控制推理成本？","detail_zh":"在 ClearCoach 教练应用中，我采用了 Two-step LLM pipeline (model tiering)，把状态、决策或数据流显式化。它解决的是这个具体问题：成本控制 — Flash 比 Pro 便宜 ~10×。具体实现上，Gemini Flash用于视觉观察（便宜，快速），Gemini Pro用于比较推理（昂贵，聪明）。每个玩家有两个独立的 Flash 调用 → 一个 Pro 调用用于跨玩家比较。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"成本控制 — Flash 比 Pro 便宜 ~10×"},
  {"id":"coach-fixed-phase-state-machine-with-strict-ordering","proj":"coach","cat":"algo","term":"Fixed-phase state machine with strict ordering","detail":"In the ClearCoach coaching app, I used Fixed-phase state machine with strict ordering, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — LLM sometimes returns non-monotonic frame numbers. In practice, I implemented it this way: 8 keyframes must satisfy `preparation < windup_1 < windup_2 < windup_3 < hitting_1 < hitting_2 < hitting_3 < follow_through` with minimum 2-frame gaps between adjacent phases. Post-processing validates this constraint. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"LLM sometimes returns non-monotonic frame numbers","recall":"How would you enforce temporal ordering when a model returns structured phases with inconsistent frame indices?","recall_zh":"当模型返回帧索引不一致的结构化阶段时，如何强制执行时间排序？","detail_zh":"在 ClearCoach 教练应用中，我采用了 Fixed-phase state machine with strict ordering，把状态、决策或数据流显式化。它解决的是这个具体问题：LLM 有时返回非单调帧数。具体实现上，8关键帧必须满足`preparation < windup_1 < windup_2 < windup_3 < hitting_1 < hitting_2 < hitting_3 < follow_through`，相邻阶段之间的间隙最小为2-frame。后处理验证了这个约束。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"LLM 有时返回非单调帧数"},
  {"id":"coach-weighted-frame-sampling-for-contact-sheets","proj":"coach","cat":"algo","term":"Weighted frame sampling for contact sheets","detail":"In the ClearCoach coaching app, I used Weighted frame sampling for contact sheets, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — uniform sampling wastes budget on irrelevant frames. In practice, I implemented it this way: 60% of frames around hitting zone, 25% before (preparation/windup), 15% after (follow-through). Hitting zone frames kept contiguous (no skipping). I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"uniform sampling wastes budget on irrelevant frames","recall":"How would you allocate a limited frame budget around the most informative portion of an action?","recall_zh":"你会怎样把有限的帧预算集中到动作中信息量最高的阶段？","detail_zh":"在 ClearCoach 教练应用中，我采用了 Weighted frame sampling for contact sheets，把状态、决策或数据流显式化。它解决的是这个具体问题：避免均匀采样把有限的帧预算浪费在无关帧上。具体实现上，击球区周围帧的 60%、之前的 25%（准备/引拍）、之后的 15%（后续）。击球区域帧保持连续（无跳跃）。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"避免均匀采样把有限的帧预算浪费在无关帧上"},
  {"id":"coach-rag-style-knowledge-injection","proj":"coach","cat":"algo","term":"RAG-style knowledge injection","detail":"In the ClearCoach coaching app, I used RAG-style knowledge injection, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — updating frequently changing stroke knowledge without a fine-tuning run. In practice, I implemented it this way: Structured markdown files (`knowledge/clear_stroke.md`) injected into LLM prompts at runtime. Chosen over fine-tuning because domain knowledge changes frequently and doesn't warrant a training run. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"updating frequently changing stroke knowledge without a fine-tuning run","recall":"When would runtime knowledge retrieval be preferable to fine-tuning a model?","recall_zh":"什么时候运行时知识检索比微调模型更可取？","detail_zh":"在 ClearCoach 教练应用中，我采用了 RAG-style knowledge injection，把状态、决策或数据流显式化。它解决的是这个具体问题：更新经常变化的击球动作知识，无需微调运行。具体实现上，在运行时将结构化 Markdown 文件（`knowledge/clear_stroke.md`）注入到 LLM 提示中。选择而不是微调，因为领域知识经常变化并且不保证进行培训。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"更新经常变化的击球动作知识，无需微调运行"},
  {"id":"coach-three-stage-knowledge-extraction-pipeline","proj":"coach","cat":"algo","term":"Three-stage knowledge extraction pipeline","detail":"In the ClearCoach coaching app, I used Three-stage knowledge extraction pipeline, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — converting hours of Chinese coaching video into structured, reusable domain knowledge. In practice, I implemented it this way: Whisper transcription → Gemini Pro structuring (JSON with phase tags, cause-effect, coaching quotes) → Gemini Pro consolidation (merge N videos, de-duplicate, resolve contradictions, output final markdown). I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"converting hours of Chinese coaching video into structured, reusable domain knowledge","recall":"How would you turn many hours of unstructured instructional video into a deduplicated, reusable knowledge base?","recall_zh":"如何将数小时的非结构化教学视频转变为去重、可重用的知识库？","detail_zh":"在 ClearCoach 教练应用中，我采用了 Three-stage knowledge extraction pipeline，把状态、决策或数据流显式化。它解决的是这个具体问题：将数小时的中文辅导视频转化为结构化、可重用的领域知识。具体实现上，Whisper转录→Gemini Pro结构化（JSON带有阶段标签，因果关系，指导语录）→Gemini Pro合并（合并N个视频，去重复，解决矛盾，输出最终markdown）。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"将数小时的中文辅导视频转化为结构化、可重用的领域知识"},
  {"id":"coach-classification-hierarchy","proj":"coach","cat":"algo","term":"Classification hierarchy","detail":"In the ClearCoach coaching app, I used Classification hierarchy, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — consistent stroke labeling plus future left/right mirror comparison. In practice, I implemented it this way: Forehand/backhand as top-level, then shot type (clear/smash/drop/net) as second level. Dominant hand captured as video-level metadata to support future mirror-flip for left-vs-right comparison. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"consistent stroke labeling plus future left/right mirror comparison","recall":"How would you design a classification hierarchy and metadata scheme that supports future left-right motion comparisons?","recall_zh":"你会怎样设计分类层级和 metadata schema，为以后比较左右手动作留出扩展空间？","detail_zh":"在 ClearCoach 教练应用中，我采用了 Classification hierarchy，把状态、决策或数据流显式化。它解决的是这个具体问题：建立一致的击球动作标签，并支持未来的左右手镜像对比。具体实现上，我先按正手/反手分顶层，再按高远球、杀球、吊球、网前球细分。惯用手作为视频级 metadata 保存，后续可通过镜像翻转做左右手动作对比。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"建立一致的击球动作标签，并支持未来的左右手镜像对比"},
  {"id":"coach-post-processing-sanity-check","proj":"coach","cat":"algo","term":"Post-processing sanity check","detail":"In the ClearCoach coaching app, I used Post-processing sanity check, an algorithmic pattern for making state, decisions, or data flow explicit. That addressed a specific project need — catching confidently wrong LLM outputs before they reach the user. In practice, I implemented it this way: After LLM returns keyframes: (1) verify frame numbers strictly increasing, (2) verify motion score at `hitting_2` is near global max. If check fails, auto-retry with a hint. I made the rule and ownership explicit, then exercised normal, boundary, and transition cases. That was easier to reason about than an ad hoc implementation, especially when inputs or operating conditions changed together.","solved":"catching confidently wrong LLM outputs before they reach the user","recall":"What deterministic checks would you apply before trusting model-generated keyframe annotations?","recall_zh":"在信任模型生成的关键帧注释之前，你将应用哪些确定性检查？","detail_zh":"在 ClearCoach 教练应用中，我采用了 Post-processing sanity check，把状态、决策或数据流显式化。它解决的是这个具体问题：在错误的 LLM 输出到达用户之前自信地捕获它们。具体实现上，在 LLM 返回关键帧后：（1）验证帧数严格增加，（2）验证 `hitting_2` 处的运动分数接近全局最大值。如果检查失败，则自动重试并提示。我把规则、状态和控制权写清楚，再覆盖正常路径、边界条件和状态切换做测试。这比零散的条件分支更容易推理，尤其适合多个输入或工况同时变化的场景。","solved_zh":"在错误的 LLM 输出到达用户之前自信地捕获它们"},
  {"id":"coach-modular-flask-backend","proj":"coach","cat":"pylang","term":"Modular Flask backend","detail":"In the ClearCoach coaching app, I used Modular Flask backend, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — keeping route logic separated from auth logic and app initialization. In practice, I implemented it this way: `app.py` (entry + config), `api.py` (REST routes), `auth.py` (login/session) as separate modules. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"keeping route logic separated from auth logic and app initialization","recall":"How would you structure a Flask application so initialization, authentication, and API routes remain independently maintainable?","recall_zh":"你将如何构建 Flask 应用程序，以便初始化、身份验证和 API 路由保持独立可维护？","detail_zh":"在 ClearCoach 教练应用中，我用 Modular Flask backend 来划分软件职责和接口边界。它解决的是这个具体问题：将路由逻辑与身份验证逻辑和应用程序初始化分开。具体实现上，`app.py`（条目+配置），`api.py`（REST路由），`auth.py`（登录/会话）作为单独的模块。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"将路由逻辑与身份验证逻辑和应用程序初始化分开"},
  {"id":"coach-centralized-api-client-singleton","proj":"coach","cat":"pylang","term":"Centralized API client singleton","detail":"In the ClearCoach coaching app, I used Centralized API client singleton, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — one place to change when switching API backends or updating auth. In practice, I implemented it this way: `core/gemini_client.py` is the ONLY file that creates a `genai.Client()`. All other modules import `get_client()`. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"one place to change when switching API backends or updating auth","recall":"Why should external API client creation be centralized instead of scattered across application modules?","recall_zh":"为什么外部 API 客户端创建应该集中而不是分散在应用程序模块中？","detail_zh":"在 ClearCoach 教练应用中，我用 Centralized API client singleton 来划分软件职责和接口边界。它解决的是这个具体问题：切换 API 后端或更新身份验证时需要更改的地方。具体实现上，`core/gemini_client.py`是创建`genai.Client()`的ONLY文件。所有其他模块均导入 `get_client()`。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"切换 API 后端或更新身份验证时需要更改的地方"},
  {"id":"coach-environment-variable-backend-switching","proj":"coach","cat":"pylang","term":"Environment-variable backend switching","detail":"In the ClearCoach coaching app, I used Environment-variable backend switching, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — same codebase for local dev and production. In practice, I implemented it this way: `GEMINI_BACKEND=vertex|aistudio` toggles between Vertex AI (GCP project auth, ADC) and AI Studio (API key auth) with zero code changes. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"same codebase for local dev and production","recall":"How would you switch between local and cloud API backends without changing application code?","recall_zh":"如何在不更改应用程序代码的情况下在本地和云 API 后端之间切换？","detail_zh":"在 ClearCoach 教练应用中，我用 Environment-variable backend switching 来划分软件职责和接口边界。它解决的是这个具体问题：本地开发和生产使用相同的代码库。具体实现上，`GEMINI_BACKEND=vertex|aistudio` 在 Vertex AI（GCP 项目身份验证、ADC）和 AI Studio（API 密钥身份验证）之间切换，代码更改为零。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"本地开发和生产使用相同的代码库"},
  {"id":"coach-sdk-migration-pattern","proj":"coach","cat":"pylang","term":"SDK migration pattern","detail":"In the ClearCoach coaching app, I used SDK migration pattern, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — moving off a deprecated SDK while preserving all prompt logic. In practice, I implemented it this way: `google-generativeai` (EOL Aug 2025) → `google-genai`. Key changes: `genai.configure(api_key=...)` eliminated; `GenerativeModel(\"model\")` → `client.models.generate_content(model=..., contents=..., config=GenerateContentConfig(...))`. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"moving off a deprecated SDK while preserving all prompt logic","recall":"How would you migrate a deprecated SDK while preserving existing prompts and downstream behavior?","recall_zh":"你将如何迁移已弃用的 SDK，同时保留现有提示和下游行为？","detail_zh":"在 ClearCoach 教练应用中，我用 SDK migration pattern 来划分软件职责和接口边界。它解决的是这个具体问题：删除已弃用的 SDK，同时保留所有提示逻辑。具体实现上，`google-generativeai` (EOL Aug 2025) → `google-genai`。主要变化：取消了`genai.configure(api_key=...)`； `GenerativeModel(\"model\")` → `client.models.generate_content(model=..., contents=..., config=GenerateContentConfig(...))`。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"删除已弃用的 SDK，同时保留所有提示逻辑"},
  {"id":"coach-pydantic-response-migration","proj":"coach","cat":"pylang","term":"Pydantic response migration","detail":"In the ClearCoach coaching app, I used Pydantic response migration, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — downstream code expecting dicts from API responses. In practice, I implemented it this way: New SDK returns Pydantic objects: `response.to_dict()` → `response.model_dump(mode='json')`. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"downstream code expecting dicts from API responses","recall":"How do you adapt downstream code when a new SDK returns typed response objects instead of dictionaries?","recall_zh":"当新的 SDK 返回类型化响应对象而不是字典时，如何调整下游代码？","detail_zh":"在 ClearCoach 教练应用中，我用 Pydantic response migration 来划分软件职责和接口边界。它解决的是这个具体问题：下游代码期望来自 API 响应的字典。具体实现上，New SDK 返回 Pydantic 对象：`response.to_dict()` → `response.model_dump(mode='json')`。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"下游代码期望来自 API 响应的字典"},
  {"id":"coach-markdown-fence-stripping-on-llm-json-output","proj":"coach","cat":"pylang","term":"Markdown fence stripping on LLM JSON output","detail":"In the ClearCoach coaching app, I used Markdown fence stripping on LLM JSON output, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — `json.loads()` crashing on valid JSON that happens to be fenced. In practice, I implemented it this way: Regex strip ` ```json ... ``` ` wrappers before `json.loads()` because LLMs inconsistently wrap structured output in code fences. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"`json.loads()` crashing on valid JSON that happens to be fenced","recall":"A model inconsistently wraps valid JSON in markdown. How would you make parsing robust?","recall_zh":"模型不一致地将有效的 JSON 包装在 markdown 中。如何使解析变得稳健？","detail_zh":"在 ClearCoach 教练应用中，我用 Markdown fence stripping on LLM JSON output 来划分软件职责和接口边界。它解决的是这个具体问题：`json.loads()` 在恰好被隔离的有效 JSON 上崩溃。具体实现上，正则表达式在 `json.loads()` 之前剥离 ` ```json ... ``` ` 包装器，因为 LLM 不一致地将结构化输出包装在代码围栏中。我保持所有权和接口的狭窄，以便数据遵循一个定义的路径，并且每个组件仍然可以独立测试。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"`json.loads()` 在恰好被隔离的有效 JSON 上崩溃"},
  {"id":"coach-opencv-videocapture-frame-exact-extraction","proj":"coach","cat":"pylang","term":"OpenCV `VideoCapture` frame-exact extraction","detail":"In the ClearCoach coaching app, I used OpenCV `VideoCapture` frame-exact extraction, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — frame numbers matching what the user sees scrubbing in their video player. In practice, I implemented it this way: Read at native fps, frame numbering starts at 1, no resampling. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"frame numbers matching what the user sees scrubbing in their video player","recall":"How would you extract frames so their indices match what users see in a native-rate video player?","recall_zh":"你将如何提取帧，使其索引与用户在原始帧率视频播放器中看到的内容相匹配？","detail_zh":"在 ClearCoach 教练应用中，我用 OpenCV `VideoCapture` frame-exact extraction 来划分软件职责和接口边界。它解决的是这个具体问题：帧编号与用户在视频播放器中看到的内容相匹配。具体实现上，以本机 fps 读取，帧编号从 1 开始，不重新采样。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"帧编号与用户在视频播放器中看到的内容相匹配"},
  {"id":"coach-subprocess-run-for-ffmpeg","proj":"coach","cat":"pylang","term":"`subprocess.run()` for ffmpeg","detail":"In the ClearCoach coaching app, I used `subprocess.run()` for ffmpeg, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — getting mono 16kHz WAV for Whisper without Python audio libraries. In practice, I implemented it this way: Extract audio: `ffmpeg -i video.mp4 -vn -acodec pcm_s16le -ar 16000 -ac 1 -y audio.wav`. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"getting mono 16kHz WAV for Whisper without Python audio libraries","recall":"When would you call a command-line media tool from Python instead of adding another processing library?","recall_zh":"你什么时候会从 Python 调用命令行媒体工具而不是添加另一个处理库？","detail_zh":"在 ClearCoach 教练应用中，我用 `subprocess.run()` for ffmpeg 来划分软件职责和接口边界。它解决的是这个具体问题：在没有 Python 音频库的情况下为 Whisper 获取单声道 16kHz WAV。具体实现上，提取音频：`ffmpeg -i video.mp4 -vn -acodec pcm_s16le -ar 16000 -ac 1 -y audio.wav`。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"在没有 Python 音频库的情况下为 Whisper 获取单声道 16kHz WAV"},
  {"id":"coach-whisper-local-inference","proj":"coach","cat":"pylang","term":"Whisper local inference","detail":"In the ClearCoach coaching app, I used Whisper local inference, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — transcribing coaching videos without sending data to external APIs. In practice, I implemented it this way: `whisper.load_model(\"large-v3\")` + `model.transcribe(audio, language=None)` for auto-detecting Chinese/English mixed content. GPU-accelerated on RTX 5090, ~10–20× real-time. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"transcribing coaching videos without sending data to external APIs","recall":"When is local speech recognition preferable to a hosted API for multilingual video?","recall_zh":"对于多语言视频，本地语音识别何时优于托管 API？","detail_zh":"在 ClearCoach 教练应用中，我用 Whisper local inference 来划分软件职责和接口边界。它解决的是这个具体问题：转录辅导视频而不将数据发送到外部 API。具体实现上，`whisper.load_model(\"large-v3\")` + `model.transcribe(audio, language=None)`，用于自动检测中英文混合内容。 GPU- 在 RTX 5090、~10–20× 上实时加速。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"转录辅导视频而不将数据发送到外部 API"},
  {"id":"coach-uuid-session-management","proj":"coach","cat":"pylang","term":"UUID session management","detail":"In the ClearCoach coaching app, I used UUID session management, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — concurrent users without file collisions. In practice, I implemented it this way: Each upload creates `uploads/{uuid}/` with `original.mp4`, `session.json`, `frames_cache/`. Auto-cleaned after 24h. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"concurrent users without file collisions","recall":"How would you isolate concurrent user uploads and clean temporary media safely?","recall_zh":"如何安全地隔离并发用户上传并清理临时媒体？","detail_zh":"在 ClearCoach 教练应用中，我用 UUID session management 来划分软件职责和接口边界。它解决的是这个具体问题：并发用户无文件冲突。具体实现上，每次上传都会创建 `uploads/{uuid}/` 和 `original.mp4`、`session.json`、`frames_cache/`。 24h 之后自动清理。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"并发用户无文件冲突"},
  {"id":"coach-python-dotenv-with-relative-path","proj":"coach","cat":"pylang","term":"`python-dotenv` with relative path","detail":"In the ClearCoach coaching app, I used `python-dotenv` with relative path, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — keeping API keys in one place across multiple tools. In practice, I implemented it this way: Shot segmenter at `tools/shot_segmenter/` loads `.env` from `../../.env` (project root). I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"keeping API keys in one place across multiple tools","recall":"How should tools in different subdirectories share one environment configuration without duplicating secrets?","recall_zh":"不同子目录里的工具，怎样共享同一份环境配置而不重复保存密钥？","detail_zh":"在 ClearCoach 教练应用中，我用 `python-dotenv` with relative path 来划分软件职责和接口边界。它解决的是这个具体问题：在多个工具中将 API 密钥保存在一个位置。具体实现上，`tools/shot_segmenter/` 的击球分段器从 `../../.env`（项目根）加载 `.env`。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"在多个工具中将 API 密钥保存在一个位置"},
  {"id":"coach-pyqt6-wizard-style-ui","proj":"coach","cat":"pylang","term":"PyQt6 wizard-style UI","detail":"In the ClearCoach coaching app, I used PyQt6 wizard-style UI, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — guided workflow for a multi-stage desktop tool. In practice, I implemented it this way: `QStackedWidget` with 5 steps (select → extract → label → review → export), step indicator at top, \"Next/Back\" navigation. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"guided workflow for a multi-stage desktop tool","recall":"How would you guide users through a multi-stage desktop workflow while keeping navigation and state understandable?","recall_zh":"你将如何引导用户完成多阶段桌面工作流程，同时保持导航和状态易于理解？","detail_zh":"在 ClearCoach 教练应用中，我用 PyQt6 wizard-style UI 来划分软件职责和接口边界。它解决的是这个具体问题：多阶段桌面工具的引导工作流程。具体实现上，`QStackedWidget`和5步骤（选择→提取→标签→审查→导出），顶部的步骤指示器，“下一步/返回”导航。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"多阶段桌面工具的引导工作流程"},
  {"id":"coach-opencv-python-headless-on-servers","proj":"coach","cat":"pylang","term":"`opencv-python-headless` on servers","detail":"In the ClearCoach coaching app, I used `opencv-python-headless` on servers, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — `ImportError` from `cv2` trying to link X11/Qt on headless servers. In practice, I implemented it this way: Swap `opencv-python` → `opencv-python-headless` for deployments without a display. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"`ImportError` from `cv2` trying to link X11/Qt on headless servers","recall":"Why can a computer-vision package work locally but fail on a displayless server, and how would you fix it?","recall_zh":"为什么计算机视觉包可以在本地工作但在无显示服务器上失败，你将如何修复它？","detail_zh":"在 ClearCoach 教练应用中，我用 `opencv-python-headless` on servers 来划分软件职责和接口边界。它解决的是这个具体问题：来自 `cv2` 的 `ImportError` 尝试在无头服务器上链接 X11/Qt。具体实现上，将 `opencv-python` → `opencv-python-headless` 替换为不带显示的部署。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"来自 `cv2` 的 `ImportError` 尝试在无头服务器上链接 X11/Qt"},
  {"id":"coach-gunicorn-multiple-workers","proj":"coach","cat":"pylang","term":"Gunicorn + multiple workers","detail":"In the ClearCoach coaching app, I used Gunicorn + multiple workers, a software-structure technique for separating responsibilities and interfaces. That addressed a specific project need — handling concurrent requests on a production Flask deployment (dev server is single-threaded). In practice, I implemented it this way: `gunicorn -w 2 -b 0.0.0.0:8000 app:app`. I kept ownership and interfaces narrow so data followed one defined path and each component remained independently testable. The simpler approach coupled responsibilities and made timing or integration bugs difficult to localize.","solved":"handling concurrent requests on a production Flask deployment (dev server is single-threaded)","recall":"Why shouldn't a Flask development server handle production traffic, and what deployment model would you use instead?","recall_zh":"为什么 Flask 开发服务器不应该处理生产流量？你会使用什么部署模型？","detail_zh":"在 ClearCoach 教练应用中，我用 Gunicorn + multiple workers 来划分软件职责和接口边界。它解决的是这个具体问题：处理生产 Flask 部署上的并发请求（开发服务器是单线程的）。具体实现上，`gunicorn -w 2 -b 0.0.0.0:8000 app:app`。我把数据归属和接口收窄，让信息只沿一条明确路径流动，每个组件都能独立测试。更简单的写法会把职责耦合在一起，让时序和集成问题更难定位。","solved_zh":"处理生产 Flask 部署上的并发请求（开发服务器是单线程的）"},
  {"id":"coach-nginx-reverse-proxy-for-flask","proj":"coach","cat":"hw","term":"Nginx reverse proxy for Flask","detail":"In the ClearCoach coaching app, I used Nginx reverse proxy for Flask, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — production-grade request routing, large upload support, and SSL termination. In practice, I implemented it this way: `proxy_pass http://127.0.0.1:8000`, `proxy_read_timeout 300s` (LLM calls take 2–5 min), `client_max_body_size 500M` (video uploads). Static files served directly via `location /static/` with 7-day cache. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"production-grade request routing, large upload support, and SSL termination","recall":"How would you configure a reverse proxy for long-running API calls, large uploads, static assets, and TLS termination?","recall_zh":"如何为长时间运行的 API 调用、大量上传、静态资产和 TLS 终止配置反向代理？","detail_zh":"在 ClearCoach 教练应用中，我用 Nginx reverse proxy for Flask 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：生产级请求路由、大上传支持和 SSL 终止。具体实现上，`proxy_pass http://127.0.0.1:8000`、`proxy_read_timeout 300s`（LLM 调用需要 2–5 分钟）、`client_max_body_size 500M`（视频上传）。静态文件直接通过 `location /static/` 和 7-day 缓存提供。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"生产级请求路由、大上传支持和 SSL 终止"},
  {"id":"coach-pwa-manifest-service-worker","proj":"coach","cat":"hw","term":"PWA manifest + service worker","detail":"In the ClearCoach coaching app, I used PWA manifest + service worker, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — installable mobile experience without a native app. In practice, I implemented it this way: `manifest.json` (name, icons, `display: standalone`), service worker with network-first strategy for pages, cache-first for static assets, skip caching for `/api/` routes. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"installable mobile experience without a native app","recall":"How would you make a web application installable while caching static assets without caching dynamic API responses?","recall_zh":"如何使 Web 应用程序可安装，同时缓存静态资源而不缓存动态 API 响应？","detail_zh":"在 ClearCoach 教练应用中，我用 PWA manifest + service worker 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：无需原生应用程序即可安装的移动体验。具体实现上，`manifest.json`（名称，图标，`display: standalone`），页面网络优先策略的服务工作者，静态资源缓存优先，跳过`/api/`路由的缓存。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"无需原生应用程序即可安装的移动体验"},
  {"id":"coach-postgresql-schema-design","proj":"coach","cat":"hw","term":"PostgreSQL schema design","detail":"In the ClearCoach coaching app, I used PostgreSQL schema design, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — persistent multi-user data with referential integrity. In practice, I implemented it this way: `users → players → sessions` with `ON DELETE CASCADE`. Sessions store video metadata (fps, resolution, trim points), analysis JSON paths, and comparison results. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"persistent multi-user data with referential integrity","recall":"How would you model users, subjects, and analysis sessions while preserving referential integrity during deletion?","recall_zh":"你如何对用户、主题和分析会话进行建模，同时在删除期间保持引用完整性？","detail_zh":"在 ClearCoach 教练应用中，我用 PostgreSQL schema design 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：具有引用完整性的持久多用户数据。具体实现上，`users → players → sessions` 和 `ON DELETE CASCADE`。会话存储视频元数据（fps、分辨率、修剪点）、分析 JSON 路径和比较结果。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"具有引用完整性的持久多用户数据"},
  {"id":"coach-ffmpeg-cli-for-clip-cutting","proj":"coach","cat":"hw","term":"ffmpeg CLI for clip cutting","detail":"In the ClearCoach coaching app, I used ffmpeg CLI for clip cutting, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — extracting clean 2.5s clips centered around each detected hit. In practice, I implemented it this way: `t_hit - 1.5s` to `t_hit + 1.0s` asymmetric window (preparation is longer than follow-through). I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"extracting clean 2.5s clips centered around each detected hit","recall":"How would you choose clip boundaries around a detected event when preparation lasts longer than recovery?","recall_zh":"当准备持续时间比恢复时间长时，你将如何选择检测到的事件周围的剪辑边界？","detail_zh":"在 ClearCoach 教练应用中，我用 ffmpeg CLI for clip cutting 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：提取以每个检测到的击球为中心的干净的 2.5s 剪辑。具体实现上，`t_hit - 1.5s`到`t_hit + 1.0s`非对称窗口（准备时间比后续时间长）。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"提取以每个检测到的击球为中心的干净的 2.5s 剪辑"},
  {"id":"coach-srt-subtitle-generation","proj":"coach","cat":"hw","term":"SRT subtitle generation","detail":"In the ClearCoach coaching app, I used SRT subtitle generation, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — reviewing coaching video transcripts on Apple TV without re-encoding. In practice, I implemented it this way: Convert Whisper transcript JSON (start/end timestamps + text) → `.srt` format, placed alongside `.mp4` with matching filename for auto-loading in Infuse/media players. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"reviewing coaching video transcripts on Apple TV without re-encoding","recall":"How would you turn timestamped transcripts into subtitles that media players can load without re-encoding video?","recall_zh":"如何将带时间戳的文字记录转换为媒体播放器可以加载而无需重新编码视频的字幕？","detail_zh":"在 ClearCoach 教练应用中，我用 SRT subtitle generation 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：在 Apple TV 上查看教练视频转录文本，无需重新编码。具体实现上，转换 Whisper 转录 JSON（开始/结束时间戳 + 文本）→ `.srt` 格式，与 `.mp4` 一起放置，并具有匹配的文件名，以便在 Infuse/媒体播放器中自动加载。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"在 Apple TV 上查看教练视频转录文本，无需重新编码"},
  {"id":"coach-git-deploy-workflow","proj":"coach","cat":"hw","term":"Git deploy workflow","detail":"In the ClearCoach coaching app, I used Git deploy workflow, a hardware or protocol technique for making the physical interface predictable. That addressed a specific project need — straightforward deployment without CI/CD overhead for a solo project. In practice, I implemented it this way: Develop locally → push to private GitHub repo → SSH into server → `git pull` → restart gunicorn. I checked the signal or packet at the lowest observable layer first, then exposed only verified behavior to the rest of the system. Relying on nominal specifications alone would have hidden the real electrical or timing behavior.","solved":"straightforward deployment without CI/CD overhead for a solo project","recall":"What simple deployment workflow would you choose for a solo project that doesn't yet justify continuous delivery?","recall_zh":"对于尚未证明持续交付合理性的单独项目，你会选择哪种简单的部署工作流程？","detail_zh":"在 ClearCoach 教练应用中，我用 Git deploy workflow 让硬件或协议边界的行为更可预测。它解决的是这个具体问题：简单的部署，无需 CI/CD 单独项目的开销。具体实现上，本地开发 → 推送到私有 GitHub 仓库 → SSH 进入服务器 → `git pull` → 重启 gunicorn。我先在最低层验证信号或数据包，再把确认过的行为暴露给上层控制逻辑。如果只相信标称规格，很容易漏掉真实的电气、协议或时序行为。","solved_zh":"简单的部署，无需 CI/CD 单独项目的开销"},
  {"id":"coach-inter-frame-absolute-difference","proj":"coach","cat":"math","term":"Inter-frame absolute difference","detail":"In the ClearCoach coaching app, I used Inter-frame absolute difference, a numerical technique for turning system behavior into something measurable. That addressed a specific project need — quantifying \"how much movement happened\" between two frames without pose estimation. In practice, I implemented it this way: `cv2.absdiff(frame_n, frame_n+1)` → `np.mean()` to get a scalar motion score per frame pair. I kept units, signs, and coordinate conventions explicit, and checked the result against a simple limiting case before trusting it. A heuristic could look right on one example while failing silently when scale or geometry changed.","solved":"quantifying \"how much movement happened\" between two frames without pose estimation","recall":"How can consecutive video frames be reduced to a simple scalar motion score?","recall_zh":"如何将连续的视频帧简化为简单的标量运动分数？","detail_zh":"在 ClearCoach 教练应用中，我用 Inter-frame absolute difference 把系统行为转化成可量化的数值问题。它解决的是这个具体问题：在没有 pose estimation 的情况下量化两帧之间“发生了多少运动”。具体实现上，`cv2.absdiff(frame_n, frame_n+1)` → `np.mean()` 以获得每帧对的标量运动分数。我明确记录单位、符号和坐标约定，并用简单的极限情况做 sanity check。未经验证的经验规则可能只在一个样例上看起来正确，换尺度或几何条件就会失效。","solved_zh":"在没有 pose estimation 的情况下量化两帧之间“发生了多少运动”"},
