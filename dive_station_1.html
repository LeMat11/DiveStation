<header>
  <button id="menuBtn">&#9776;</button>

<script>
/* ============ Field Manual: Python Handbook ============ */
const MANUAL = [
{id:"py-flow",grp:"py",t:"Control flow & loop skeletons",body:`
<p>The skeletons you should be able to write with your eyes closed. Interview bugs cluster in loop bounds, not algorithms.</p>
<pre><code># branching
if x > 0:
    ...
elif x == 0:
    ...
else:
    ...

# counted loops
for i in range(n):            # 0 .. n-1
for i in range(1, n):         # 1 .. n-1
for i in range(n-1, -1, -1):  # n-1 .. 0  (reverse)

# over items / with index
for x in nums:
for i, x in enumerate(nums):

# condition loop
while lo <= hi:
    ...

# early exits
break      # leave the loop
continue   # skip to next iteration
return     # leave the function entirely</code></pre>
<p>Habit: before writing a loop body, whisper the <em>first and last</em> value the index will take. <code>range</code> excludes its end; reverse ranges need that <code>-1, -1</code> pair.</p>`},

{id:"py-list",grp:"py",t:"Lists",body:`
<pre><code>a = [0] * n                    # fixed-size init
g = [[0] * cols for _ in range(rows)]  # 2D grid -- NEVER [[0]*cols]*rows
a.append(x);  a.pop()          # stack push / pop, O(1)
a.pop(0)                       # O(n)! use deque for queues
a[-1]                          # last element
a[i:j]                         # slice COPY, j excluded
a[::-1]                        # reversed copy
a.reverse()                    # in place, returns None
a.sort()                       # in place, returns None
b = sorted(a)                  # new list
a.sort(key=lambda x: x[1])     # sort by a field
x in a                         # O(n) membership -- use a set if hot
len(a), sum(a), max(a), min(a)</code></pre>
<p>Two traps: <code>b = a</code> copies the <em>reference</em>, not the list (use <code>a[:]</code> or <code>list(a)</code>); and <code>a.sort()</code> returns <code>None</code>, so <code>x = a.sort()</code> silently destroys your data.</p>`},

{id:"py-dict",grp:"py",t:"Dicts",body:`
<pre><code>d = {}
d[k] = v
d.get(k, default)              # lookup with fallback, no KeyError
cnt[x] = cnt.get(x, 0) + 1     # THE counting idiom
k in d                         # O(1) membership
d.setdefault(k, []).append(v)  # create-or-append buckets
for k in d:                    # keys
for k, v in d.items():         # pairs
d.values();  d.keys()
sorted(d, key=lambda k: -d[k]) # keys ranked by value, descending
d.pop(k, None)                 # delete without KeyError</code></pre>
<p>Keys must be hashable: strings, numbers, tuples yes; lists no. A dict solves five interview jobs: counting, seen-before, value&rarr;index, grouping, memoization. If you are scanning a list twice, ask whether a dict kills the second scan.</p>`},

{id:"py-set",grp:"py",t:"Sets & tuples",body:`
<pre><code>s = set();  s.add(x);  s.discard(x)
x in s                         # O(1)
set(a)                         # dedupe a list
len(set(a)) < len(a)           # "has duplicates" one-liner
a & b;  a | b;  a - b          # intersection / union / difference

t = (r, c)                     # tuple: immutable, hashable
seen.add((r, c))               # grid visited-set pattern
x, y = point                   # unpacking
a, b = b, a                    # swap without a temp</code></pre>
<p>Rule of thumb: need fast membership &rarr; set; need it as a dict key or inside a set &rarr; tuple.</p>`},

{id:"py-str",grp:"py",t:"Strings",body:`
<pre><code>s[i];  s[i:j];  len(s)         # index / slice / length (immutable!)
s.lower();  s.upper()
s.split();  s.split(",")
"-".join(parts)                # join is called on the SEPARATOR
s.strip()
c.isalnum();  c.isdigit();  c.isalpha()
s == s[::-1]                   # palindrome check
"".join(sorted(s))             # canonical anagram key
ord("a");  chr(97)             # char <-> code</code></pre>
<p>Strings are immutable: building with <code>s += ch</code> in a loop is O(n&sup2;). Collect pieces in a list and <code>"".join</code> once at the end.</p>`},

{id:"py-func",grp:"py",t:"Functions & scope",body:`
<pre><code>def f(a, b=0):                 # defaults evaluated ONCE, at def time
    return a + b

def bad(x, acc=[]):            # BUG: one shared list across calls
    acc.append(x)
    return acc

def good(x, acc=None):
    if acc is None:
        acc = []
    ...

def stats(a):
    return min(a), max(a)      # multiple return = tuple
lo, hi = stats(nums)

key = lambda p: p[0]*p[0] + p[1]*p[1]   # lambdas: mostly sort keys</code></pre>
<p>In nested helpers (DFS closures): <em>reading</em> outer variables is free; <em>mutating</em> an outer list/dict is free; <em>rebinding</em> an outer int (a counter) needs <code>nonlocal count</code> &mdash; a very common stumble when counting inside a nested DFS.</p>`},

{id:"py-builtin",grp:"py",t:"Built-ins you must know",body:`
<pre><code>enumerate(a)                   # (i, x) pairs
zip(a, b)                      # pairs; stops at the shorter
list(zip(*matrix))             # transpose trick
min(a);  max(a);  sum(a)
max(a, key=len)                # extremes by a key
any(x > 0 for x in a)
all(v == 0 for v in cnt.values())
abs(x);  divmod(a, b)

[f(x) for x in a if cond]      # list comprehension
{x % 3 for x in a}             # set comprehension
{k: v for k, v in pairs}       # dict comprehension</code></pre>
<p>Comprehensions read as: OUTPUT <b>for</b> ITEM <b>in</b> SOURCE <b>if</b> FILTER. If the logic needs two lines, use a plain loop &mdash; interview code gets read aloud.</p>`},

{id:"py-mod",grp:"py",t:"Modules: math / deque / heapq / bisect",body:`
<pre><code>import math
math.atan2(dy, dx)             # y FIRST; full 4-quadrant angle
math.hypot(dx, dy)             # sqrt(dx*dx + dy*dy)
math.pi;  math.inf;  math.sqrt(x)
math.cos(t);  math.sin(t)      # RADIANS
math.radians(d);  math.degrees(r)
math.floor(x);  math.ceil(x)

from collections import deque
q = deque([start])
q.append(x);  q.popleft()      # O(1) both ends -> BFS queue

import heapq                   # a MIN-heap, always
heapq.heappush(h, (dist, node))
d, u = heapq.heappop(h)
h[0]                           # peek smallest
heapq.heappush(h, -x)          # max-heap: negate in, negate out

import bisect
bisect.bisect_left(a, x)       # first i with a[i] >= x
bisect.bisect_right(a, x)      # first i with a[i] >  x</code></pre>
<p>These four modules cover ~90% of interview needs. heapq compares tuples element-by-element &mdash; put the priority first in the tuple.</p>`},

{id:"py-pit",grp:"py",t:"Hand-writing pitfalls (the greatest hits)",body:`
<ul>
<li><code>b = a</code> aliases the same list. Copy with <code>a[:]</code>, <code>list(a)</code>, or <code>copy.deepcopy</code> for nested structures.</li>
<li><code>[[0]*n]*m</code> creates m references to ONE row. Always <code>[[0]*n for _ in range(m)]</code>. Same trap as <code>[[]]*n</code> for adjacency lists.</li>
<li><code>/</code> returns a float even for 8/2. Index math uses <code>//</code>. Also <code>int(-1.5)</code> truncates to -1, while <code>-3 // 2</code> floors to -2 &mdash; different for negatives.</li>
<li>Floats: never <code>==</code>. Compare with tolerance: <code>abs(a - b) < 1e-9</code>. You have sensor intuition for this &mdash; use it.</li>
<li><code>a.sort()</code>, <code>a.reverse()</code> return <code>None</code>. <code>sorted(a)</code>, <code>a[::-1]</code> return new lists.</li>
<li>Mutable default arguments (<code>def f(x, acc=[])</code>) persist across calls.</li>
<li>Modifying a list while iterating it skips elements. Iterate a copy or build a new list.</li>
<li><code>range(i, j)</code> and <code>a[i:j]</code> exclude j. Say the bounds out loud.</li>
<li><code>"1"</code> and <code>1</code> are different dict keys and different grid cell values. Read the problem's data types.</li>
<li>Python ints never overflow &mdash; worth saying in a C++-flavored interview; it deletes a whole class of edge cases.</li>
</ul>`},
/* ============ Field Manual: Robotics Algorithms ============ */
{id:"rb-map",grp:"rb",t:"Signal-word &rarr; pattern map",body:`
<p>The reflex table. When you read a problem, the left column should trigger the right two columns automatically. Scan this for 10 minutes before any interview.</p>
<table>
<tr><th>Signal in the problem</th><th>Pattern</th><th>First line you write</th></tr>
<tr><td>pair summing to a target, unsorted</td><td>hash map</td><td><code>seen = {}</code></td></tr>
<tr><td>sorted array + find / threshold</td><td>binary search</td><td><code>lo, hi = 0, n-1</code></td></tr>
<tr><td>minimum k such that feasible(k)</td><td>binary search on the answer</td><td><code>while lo < hi:</code></td></tr>
<tr><td>longest substring/window with property</td><td>sliding window (grow r, jump l)</td><td><code>l = 0</code></td></tr>
<tr><td>smallest window meeting a &ge; target</td><td>sliding window (shrink while valid)</td><td><code>total = 0</code></td></tr>
<tr><td>next greater / days until warmer</td><td>monotonic stack</td><td><code>stack = []</code></td></tr>
<tr><td>nested / matched pairs</td><td>stack</td><td><code>stack = []</code></td></tr>
<tr><td>connected regions in a grid</td><td>flood fill (DFS/BFS)</td><td>seed loop over cells</td></tr>
<tr><td>shortest path, unweighted</td><td>BFS</td><td><code>q = deque([start])</code></td></tr>
<tr><td>spreads from many sources / nearest X for every cell</td><td>multi-source BFS</td><td>seed ALL sources at 0</td></tr>
<tr><td>shortest path, weighted</td><td>Dijkstra</td><td><code>h = [(0, src)]</code></td></tr>
<tr><td>ordering with dependencies</td><td>topological sort (Kahn)</td><td><code>indeg = [0] * n</code></td></tr>
<tr><td>k largest / closest / most frequent</td><td>heap of size k, or sort by key</td><td><code>import heapq</code></td></tr>
<tr><td>overlapping intervals</td><td>sort by start, one sweep</td><td><code>iv.sort(key=lambda x: x[0])</code></td></tr>
<tr><td>max set of non-overlapping</td><td>greedy by END time</td><td><code>iv.sort(key=lambda x: x[1])</code></td></tr>
<tr><td>count ways / min cost to reach a state</td><td>DP table</td><td><code>dp = [...]</code></td></tr>
<tr><td>maximum, can't pick adjacent</td><td>take / skip DP</td><td><code>take, skip = 0, 0</code></td></tr>
<tr><td>angle of a vector</td><td>atan2</td><td><code>math.atan2(dy, dx)</code></td></tr>
<tr><td>frame A &rarr; frame B</td><td>SE(2) transform</td><td><code>c, s = cos(t), sin(t)</code></td></tr>
</table>`},

{id:"rb-search",grp:"rb",t:"The search family: BFS &rarr; Dijkstra &rarr; A*",body:`
<p>One family, three members, one upgrade path &mdash; the single most useful mental model for robotics interviews.</p>
<p><b>BFS</b> explores in rings of equal step count. Optimal when every move costs the same (uniform occupancy grid). Data structure: a FIFO <code>deque</code>.</p>
<p><b>Dijkstra</b> is BFS where moves cost different amounts: swap the queue for a min-heap keyed by accumulated cost g; the rings become iso-cost contours. Optimal for non-negative weights.</p>
<p><b>A*</b> is Dijkstra with a compass: pop order uses f = g + h, where h is an <em>admissible</em> heuristic (never overestimates), e.g. Euclidean distance to goal. Same code, one added term; with h = 0 it IS Dijkstra.</p>
<pre><code># the whole family shares one skeleton
pop the best node      # popleft() | heappop by g | heappop by g+h
if node is goal: done
for each neighbor:
    if this route is better than any known:
        record it, push it</code></pre>
<p>Interview sound bite: <em>"BFS when unweighted, Dijkstra when weighted, A* when I also know where the goal is."</em> Then add that your grid planners are benchmarked against exactly these baselines.</p>`},

{id:"rb-grid",grp:"rb",t:"Occupancy grids & connectivity",body:`
<p>A 2D list of free/occupied cells is both the LeetCode grid and the robotics costmap. Nearly every grid problem is a mapping operation in disguise:</p>
<ul>
<li>Flood Fill = free-space segmentation from a seed</li>
<li>Number of Islands = obstacle clustering</li>
<li>Rotting Oranges = wavefront / time-to-contact propagation</li>
<li>Distance transform = clearance field / costmap inflation</li>
<li>Shortest Path in Binary Matrix = the planner baseline itself</li>
</ul>
<pre><code>rows, cols = len(g), len(g[0])
DIRS4 = ((1,0), (-1,0), (0,1), (0,-1))
for dr, dc in DIRS4:
    nr, nc = r + dr, c + dc
    if 0 <= nr < rows and 0 <= nc < cols and g[nr][nc] == FREE:
        ...</code></pre>
<p>Habits that read as senior: bounds-check <em>before</em> dereferencing; mark visited at <em>enqueue</em> time; mutate the grid itself as a free visited-set; build grids with a comprehension, never <code>[[0]*c]*r</code>; keep (row, col) indexing and never let x/y sneak in halfway.</p>`},

{id:"rb-frames",grp:"rb",t:"Coordinate frames, SE(2), atan2, angle wrap",body:`
<p>A pose (x, y, &theta;) defines a frame. Points move between frames with a rotation + translation:</p>
<pre><code># body -> world, robot at (x, y, th)
wx = x + px*cos(th) - py*sin(th)
wy = y + px*sin(th) + py*cos(th)

# world -> body: translate FIRST, then rotate by -th
dx, dy = wx - x, wy - y
px =  dx*cos(th) + dy*sin(th)
py = -dx*sin(th) + dy*cos(th)</code></pre>
<p>Bearings come from <code>atan2(dy, dx)</code> &mdash; y first, all four quadrants, no divide-by-zero. Heading errors must be wrapped into [-&pi;, &pi;) before entering any controller, or the robot takes the 350&deg; scenic route:</p>
<pre><code>err = (target - heading + pi) % (2*pi) - pi</code></pre>
<p>These two lines &mdash; atan2 argument order and the angle wrap &mdash; are the highest bug-density lines in all of robotics. For 3D, name-drop: rotations compose as matrices or quaternions, SE(3) = rotation + translation, and a ROS 2 tf tree is exactly a chain of SE(3) transforms.</p>`},

{id:"rb-path",grp:"rb",t:"Path parameterization & pure pursuit",body:`
<p>A path is a function of arc length s, not a bag of points. Precompute cumulative segment lengths once (prefix sums), then any "point at distance s" query is a binary search plus a lerp:</p>
<pre><code>cum = [0]
for i in range(len(w) - 1):
    cum.append(cum[-1] + hypot(w[i+1][0]-w[i][0], w[i+1][1]-w[i][1]))
# query s: i = bisect_right(cum, s) - 1, then lerp inside segment i
# build O(n) once, each query O(log n)</code></pre>
<p><b>Pure pursuit</b> = "steer toward the point a lookahead distance L further along the path than my current projection." Two arc-length queries and one steering law. The trade-off sentence interviewers love: small L tracks tightly but oscillates; large L is smooth but cuts corners. L often scales with speed.</p>`},

{id:"rb-filter",grp:"rb",t:"Filtering sensor streams",body:`
<p>Three filters cover most "clean this signal" conversations:</p>
<table>
<tr><th>Filter</th><th>Kills</th><th>Costs</th><th>Core line</th></tr>
<tr><td>Moving average</td><td>broadband noise</td><td>lag; O(1) with a running sum</td><td>sliding-window sum / k</td></tr>
<tr><td>EMA</td><td>broadband noise</td><td>lag; infinite memory tail</td><td><code>y = a*x + (1-a)*y</code></td></tr>
<tr><td>Median</td><td>spikes / outliers</td><td>sorting the window</td><td><code>sorted(w)[k//2]</code></td></tr>
</table>
<p>Order matters: median first (kill spikes), then EMA (smooth). An EMA hit by a 9999 glitch remembers it for roughly 1/&alpha; samples; a median never even sees it. Your own stack is the perfect example: MS5837 pressure spikes &rarr; median; control-rate smoothing on the Pi inside SharedState &rarr; EMA, because it is one multiply-add and O(1) memory.</p>
<p>The name-drop ladder when asked "what's next": moving average &rarr; EMA &rarr; complementary filter (fuse two sensors) &rarr; Kalman filter (optimal fusion with a motion model).</p>`},

{id:"rb-heap",grp:"rb",t:"Priority queues in robotics",body:`
<p>Anywhere you repeatedly need "the most urgent thing", a heap turns O(n) scans into O(log n) pops:</p>
<ul>
<li>Dijkstra / A* open set &mdash; cheapest node next</li>
<li>Event and command schedulers &mdash; earliest deadline first</li>
<li>k nearest obstacles / neighbors &mdash; heap of size k</li>
<li>Merging k timestamped sensor streams = merging k sorted lists</li>
</ul>
<pre><code>h = []
heapq.heappush(h, (priority, payload))
prio, item = heapq.heappop(h)</code></pre>
<p>Python details worth saying out loud: heapq is a <em>min</em>-heap; there is no decrease-key, so push duplicates and skip stale entries on pop (<code>if u in done: continue</code>); tuples compare left-to-right, so the priority goes first.</p>`},

{id:"rb-pid",grp:"rb",t:"PID in 10 lines",body:`
<pre><code>class PID:
    def __init__(self, kp, ki, kd):
        self.kp, self.ki, self.kd = kp, ki, kd
        self.i = 0.0
        self.prev = None
    def step(self, err, dt):
        self.i += err * dt
        d = 0.0 if self.prev is None else (err - self.prev) / dt
        self.prev = err
        return self.kp*err + self.ki*self.i + self.kd*d</code></pre>
<p>The talking points matter more than the code: (1) heading error must be angle-wrapped <em>before</em> entering the loop; (2) the integral needs clamping &mdash; anti-windup &mdash; or actuator saturation wrecks recovery; (3) the D term on a noisy sensor needs low-passing, or take the derivative of the <em>measurement</em> instead of the error to avoid setpoint kicks. Each one is a war story you can tell from mantabot hardware.</p>`},

{id:"rb-cx",grp:"rb",t:"Complexity cheat sheet",body:`
<table>
<tr><th>Input size n</th><th>Target complexity</th></tr>
<tr><td>~10&#8309; &ndash; 10&#8310;</td><td>O(n) or O(n log n)</td></tr>
<tr><td>~10&sup3; &ndash; 10&#8308;</td><td>O(n&sup2;) acceptable</td></tr>
<tr><td>&le; ~20</td><td>exponential / bitmask territory</td></tr>
</table>
<table>
<tr><th>Operation</th><th>Cost</th></tr>
<tr><td>dict / set lookup, insert</td><td>O(1) average</td></tr>
<tr><td><code>x in list</code></td><td>O(n)</td></tr>
<tr><td>sort</td><td>O(n log n)</td></tr>
<tr><td>heap push / pop</td><td>O(log n)</td></tr>
<tr><td>BFS / DFS</td><td>O(V + E)</td></tr>
<tr><td>Dijkstra (heap)</td><td>O(E log V)</td></tr>
<tr><td>slice a[i:j]</td><td>O(j - i), and it copies</td></tr>
</table>
<p>Interview move: state complexity <em>before</em> coding &mdash; "one pass with a dict, O(n) time, O(n) space." It buys goodwill and catches a wrong plan while it is still cheap.</p>`}
,
{id:"iv-behavioral",grp:"iv",t:"Behavioral question bank (mapped to your stories)",body:`
<p>Interviews spend as much time on "tell me about a time..." as on code. The fix is not memorizing answers &mdash; it is having 6&ndash;8 concrete stories ready, each in <b>STAR</b> shape (Situation, Task, Action, Result), and knowing which one to reach for. Below: 15 common prompts, each mapped to a real incident from your four projects so you never freeze. Prep the starred ones first &mdash; they cover ~80% of what gets asked.</p>

<div class="robobox"><b>YOUR STORY BANK &mdash; the raw material</b>
<ul>
<li><b>Triple-cause board kill (VCA bot)</b> &mdash; GPIO-high-on-boot + back-EMF + USB 5V backfeeding through the buck body diode together destroyed a regulator. Fixed with a three-part protection chain (PTC + TVS + Schottky). The definitive "hard bug" and "failures compound" story.</li>
<li><b>CHANNEL_INVERT layering (VCA bot)</b> &mdash; a reversed-wired actuator first patched ad hoc in several places, then consolidated to one constant at the lowest layer. Your "I fixed it wrong first, then structurally" story.</li>
<li><b>Bang-bang realization (VCA bot)</b> &mdash; built a PWM&rarr;angle calibration curve before realizing the plant had no stable intermediate positions. "Identify the regime before optimizing" &mdash; a story about a wrong assumption caught.</li>
<li><b>Cross-attention rank bottleneck (Flow sensing)</b> &mdash; vorticity SSIM capped at ~0.13 no matter the hyperparameters; the real cause was rank &le; 5 from only 5 sensor tokens. Fixed with learnable tokens. "The metric was stuck and tuning could never fix it."</li>
<li><b>Phase-angle leakage (Flow sensing)</b> &mdash; the model leaned on upstream foil phase that a real AUV cannot observe at inference; replaced it with onboard sensor history. "I caught my own eval was dishonest."</li>
<li><b>LLM early-frame bias (Badminton coach)</b> &mdash; the model kept confusing "arm raised" with "moment of contact"; a feedback loop asking it to self-correct just confirmed its own wrong answer. Replaced with a computational motion-peak constraint. "The clever approach failed; the simple signal won."</li>
<li><b>Dead code that looked like features (Badminton coach)</b> &mdash; three functions defined but never called; the real runtime was much simpler. "Trace the call chain, don't trust definitions." A code-review lesson.</li>
<li><b>Phase accumulator drift (Mantabot)</b> &mdash; differential turning drove two motor accumulators apart; independent idle resets made it worse; fixed with coordinated re-sync. A subtle concurrency/state story.</li>
<li><b>Pi 5 has no H.264 encoder (Mantabot)</b> &mdash; assumed drone-style hardware encoding existed; had to redesign around CPU MJPEG within a thermal budget. "My assumption was wrong and I re-architected."</li>
<li><b>SharedState concurrency framework (Mantabot)</b> &mdash; you designed a multi-rate threaded architecture (50Hz control, 200Hz CAN, 15fps camera) sharing state cleanly. Your "system design from scratch" story.</li>
<li><b>Image-based phase recovery (VCA bot)</b> &mdash; chose offline post-hoc phase over fighting an unreliable hardware trigger on a jittery wireless link. "I picked the pragmatic path over the 'correct' one."</li>
</ul>
</div>

<h3>The 15 questions</h3>
<table>
<tr><th>Prompt</th><th>Reach for</th></tr>
<tr><td>&#9733; Tell me about the hardest bug you've debugged.</td><td>Triple-cause board kill &mdash; three independent failures compounding is a rare, memorable answer. Walk the diagnosis, not just the fix.</td></tr>
<tr><td>&#9733; Describe a time you were wrong about something technical.</td><td>Bang-bang realization, or Pi 5 H.264 assumption. Both are "I assumed X, evidence said not-X, I changed course."</td></tr>
<tr><td>&#9733; Tell me about a system you designed from scratch.</td><td>SharedState multi-rate architecture. Emphasize the rate-decoupling decision and why threads over one loop.</td></tr>
<tr><td>&#9733; A time you improved something that already worked.</td><td>CHANNEL_INVERT consolidation &mdash; it worked after the ad-hoc patches, but you refactored to one boundary constant. Talk about maintainability.</td></tr>
<tr><td>&#9733; When did you catch a mistake others (or you) missed?</td><td>Phase-angle leakage, or dead-code call-chain. Both show rigor and honesty about your own work.</td></tr>
<tr><td>Tell me about a technical disagreement.</td><td>The VLA-framing discussion with your advisor: naive end-to-end vs. flow-conditioned. You argued from physics for the harder-but-right framing. (Keep it collegial.)</td></tr>
<tr><td>A time you had to learn something fast.</td><td>ESP-NOW / LEDC PWM v2&rarr;v3 API break, or picking up cross-attention for the decoder. Show the ramp-up method.</td></tr>
<tr><td>When you hit a wall and had to change approach.</td><td>Cross-attention rank bottleneck &mdash; no hyperparameter could move the metric; you diagnosed the structural cause and switched to learnable tokens.</td></tr>
<tr><td>A time you made a pragmatic trade-off under constraints.</td><td>Image-based phase recovery over hardware sync; MJPEG over H.264 within thermal budget. "Right answer given real limits."</td></tr>
<tr><td>Describe a failure and what you learned.</td><td>Board kill (if not used above) framed as "I under-protected the power path" &mdash; the lesson became a design principle: protect every path.</td></tr>
<tr><td>How do you approach testing / validation?</td><td>Case-level leave-K-out splits in flow sensing; audio-motion cross-validation in the coach. You design tests to expose leakage, not flatter the model.</td></tr>
<tr><td>A time attention to detail mattered.</td><td>AS5600L at 0x40 not 0x36; the atan2 argument order; sizing the IPROPI resistor to the ADC ceiling. Small detail, whole-system consequence.</td></tr>
<tr><td>Tell me about working with ambiguity / no clear spec.</td><td>Defining a lock-in criterion for Karman gait entrainment (phase-stationarity) &mdash; you turned an emergent, fuzzy phenomenon into a quantitative test.</td></tr>
<tr><td>How do you prioritize when everything is urgent?</td><td>The command scheduler: STOP always highest priority, 50ms serial budget. A concrete, systems-level answer about explicit priority.</td></tr>
<tr><td>Why this company / why robotics? (motivation)</td><td>Your through-line: research &rarr; build &rarr; validate on real hardware. The full closed loop is rare; lead with that, not a generic passion statement.</td></tr>
</table>

<h3>Delivery notes</h3>
<ul>
<li><b>60&ndash;90 seconds each.</b> Situation and Task in two sentences; spend your time on Action (what YOU did, decisions you made) and a concrete Result.</li>
<li><b>Quantify the result</b> even loosely: "reduced sensing input dimension", "recovered SSIM from 0.13 to a usable field", "zero board failures after the protection chain". Numbers stick.</li>
<li><b>"I" not "we."</b> These are your incidents &mdash; own the specific decision, even on a solo project where it feels obvious.</li>
<li><b>End on the lesson.</b> Every strong answer closes with the principle you now carry: "failures compound, so I protect every path," "identify the regime before optimizing," "design tests to expose leakage."</li>
<li>Practice these <b>out loud in English</b> &mdash; the vocabulary (bring-up, root-cause, regression, trade-off, corner case) is exactly the JD terminology you want to sound fluent in at IROS.</li>
</ul>`}
];

/* ---- Arrays & Hashing ---- */
{id:"two-sum",z:"ah",t:"Two Sum",d:"E",lc:"LC 1",fn:"two_sum",
prompt:"Given an integer array `nums` and an integer `target`, return the indices of the two numbers that add up to `target`. Exactly one solution exists, and you may not use the same element twice. Return the pair of indices in any order.",
robo:"Same reflex as matching a pair of sensor timestamps whose offsets sum to a target latency: one pass with a hash map beats scanning all pairs.",
sig:["Find a **pair** hitting an exact sum","Array is unsorted","Brute force is O(n^2) -- the interviewer wants O(n)"],
app:["Ask: standing on `x`, what am I looking for? `target - x`.","Store every value already seen in a dict `value -> index`.","One pass: check the complement first, then insert the current value. Checking before inserting prevents matching an element with itself."],
tool:["`seen = {}` then `need in seen` -- O(1) lookup","`enumerate(nums)` gives `(i, x)` without manual indexing"],
pit:"Inserting into the dict before checking the complement makes `[3,3], target 6` self-match or fail. Check first, insert second.",
start:`def two_sum(nums, target):
    # return [i, j]
`,
sol:`def two_sum(nums, target):
    seen = {}                     # value -> index
    for i, x in enumerate(nums):
        need = target - x
        if need in seen:
            return [seen[need], i]
        seen[x] = i
    return []`,

{id:"valid-anagram",z:"ah",t:"Valid Anagram",d:"E",lc:"LC 242",fn:"is_anagram",
prompt:"Given two strings `s` and `t`, return True if `t` is an anagram of `s` (same characters with the same counts).",
robo:"Counting occurrences with a dict is the same idiom as histogramming PIV vector magnitudes -- `cnt[x] = cnt.get(x, 0) + 1` should be muscle memory.",
sig:["Compare **composition**, not order","Words like anagram, permutation, same letters"],
app:["Early exit: different lengths can never match.","Count characters of `s` up, then characters of `t` down; any counter going below zero means mismatch.","Worth mentioning: `sorted(s) == sorted(t)` is a correct O(n log n) one-liner."],
tool:["`cnt[c] = cnt.get(c, 0) + 1` -- the counting idiom","`cnt.get(c, 0)` guards missing keys on the way down"],
pit:"Skipping the length check lets inputs like 'a' vs 'ab' sneak through subtle count-down bugs.",
start:`def is_anagram(s, t):
    # return True / False
`,
sol:`def is_anagram(s, t):
    if len(s) != len(t):
        return False
    cnt = {}
    for c in s:
        cnt[c] = cnt.get(c, 0) + 1
    for c in t:
        if cnt.get(c, 0) == 0:
            return False
        cnt[c] -= 1
    return True`,

{id:"group-anagrams",z:"ah",t:"Group Anagrams",d:"M",lc:"LC 49",fn:"group_anagrams",
prompt:"Given an array of strings, group the anagrams together. Return a list of groups in any order.",
robo:"Bucketing by a computed key is how you would group CAN frames by arbitration ID: compute the key, append to `dict[key]`.",
sig:["Group items by an equivalence, not just detect one pair","You need a canonical **key** per group"],
app:["Every anagram shares the same sorted spelling: use `''.join(sorted(w))` as the dict key.","Append each word to its bucket; return the buckets."],
tool:["`\"\".join(sorted(w))` -- canonical key","`groups.setdefault(key, []).append(w)` -- create-or-append in one line"],
pit:"Using a list as a dict key raises TypeError. Keys must be hashable: use a string or a tuple.",

`,
sol:`def group_anagrams(strs):
    groups = {}
    for w in strs:
        key = "".join(sorted(w))
        groups.setdefault(key, []).append(w)
    return list(groups.values())`,

{id:"top-k-frequent",z:"ah",t:"Top K Frequent Elements",d:"M",lc:"LC 347",fn:"top_k_frequent",
prompt:"Return the `k` most frequent elements of `nums`, in any order. The answer is guaranteed unique.",
robo:"Which fault codes fired most this run? Count with a dict, then rank. On live streams you would keep a heap; offline, sorting the counted keys is cleanest.",
sig:["Phrases like top k, most frequent, k largest by score","Count first, select second"],
app:["Pass 1: histogram with `cnt.get(x, 0) + 1`.","Pass 2: sort the unique keys by count descending, slice `[:k]`.","Say the upgrades exist: a heap gives O(n log k), bucket sort gives O(n)."],
tool:["`sorted(cnt, key=lambda x: -cnt[x])[:k]` -- rank dict keys by value","Slicing never raises even if k is near len"],
pit:"`sorted(cnt)` alone sorts the keys by their own value, not by count -- the `key=` argument is the whole point.",
start:`def top_k_frequent(nums, k):
    # return list of k values
`,
sol:`def top_k_frequent(nums, k):
    cnt = {}
    for x in nums:
        cnt[x] = cnt.get(x, 0) + 1
    order = sorted(cnt, key=lambda x: -cnt[x])
    return order[:k]`,

{id:"product-except-self",z:"ah",t:"Product of Array Except Self",d:"M",lc:"LC 238",fn:"product_except_self",
prompt:"Return an array where `out[i]` is the product of every element of `nums` except `nums[i]`. Division is not allowed; run in O(n).",
robo:"Prefix/suffix accumulation is the same trick as your cumulative arc-length table: precompute running aggregates so each query costs O(1).",
sig:["Phrases like except self, without element i","Division banned points at prefix x suffix"],
app:["`out[i]` = (product of everything left of i) x (product of everything right of i).","Left pass: carry one running prefix product; write it into `out[i]` **before** multiplying in `nums[i]`.","Right pass: same from the end, multiplying into `out`."],
tool:["Two passes, one running scalar each -- no extra arrays","`range(n - 1, -1, -1)` for the reverse pass"],
pit:"Multiplying the current element into the running product before writing `out[i]` -- the order of those two lines is the entire problem.",
start:`def product_except_self(nums):
    # return list, no division
`,
sol:`def product_except_self(nums):
    n = len(nums)
    out = [1] * n
    left = 1
    for i in range(n):
        out[i] = left
        left *= nums[i]
    right = 1
    for i in range(n - 1, -1, -1):
        out[i] *= right
        right *= nums[i]
    return out`,

/* ---- Two Pointers ---- */
{id:"valid-palindrome",z:"tp",t:"Valid Palindrome",d:"E",lc:"LC 125",fn:"is_palindrome",
prompt:"Return True if `s` reads the same forwards and backwards, considering only alphanumeric characters and ignoring case.",
robo:"Two pointers walking inward is the same scan structure as checking a symmetric pressure profile across the fin midline.",
sig:["Compare a sequence with its reverse","Some characters must be skipped while scanning"],
app:["Pointers `l` and `r` start at both ends.","Inner while-loops skip non-alphanumeric characters on each side.","Compare lowercased characters; mismatch returns False; pointers crossing returns True."],
tool:["`c.isalnum()` and `c.lower()`","Outer loop `while l < r:`"],
pit:"The inner skip loops must also guard `l < r`, or punctuation-only inputs run the pointers past each other.",
start:`def is_palindrome(s):
    # alphanumeric only, case-insensitive
`,
sol:`def is_palindrome(s):
    l, r = 0, len(s) - 1
    while l < r:
        while l < r and not s[l].isalnum():
            l += 1
        while l < r and not s[r].isalnum():
            r -= 1
        if s[l].lower() != s[r].lower():
            return False
        l += 1
        r -= 1
    return True`,
tests:[{a:["A man, a plan, a canal: Panama"],w:true},{a:["race a car"],w:false},{a:[" "],w:true}],fl:{}},

{id:"container-water",z:"tp",t:"Container With Most Water",d:"M",lc:"LC 11",fn:"max_area",
prompt:"`height[i]` is a wall at x = i. Choose two walls so the container between them holds the most water. Return the maximum area.",
robo:"Greedy pointer movement with a proof -- the same which-side-is-the-bottleneck reasoning you use whenever one constraint limits the whole system.",
sig:["Best **pair** under a min() constraint","Squeeze from both ends"],
app:["Start with the widest container: `l = 0, r = n - 1`.","Area = `(r - l) * min(h[l], h[r])`.","Move the **shorter** wall inward: moving the taller one can only shrink the area, since width drops and height stays capped by the short wall."],
tool:["`min(height[l], height[r])`","`best = max(best, area)` each step"],
pit:"Moving the taller pointer to explore -- the greedy proof is exactly why only the shorter one moves.",
start:`def max_area(height):
    # return max area
`,
sol:`def max_area(height):
    l, r = 0, len(height) - 1
    best = 0
    while l < r:
        area = (r - l) * min(height[l], height[r])
        best = max(best, area)
        if height[l] < height[r]:
            l += 1
        else:
            r -= 1
    return best`,
tests:[{a:[[1,8,6,2,5,4,8,3,7]],w:49},{a:[[1,1]],w:1}],fl:{}},

{id:"three-sum",z:"tp",t:"3Sum",d:"M",lc:"LC 15",fn:"three_sum",
prompt:"Return all unique triplets in `nums` that sum to 0. No duplicate triplets in the output.",
robo:"Sort-then-two-pointers converts an O(n^3) search into O(n^2) -- the standard move whenever ordering the data unlocks a squeeze.",
sig:["Triplets summing to a target **with dedup**","Sorting is allowed"],
app:["Sort first. Fix index `i`, then run two-sum with pointers `l = i + 1, r = n - 1`.","Sum below zero moves `l` right; above zero moves `r` left; zero records and moves both.","Dedup in three places: skip repeated values at `i`, and at `l` and `r` after each hit."],
tool:["`nums.sort()`","`if i > 0 and nums[i] == nums[i-1]: continue`"],
pit:"Three separate dedup points (i, l, r). Missing any one of them produces duplicate triplets.",
start:`def three_sum(nums):
    # return list of triplets
`,
sol:`def three_sum(nums):
    nums.sort()
    res = []
    n = len(nums)
    for i in range(n - 2):
        if i > 0 and nums[i] == nums[i - 1]:
            continue
        l, r = i + 1, n - 1
        while l < r:
            s = nums[i] + nums[l] + nums[r]
            if s < 0:
                l += 1
            elif s > 0:
                r -= 1
            else:
                res.append([nums[i], nums[l], nums[r]])
                l += 1
                while l < r and nums[l] == nums[l - 1]:
                    l += 1
                r -= 1

    last = {}

prompt:"All elements of `nums` are positive. Return the smallest length of a contiguous subarray whose sum is at least `target`, or 0 if none exists.",
robo:"Shortest burst of samples whose energy crosses a threshold: the window sum grows on the right and shrinks greedily from the left.",
sig:["Minimum window satisfying a >= constraint","All positive means the window sum is monotone in its size"],
app:["Expand r, adding into a running sum.","While the sum is >= target: record the length, then shrink from the left.","Positivity is exactly what makes shrink-while-valid correct."],
tool:["Running `total += nums[r]` and `total -= nums[l]`","`best = min(best, r - l + 1)` **inside** the while"],

`,
sol:`def min_subarray_len(target, nums):
    l = 0
    total = 0
    best = float('inf')
    for r in range(len(nums)):

prompt:"Given a string containing only ()[]{}， return True if every bracket closes in the correct order.",

sig:["Matching or nesting pairs","Most recent open must close first = LIFO"],
app:["Map closers to openers: `{')': '(', ']': '[', '}': '{'}`.","Opener: push. Closer: the stack must be non-empty and its top must match; pop it.","Valid iff the stack is empty at the end."],
tool:["`stack.append(c)` / `stack.pop()`","`if not stack or stack.pop() != pairs[c]: return False`"],
pit:"Two distinct failure modes: popping an empty stack (input ')(' ) and leftovers at the end (input '((' ). Handle both.",
start:`def is_valid(s):
    # return True / False
`,
sol:`def is_valid(s):
    pairs = {')': '(', ']': '[', '}': '{'}
    stack = []
    for c in s:
        if c in pairs:
            if not stack or stack.pop() != pairs[c]:
                return False
        else:
            stack.append(c)
    return len(stack) == 0`,

prompt:"For each day, return how many days until a strictly warmer temperature; 0 if it never comes.",
robo:"Monotonic stack = wait until a bigger event resolves you -- the pattern behind every next-greater query on a time series.",
sig:["Next greater element, days until warmer","The answer for i is resolved by a later j"],
app:["The stack holds **indices** of days still waiting; their temperatures are decreasing top-down.","New day j arrives: while it is warmer than the temperature at the stack top i, pop i and set `ans[i] = j - i`.","Push j. Whatever remains unresolved keeps 0."],
tool:["`while stack and temps[j] > temps[stack[-1]]:`","Preallocate `ans = [0] * n`"],
pit:"Storing temperatures on the stack instead of indices -- you need the indices to compute distances.",
start:`def daily_temperatures(temps):
    # return list of waits
`,
sol:`def daily_temperatures(temps):
    n = len(temps)
    ans = [0] * n
    stack = []
    for j in range(n):
        while stack and temps[j] > temps[stack[-1]]:
            i = stack.pop()
            ans[i] = j - i
        stack.append(j)
    return ans`,

def transform_points(points, x, y, theta):

sol:`import math

def transform_points(points, x, y, theta):
    c, s = math.cos(theta), math.sin(theta)
    out = []
    for px, py in points:
        wx = x + px * c - py * s
        wy = y + px * s + py * c
        out.append([wx, wy])
    return out`,

prompt:"Start at pose (0, 0, 0). `cmds` is a list of [v, omega, dt]. Euler-integrate the unicycle model, updating position with the CURRENT heading before updating heading: x += v*cos(th)*dt; y += v*sin(th)*dt; th += omega*dt. Return [x, y, th].",
robo:"Dead reckoning from fin/wheel odometry: the pose estimate you have when no external fix exists, and the prediction step of a future EKF.",
sig:["Integrate velocity commands into a pose","Update ORDER matters -- stated, or you must ask"],
app:["Loop over commands applying the three update lines in the stated order.","Position must use the heading from BEFORE this step's rotation; swapping lines gives a different discretization.","Say the words Euler integration, and that error shrinks with dt."],
tool:["`math.cos(th)`, `math.sin(th)` re-evaluated every step","Multiple return: `return [x, y, th]`"],
pit:"Updating theta before x and y: a one-line-order bug that only shows up as slow drift in tests with turns.",
start:`import math

def integrate_odometry(cmds):
    # cmds: [[v, omega, dt], ...] -> [x, y, th]
`,
sol:`import math

def integrate_odometry(cmds):
    x, y, th = 0.0, 0.0, 0.0
    for v, w, dt in cmds:
        x += v * math.cos(th) * dt
        y += v * math.sin(th) * dt
        th += w * dt
    return [x, y, th]`,

{id:"path-point",z:"rb",t:"Point Along Path",d:"M",lc:"Custom",fn:"point_along_path",
prompt:"Given a polyline `waypoints` = [[x, y], ...] and an arc length s, return the [x, y] point lying distance s along the path from the first waypoint. Clamp: s <= 0 gives the first point; s >= total length gives the last.",
robo:"The math under pure pursuit: give me the point 0.5 m ahead along the reference path. You derived exactly this for the trajectory tracker.",
sig:["Point at distance d along a path","Accumulate segment lengths, interpolate inside one segment"],
app:["Walk segments, spending s against each segment length until it runs out inside one.","Interpolate there: `t = remaining / seg_len`, point = a + t * (b - a).","Skip zero-length segments (duplicate waypoints).","Upgrade to mention: precompute cumulative lengths once, then bisect per query -- O(log n)."],
tool:["`math.hypot(dx, dy)` for segment length","Lerp: `a[0] + t * (b[0] - a[0])`"],
pit:"Dividing by a zero segment length when two waypoints coincide -- one `if seg == 0: continue` guard.",
start:`import math

def point_along_path(waypoints, s):
    # return [x, y] at arc length s
`,
sol:`import math

def point_along_path(waypoints, s):
    if s <= 0:
        return [waypoints[0][0], waypoints[0][1]]
    for i in range(len(waypoints) - 1):
        a, b = waypoints[i], waypoints[i + 1]
        seg = math.hypot(b[0] - a[0], b[1] - a[1])
        if seg == 0:
            continue
        if s <= seg:
            t = s / seg
            return [a[0] + t * (b[0] - a[0]),
                    a[1] + t * (b[1] - a[1])]
        s -= seg
    last = waypoints[-1]
    return [last[0], last[1]]`,

{id:"calib",z:"rb",t:"Calibration Table Lookup",d:"M",lc:"Custom",fn:"calib_lookup",
prompt:"`table` is a list of [raw, value] calibration pairs sorted by raw. Return the calibrated value for reading x by linear interpolation between the two bracketing pairs. Clamp outside the table range.",
robo:"Exactly how a raw MS5837 count becomes depth in meters when the datasheet polynomial is not trusted: bench-calibrate a table, interpolate at runtime.",
sig:["Lookup table with interpolation","Sorted keys -> binary search for the bracket"],
app:["Clamp first: x at or below the first raw gives the first value; at or above the last gives the last.","Find the bracketing segment (linear scan here; say the `bisect_right` O(log n) upgrade exists).","Lerp: `v0 + (x - r0) * (v1 - v0) / (r1 - r0)`."],
tool:["`bisect.bisect_right(raws, x)` for the fast version","Column extraction: `raws = [p[0] for p in table]`"],
pit:"Off-by-one picking the bracket after bisect -- always verify with an x exactly equal to a table node.",
start:`def calib_lookup(table, x):
    # linear interpolation, clamped
`,
sol:`def calib_lookup(table, x):
    if x <= table[0][0]:
        return table[0][1]
    if x >= table[-1][0]:
        return table[-1][1]
    for i in range(len(table) - 1):
        r0, v0 = table[i]
        r1, v1 = table[i + 1]
        if r0 <= x <= r1:
            t = (x - r0) / (r1 - r0)
            return v0 + t * (v1 - v0)`,

{id:"dist-transform",z:"rb",t:"Obstacle Distance Field",d:"M",lc:"Custom",fn:"distance_transform",
prompt:"Occupancy grid: 1 = obstacle, 0 = free. Return a same-shape grid where each cell holds its 4-connected step distance to the nearest obstacle (obstacles = 0). At least one obstacle exists.",
robo:"The clearance field: cost maps for planners (stay 2 cells from walls) and the safety margin your controller checks -- one multi-source BFS.",
sig:["Distance to the nearest X for EVERY cell","Multi-source BFS: seed all X cells at 0"],
app:["Seed the queue with every obstacle at distance 0 -- never BFS per free cell.","Standard BFS; first arrival at a cell is its true distance (unweighted).","An output grid initialized to -1 doubles as the visited set."],
tool:["`dist = [[-1] * cols for _ in range(rows)]`","`from collections import deque`"],
pit:"`[[-1]*cols]*rows` -- the aliased-rows trap, and in THIS problem it visibly corrupts the whole field.",
start:`def distance_transform(grid):
    # return grid of step distances
`,
sol:`def distance_transform(grid):
    from collections import deque
    rows, cols = len(grid), len(grid[0])
    dist = [[-1] * cols for _ in range(rows)]
    q = deque()
    for r in range(rows):
        for c in range(cols):
            if grid[r][c] == 1:
                dist[r][c] = 0
                q.append((r, c))
    while q:
        r, c = q.popleft()
        for dr, dc in ((1,0),(-1,0),(0,1),(0,-1)):
            nr, nc = r + dr, c + dc
            if 0 <= nr < rows and 0 <= nc < cols and dist[nr][nc] == -1:
                dist[nr][nc] = dist[r][c] + 1
                q.append((nr, nc))
    return dist`,

{id:"simplify",z:"rb",t:"Simplify Waypoint Path",d:"M",lc:"Custom",fn:"simplify_path",
prompt:"A recorded path [[x, y], ...] with integer coords contains redundant collinear points. Remove every interior point that is collinear (cross product exactly 0) with the previously KEPT point and the next point. Always keep both endpoints.",
robo:"Waypoint compression before sending a path over the CAN/serial link: collinear samples carry no information, and the cross product is the collinearity test.",
sig:["Simplify / compress a polyline","Collinearity -> 2D cross product == 0"],
app:["cross(u, v) = ux*vy - uy*vx; zero iff parallel.","Sweep interior points: u = cur - last_kept, v = next - cur; keep cur only if cross != 0.","Comparing against the last KEPT point (not p[i-1]) collapses whole straight runs in one pass.","Real-world upgrade to name: RDP (Ramer-Douglas-Peucker) with a tolerance, for noisy floats."],
tool:["`ux * vy - uy * vx`","Build `out = [points[0]]` and compare against `out[-1]`"],
pit:"Testing against the immediate predecessor instead of the last kept point leaves every other point of a long straight run in place.",
start:`def simplify_path(points):
    # return compressed waypoint list
`,
sol:`def simplify_path(points):
    if len(points) <= 2:
        return points
    out = [points[0]]
    for i in range(1, len(points) - 1):
        ax, ay = out[-1]
        bx, by = points[i]
        cx, cy = points[i + 1]
        cross = (bx - ax) * (cy - by) - (by - ay) * (cx - bx)
        if cross != 0:
            out.append(points[i])
    out.append(points[-1])
    return out`,

sig:["Depth / height / longest path in a tree","'In terms of its children' -> recursion"],
app:["Base case: an empty node has depth 0.","Recurse: depth = 1 + max(depth(left), depth(right)).","That is the entire function. Trust the recursion; do not try to track a running max by hand."],

{id:"invert-tree",z:"tr",t:"Invert Binary Tree",d:"E",lc:"LC 226",fn:"invert_tree",wrap:"_run",
pre:`class TreeNode:
    def __init__(self, val=0, left=None, right=None):
        self.val = val; self.left = left; self.right = right
def _build(a):
    if not a or a[0] is None: return None
    root = TreeNode(a[0]); _dq = deque if 'deque' in dir() else __import__('collections').deque
    q = _dq([root]); i = 1
    while q and i < len(a):
        n = q.popleft()
        if i < len(a) and a[i] is not None:
            n.left = TreeNode(a[i]); q.append(n.left)
        i += 1
        if i < len(a) and a[i] is not None:
            n.right = TreeNode(a[i]); q.append(n.right)
        i += 1
    return root
def _ser(root):
    _dq = deque if 'deque' in dir() else __import__('collections').deque
    if not root: return []
    out = []; q = _dq([root])
    while q:
        n = q.popleft()
        if n is None: out.append(None); continue
        out.append(n.val); q.append(n.left); q.append(n.right)
    while out and out[-1] is None: out.pop()
    return out
def _run(a):
    return _ser(invert_tree(_build(a)))`,
prompt:"Invert a binary tree: swap the left and right child of every node. Return the (list-serialized) root. Input is a level-order list.",
robo:"A mirror operation on a tree -- structurally identical to reflecting a kinematic chain across a symmetry plane, which you would do to compare left-vs-right stroke data.",
sig:["Mirror / flip / reflect a tree","Swap children at every node -> recursion or BFS"],
app:["At each node, swap left and right, then recurse into both.","Order does not matter: swap-then-recurse or recurse-then-swap both work.","Return the node so the recursion composes."],
tool:["`node.left, node.right = node.right, node.left`","Base case `if not node: return None`"],
pit:"Swapping with a temp variable in the wrong order clobbers one side. Python tuple-swap sidesteps it entirely.",
start:`def invert_tree(root):
    # return the root
`,
sol:`def invert_tree(root):
    if not root:
        return None
    root.left, root.right = root.right, root.left
    invert_tree(root.left)
    invert_tree(root.right)
    return root`,

{id:"level-order",z:"tr",t:"Binary Tree Level Order Traversal",d:"M",lc:"LC 102",fn:"level_order",wrap:"_run",
pre:`class TreeNode:
    def __init__(self, val=0, left=None, right=None):

def _build(a):

    root = TreeNode(a[0]); _dq = deque if 'deque' in dir() else __import__('collections').deque
    q = _dq([root]); i = 1

prompt:"Return the level-order traversal of a binary tree as a list of levels: `[[level0], [level1], ...]`. Input is a level-order list.",
robo:"BFS on a tree is the same queue machinery as your grid BFS -- but here you snapshot the queue size each round to cut the stream into levels.",
sig:["Group tree nodes BY LEVEL / by depth","BFS with a per-level boundary"],
app:["Queue seeded with the root. Each round, read `len(queue)` FIRST and freeze it -- that count is exactly this level's width.","Pop that many nodes, collect their values, enqueue their children.","The frozen count is the whole trick; the queue grows as you go, so you must snapshot before draining."],
tool:["`from collections import deque`","`for _ in range(len(q)):` -- snapshot the width"],
pit:"Iterating `while q` without freezing the level size mixes children into the current level. Capture `len(q)` before the inner loop.",
start:`def level_order(root):
    # return list of levels
`,
sol:`def level_order(root):
    from collections import deque
    if not root:
        return []
    out = []
    q = deque([root])
    while q:
        level = []
        for _ in range(len(q)):
            n = q.popleft()
            level.append(n.val)
            if n.left: q.append(n.left)
            if n.right: q.append(n.right)
        out.append(level)
    return out`,

prompt:"Return True if the tree has a root-to-LEAF path whose node values sum to `target`. Input is a level-order list plus the target integer.",
robo:"Accumulate-along-a-path with a leaf test -- the discrete cousin of integrating cost along a planned route until you reach a terminal node.",
sig:["Root-to-leaf path with a target sum","Carry a running total DOWN the recursion"],
app:["Subtract the current value from the remaining target as you descend.","A LEAF (no children) succeeds only if the remaining target now equals its value -- i.e. remainder hits 0 exactly at a leaf.","Recurse left OR right; either succeeding is enough.","Empty tree is False."],
tool:["Pass the shrinking target as a parameter, no globals","`not node.left and not node.right` = leaf test"],
pit:"Declaring success when the running sum hits target at an INTERNAL node. It must be a leaf -- check both children are None.",

sol:`def has_path_sum(root, target):
    if not root:
        return False
    if not root.left and not root.right:

  if(p.fl.so)r=[...r].sort(cmpAny);return r}
function eq(a,b,ap){
  if(typeof a==="number"&&typeof b==="number")return ap?Math.abs(a-b)<=1e-6+1e-6*Math.abs(b):Math.abs(a-b)<1e-9;
  if(Array.isArray(a)&&Array.isArray(b)){if(a.length!==b.length)return false;
    for(let i=0;i<a.length;i++)if(!eq(a[i],b[i],ap))return false;return true}
  return a===b}
async function runTests(p){
  const btn=$("#runBtn"),stat=t=>{$("#runStat").textContent=t},out=$("#out");
  btn.disabled=true;out.innerHTML="";
  try{await ensureEngine(stat)}catch(e){stat("");out.innerHTML='<div class="trow bad"><span class="tt">✗ '+esc(e.message)+'</span></div>';btn.disabled=false;return}
  stat("Running...");
  const user=$("#ed").value;let allOk=true;let html="";
  for(let i=0;i<p.tests.length;i++){const t=p.tests[i];
    const args=JSON.parse(JSON.stringify(t.a));
    const res=await runScript(buildScript(p,user,args));
    let got=null,fail=null,prints="";
    if(res.err)fail=res.err;
    else{const k=res.out.indexOf("@@R@@");
      if(k<0)fail="No result returned — did you rename or forget the function "+p.fn+"()?";
      else{prints=res.out.slice(0,k).trim();const line=res.out.slice(k+5);const nl=line.indexOf("\n");
        try{got=JSON.parse(nl<0?line:line.slice(0,nl))}catch(e){fail="Could not read the returned value."}}}
    let ok=false;
    if(!fail)ok=eq(canon(got,p),canon(t.w,p),!!p.fl.ap);
    if(!ok)allOk=false;
    html+='<div class="trow '+(ok?"ok":"bad")+'"><span class="tt">'+(ok?"✓":"✗")+' Test '+(i+1)+'</span>';
    if(!ok){html+='<div class="mono2">in:  '+esc(t.a.map(x=>JSON.stringify(x)).join(", "))+'\nexp: '+esc(JSON.stringify(t.w))+'\ngot: '+esc(fail?("[error] "+fail):JSON.stringify(got))+(prints?'\n--- your prints ---\n'+esc(prints):"")+'</div>'}
    else if(prints){html+='<div class="mono2">'+esc(prints)+'</div>'}
    html+='</div>';out.innerHTML=html}
  stat("");
  if(allOk){S.solved[p.id]=true;save();renderNav();
    out.innerHTML+='<div class="bigok">All tests passed — marked SOLVED. Engine: '+ENG.type+'.</div>';
    const b=document.querySelector(".badges");if(b&&!b.querySelector(".bg.solved")){const s=document.createElement("span");s.className="bg solved";s.textContent="SOLVED";b.insertBefore(s,b.querySelector(".rvbtn"))}}
  btn.disabled=false}

/* ---- export / import / drawer ---- */
$("#exportBtn").onclick=()=>{const blob=new Blob([JSON.stringify(S,null,1)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="dive_station_progress.json";a.click();URL.revokeObjectURL(a.href)};
$("#importBtn").onclick=()=>$("#importFile").click();
$("#importFile").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result);for(const k of["code","solved","studied","review"])if(o[k])S[k]=o[k];save();renderNav();showHome()}catch(err){alert("Could not read that file.")}};r.readAsText(f)});
function closeNav(){$("#nav").classList.remove("open");$("#scrim").classList.remove("show")}
$("#menuBtn").onclick=()=>{$("#nav").classList.toggle("open");$("#scrim").classList.toggle("show")};
$("#scrim").onclick=closeNav;

(async()=>{await loadState();renderNav();
  if(S.last&&PROBLEMS.find(p=>p.id===S.last))showProblem(S.last);else showHome()})();
</script>
